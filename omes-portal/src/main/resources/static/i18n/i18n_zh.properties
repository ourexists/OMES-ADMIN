equipHealth.desc.periodHours=健康分统计的时间窗口长度，如 24 表示过去 24 小时内的数据参与计算。
equipHealth.desc.alarmCountPenalty=每次报警事件扣除的分数（未按等级单独配置时使用）。
equipHealth.desc.alarmDurationPenaltyPerMin=报警持续每分钟扣除的分数（未按等级单独配置时使用）。
equipHealth.desc.alarmMaxDeduction=报警维度扣分总和的上限，防止报警扣分过高。
equipHealth.desc.alarmLevelPenaltySection=不同报警等级可设置不同的“分/次”和“分/分钟”，优先于上方通用扣分。
equipHealth.desc.runRatioWeight=运行率不足时最多可扣的分数；运行率 = 运行时长 ÷ 在线时长。
equipHealth.desc.expectedRunRatio=用于计算运行维度扣分的参考比例（当前未参与计算，可作说明用）。
equipHealth.desc.onlineRatioWeight=在线率不足时最多可扣的分数；在线率 = 在线时长 ÷ 统计周期。
equipHealth.desc.lifecycleMaxDeduction=使用年限、累计运行小时、启停次数三项扣分相加后的总上限。
equipHealth.desc.lifeYear=超过“年”数后，每多一年按“分/年”扣分，扣到“单项上限”为止；年限以设备启用日期或创建时间为准。
equipHealth.desc.totalRunHours=超过“小时”数后，每 1000 小时按“分/千小时”扣分，扣到“单项上限”为止。
equipHealth.desc.startStopCount=超过“次”数后，每 1000 次按“分/千次”扣分，扣到“单项上限”为止。
equipHealth.desc.healthyThreshold=得分 ≥ 该值时判定为“健康”。
equipHealth.desc.attentionThreshold=得分 ≥ 该值且小于健康线时判定为“关注”。
equipHealth.desc.warningThreshold=得分 ≥ 该值且小于关注线时判定为“预警”；低于该值为“故障”。

