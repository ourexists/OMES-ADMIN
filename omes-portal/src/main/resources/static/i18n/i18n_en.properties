equipHealth.desc.periodHours=Length of the time window for health scoring (e.g. 24 = past 24 hours).
equipHealth.desc.alarmCountPenalty=Points deducted per alarm event when level-specific penalty is not set.
equipHealth.desc.alarmDurationPenaltyPerMin=Points deducted per minute of alarm duration when level-specific penalty is not set.
equipHealth.desc.alarmMaxDeduction=Cap on total alarm deduction to avoid excessive penalty.
equipHealth.desc.alarmLevelPenaltySection=Set different “per count” and “per minute” penalties by alarm level; overrides the default penalties above.
equipHealth.desc.runRatioWeight=Max points deducted when run ratio is low; run ratio = run duration ÷ online duration.
equipHealth.desc.expectedRunRatio=Reference ratio for run dimension (for display; not used in current formula).
equipHealth.desc.onlineRatioWeight=Max points deducted when online ratio is low; online ratio = online duration ÷ period.
equipHealth.desc.lifecycleMaxDeduction=Cap on the sum of deductions from years in service, total run hours, and start/stop count.
equipHealth.desc.lifeYear=After the given years, deduct “per year” up to the “per-dimension cap”; years are from enable date or creation time.
equipHealth.desc.totalRunHours=After the given hours, deduct “per 1000 hours” up to the per-dimension cap.
equipHealth.desc.startStopCount=After the given count, deduct “per 1000” start/stops up to the per-dimension cap.
equipHealth.desc.healthyThreshold=Score ≥ this value is “Healthy”.
equipHealth.desc.attentionThreshold=Score ≥ this and below healthy is “Attention”.
equipHealth.desc.warningThreshold=Score ≥ this and below attention is “Warning”; below this is “Fault”.

