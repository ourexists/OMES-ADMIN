server:
  port: 10010
  servlet:
    context-path: /
spring:
  messages:
    basename: i18n/messages
  thymeleaf:
    cache: false
  mvc:
    static-path-pattern: static/**
  application:
    name: OEMS-ADMIN
  config:
    location: classpath:/,file:config/
  profiles:
    include: db-mysql
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: ALWAYS
    time-zone: GMT+8
  cloud:
    loadbalancer:
      retry:
        enabled: true
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5s}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:50}
          max-idle: ${REDIS_POOL_MAX_IDLE:20}
          min-idle: ${REDIS_POOL_MIN_IDLE:5}
          max-wait: ${REDIS_POOL_MAX_WAIT:2s}
  cache:
    type: redis

management:
  endpoint:
    health:
      show-details: never
    shutdown:
      access: read_only
  endpoints:
    web:
      base-path: ${server.servlet.context-path}
      exposure:
        include:
          - "health"
          - "shutdown"
ribbon:
  restclient:
    enabled: true
  okhttp:
    enabled: true
era:
  log:
    level: info
    file:
      path: log/
  permission:
    ignore:
      auth_check:
        - /expose/**
        - /
        - /templates/**
        - /view/**
        - /files/**
      #        - /workshop/**
      api_check:
        - /expose/**
        - /
        - /templates/**
        - /view/**
        - /files/**
  #        - /workshop/**
  token:
    store-type: Db
feign:
  client:
    config:
      default:
        connectTimeout: 20000
        readTimeout: 10000

#logging:
#  level:
#    org:
#      springframework:
#        ws: TRACE
logging:
  level:
    org:
      springframework:
        security: DEBUG
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

ai:
  proxy:
    base-url: ${AI_APP_BASE_URL:http://127.0.0.1:10011}
