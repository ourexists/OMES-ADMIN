<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>巡检模板</title>
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
    <style>
        .template-edit-page {
            overflow-y: auto; min-height: 100%; padding: 20px 24px 32px; box-sizing: border-box;
            background: #f5f6fa;
        }
        .template-card {
            background: #fff; border: none; border-radius: 8px; margin-bottom: 20px; overflow: visible;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .template-card-title {
            padding: 14px 20px; background: linear-gradient(180deg, #fafbfc 0%, #f2f4f7 100%);
            border-bottom: 1px solid #e8eaef; font-weight: 600; color: #1a2332; font-size: 15px;
            border-radius: 8px 8px 0 0;
        }
        .template-card-title small { font-weight: 400; color: #8b92a0; margin-left: 6px; font-size: 12px; }
        .template-card-body { padding: 20px 24px; }
        .template-row { display: flex; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
        .template-row:last-child { margin-bottom: 0; }
        .template-label { width: 90px; flex-shrink: 0; color: #5a6376; font-size: 14px; }
        .template-field { flex: 1; min-width: 200px; }
        .template-field .layui-input {
            width: 100%; max-width: 360px; border-radius: 4px; border-color: #e0e3e8;
        }
        .template-field .layui-input:focus { border-color: #1890ff; }
        .template-actions {
            margin-top: 24px; padding: 20px 0 8px; border-top: 1px solid #e8eaef;
            background: #fff; border-radius: 8px; padding-left: 24px; padding-right: 24px;
        }
        .template-actions .layui-btn { margin-right: 12px; border-radius: 4px; }
        .template-actions #btn-save { min-width: 88px; }
        .product-block {
            border: 1px solid #e4e6eb; border-radius: 8px; margin-bottom: 16px; overflow: visible;
            background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.04);
        }
        .product-block-head {
            padding: 12px 18px; background: linear-gradient(180deg, #f8f9fc 0%, #eef1f6 100%);
            border-bottom: 1px solid #e4e6eb; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
            border-radius: 8px 8px 0 0;
        }
        .product-block-head .item-product-select { min-width: 220px; border-radius: 4px; border-color: #d9dce4; }
        .product-block-head .layui-btn { border-radius: 4px; }
        .product-block-head .product-weight-total-wrap { color: #5a6376; font-size: 13px; margin-left: 12px; }
        .product-block-head .product-weight-total-wrap strong { color: #1a2332; }
        .product-block-body { padding: 16px 18px; }
        .product-block-body .layui-table {
            margin: 0; border: none; border-radius: 4px; overflow: hidden;
        }
        .product-block-body .layui-table thead tr { background: #f6f7fa !important; }
        .product-block-body .layui-table th { color: #5a6376; font-weight: 600; font-size: 13px; border-color: #e8eaef !important; padding: 10px 12px !important; }
        .product-block-body .layui-table td { border-color: #f0f1f5 !important; padding: 10px 12px !important; font-size: 13px; }
        .product-block-body .layui-table tbody tr:hover { background: #fafbfd !important; }
        .item-tbody tr { cursor: move; }
        .item-type-select { min-width: 100px; border-radius: 4px; }
        .item-unit-input { min-width: 120px; border-radius: 4px; }
        .item-weight { border-radius: 4px !important; }
        .product-block-body .layui-btn-xs { border-radius: 3px; padding: 0 10px; }
        #product-blocks-wrap { margin-top: 14px; }
        #btn-add-product { border-radius: 4px; }
        /* 配置规则弹窗 */
        .rule-config-box { padding: 16px 20px; background: #fafbfc; min-height: 200px; }
        .rule-config-box .rule-config-title { margin-bottom: 14px; padding: 8px 0; color: #5a6376; font-size: 13px; border-bottom: 1px solid #e8eaef; }
        .rule-config-box .rule-config-table-wrap { background: #fff; border-radius: 6px; overflow: hidden; border: 1px solid #e4e6eb; margin-bottom: 14px; }
        .rule-config-box .layui-table { margin: 0; border: none; }
        .rule-config-box .layui-table thead tr { background: #f6f7fa !important; }
        .rule-config-box .layui-table th { color: #5a6376; font-weight: 600; font-size: 13px; border-color: #e8eaef !important; padding: 10px 12px !important; }
        .rule-config-box .layui-table td { border-color: #f0f1f5 !important; padding: 10px 12px !important; font-size: 13px; }
        .rule-config-box .rule-tbody tr:hover { background: #fafbfd !important; }
        .rule-config-box .layui-input { border-radius: 4px; border-color: #e0e3e8; }
        .rule-config-box .layui-input:focus { border-color: #1890ff; }
        .rule-config-box .rule-add-row { border-radius: 4px; }
        .rule-config-box .rule-row-del { border-radius: 3px; }
        .rule-config-box .rule-config-hint { margin-bottom: 10px; padding: 6px 10px; background: #eef4ff; color: #4a6cb3; font-size: 12px; border-radius: 4px; border-left: 3px solid #1890ff; }
    </style>
</head>
<body>
<div class="template-edit-page">
    <form id="template-form" class="layui-form" lay-filter="template-form">
        <input type="hidden" name="id">
        <div class="template-card">
            <div class="template-card-title">模板信息</div>
            <div class="template-card-body">
                <div class="template-row">
                    <span class="template-label">模板名称</span>
                    <div class="template-field">
                        <input type="text" name="name" required lay-verify="required" placeholder="如：水泵巡检模板" class="layui-input" autocomplete="off">
                    </div>
                </div>
                <div class="template-row">
                    <span class="template-label">模板备注</span>
                    <div class="template-field">
                        <input type="text" name="desc" placeholder="模板备注" class="layui-input" autocomplete="off">
                    </div>
                </div>
            </div>
        </div>

        <div class="template-card">
            <div class="template-card-title">巡检项 <small style="color:#999;">按产品分组；仅可从「巡检项」管理中的巡检项库载入</small></div>
            <div class="template-card-body">
                <div class="layui-btn-container">
                    <button type="button" class="layui-btn layui-btn-sm" id="btn-add-product">添加产品</button>
                </div>
                <div id="product-blocks-wrap"></div>
            </div>
        </div>

        <div class="template-actions">
            <button type="button" class="layui-btn" id="btn-save">保存</button>
            <button type="button" class="layui-btn layui-btn-primary" id="btn-cancel">取消</button>
        </div>
    </form>
</div>
<script>
    var templateId = '';
    var productList = [];
    var productBlockIndex = 0;

    function ensureStringIdInList(list) {
        if (!list || !Array.isArray(list)) return;
        for (var i = 0; i < list.length; i++) {
            var t = list[i];
            if (t && typeof t === 'object') {
                if (t.hasOwnProperty('id') && typeof t.id !== 'string') t.id = t.id == null ? '' : String(t.id);
            }
        }
    }

    layui.use(['form', 'layer'], function () {
        var form = layui.form, layer = layui.layer;
        var id = layui.url().search.id;

        function buildProductOptions(selectedCode) {
            var opts = '<option value="">请选择产品</option>';
            (productList || []).forEach(function (p) {
                var raw = (p.code || '').toString();
                var sel = (raw === (selectedCode || '')) ? ' selected' : '';
                opts += '<option value="' + raw.replace(/"/g, '&quot;') + '"' + sel + '>' + (p.name || p.code || '-') + '</option>';
            });
            return opts;
        }

        function typeDesc(code) {
            var m = { 1: '选择', 2: '数值', 3: '是否' };
            return m[code] || '';
        }

        function addItemRowToBlock(blockId, row) {
            row = row || { name: '', type: 2, unit: '' };
            var typeVal = (row.type !== undefined && row.type !== null) ? row.type : 2;
            var bound = row.referenceItemId ? true : false;
            var $tbody = $('#' + blockId).find('.item-tbody');
            var rowIndex = $tbody.find('tr').length + 1;
            var nameCell = bound ? ('<span class="item-name-text">' + (row.name || '').replace(/</g, '&lt;') + '</span>') : ('<input type="text" class="layui-input item-name" placeholder="如：运行状态、运行电流" value="' + (row.name || '').replace(/"/g, '&quot;') + '">');
            var typeCell = bound ? ('<span class="item-type-text">' + typeDesc(typeVal) + '</span>') : ('<select class="item-type item-type-select"><option value="1"' + (typeVal === 1 ? ' selected' : '') + '>选择</option><option value="2"' + (typeVal === 2 ? ' selected' : '') + '>数值</option><option value="3"' + (typeVal === 3 ? ' selected' : '') + '>是否</option></select>');
            var unitCell = bound ? ('<span class="item-unit-text">' + (row.unit || '-').replace(/</g, '&lt;') + '</span>') : ('<input type="text" class="layui-input item-unit item-unit-input" placeholder="A、MPa、正常/不足" value="' + (row.unit || '').replace(/"/g, '&quot;') + '">');
            var refAttr = row.referenceItemId ? (' data-reference-item-id="' + (row.referenceItemId || '').replace(/"/g, '&quot;') + '"') : '';
            var tr = '<tr draggable="true"' + refAttr + '><td class="item-no">' + rowIndex + '</td>' +
                '<td>' + nameCell + '</td>' +
                '<td>' + typeCell + '</td>' +
                '<td>' + unitCell + '</td>' +
                '<td><input type="number" class="layui-input item-weight" placeholder="权重" value="' + (row.weight != null ? row.weight : '') + '" style="width:70px;" min="0"></td>' +
                '<td class="item-weight-rate-cell"><span class="item-weight-rate">-</span></td>' +
                '<td>' +
                    '<a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-warm btn-config-rule">配置规则</a> ' +
                    '<a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-danger btn-remove-row">删除</a>' +
                '</td></tr>';
            $tbody.append(tr);
            $tbody.find('tr').each(function (i) { $(this).find('.item-no').text(i + 1); });
            form.render('select');
            updateBlockWeightTotalAndRate($('#' + blockId));
        }

        function round4(n) { return Math.round(n * 10000) / 10000; }

        function updateBlockWeightTotalAndRate($block) {
            if (!$block || !$block.length) return;
            var sum = 0;
            $block.find('.item-tbody .item-weight').each(function () {
                var v = $(this).val();
                if (v !== '' && v !== undefined && !isNaN(parseInt(v, 10))) sum += parseInt(v, 10);
            });
            $block.find('.product-weight-total').text(sum);
            $block.find('.item-tbody tr').each(function () {
                var w = $(this).find('.item-weight').val();
                var val = (w !== '' && w !== undefined && !isNaN(parseInt(w, 10))) ? parseInt(w, 10) : 0;
                var rate = sum > 0 ? round4(val / sum) : 0;
                $(this).find('.item-weight-rate').text(rate > 0 ? rate : '-');
            });
        }

        function addProductBlock(productItem) {
            productItem = productItem || { productCode: '', itemRow: [] };
            var blockId = 'product-block-' + (productBlockIndex++);
            var productOpts = buildProductOptions(productItem.productCode || '');
            var rows = productItem.itemRow && productItem.itemRow.length ? productItem.itemRow : [];
            var tbodyRows = '';
            rows.forEach(function (r, i) {
                var typeVal = (r.type !== undefined && r.type !== null) ? r.type : 2;
                var bound = r.referenceItemId ? true : false;
                var nameCell = bound ? ('<span class="item-name-text">' + (r.name || '').replace(/</g, '&lt;') + '</span>') : ('<input type="text" class="layui-input item-name" placeholder="如：运行状态、运行电流" value="' + (r.name || '').replace(/"/g, '&quot;') + '">');
                var typeCell = bound ? ('<span class="item-type-text">' + typeDesc(typeVal) + '</span>') : ('<select class="item-type item-type-select"><option value="1"' + (typeVal === 1 ? ' selected' : '') + '>选择</option><option value="2"' + (typeVal === 2 ? ' selected' : '') + '>数值</option><option value="3"' + (typeVal === 3 ? ' selected' : '') + '>是否</option></select>');
                var unitCell = bound ? ('<span class="item-unit-text">' + (r.unit || '-').replace(/</g, '&lt;') + '</span>') : ('<input type="text" class="layui-input item-unit item-unit-input" placeholder="A、MPa、正常/不足" value="' + (r.unit || '').replace(/"/g, '&quot;') + '">');
                var refAttr = r.referenceItemId ? (' data-reference-item-id="' + (r.referenceItemId || '').replace(/"/g, '&quot;') + '"') : '';
                var rulesAttr = (r.rules != null && r.rules !== '') ? (' data-rules="' + (r.rules + '').replace(/"/g, '&quot;') + '"') : '';
                var weightVal = (r.weight != null && r.weight !== '') ? r.weight : '';
                tbodyRows += '<tr draggable="true"' + refAttr + rulesAttr + '><td class="item-no">' + (i + 1) + '</td><td>' + nameCell + '</td><td>' + typeCell + '</td><td>' + unitCell + '</td>' +
                    '<td><input type="number" class="layui-input item-weight" placeholder="权重" value="' + weightVal + '" style="width:70px;" min="0"></td>' +
                    '<td class="item-weight-rate-cell"><span class="item-weight-rate">-</span></td>' +
                    '<td>' +
                        '<a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-warm btn-config-rule">配置规则</a> ' +
                        '<a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-danger btn-remove-row">删除</a>' +
                    '</td></tr>';
            });
            var html = '<div class="product-block" data-block-id="' + blockId + '" id="' + blockId + '">' +
                '<div class="product-block-head">' +
                '<div><select class="item-product item-product-select layui-input">' + productOpts + '</select>' +
                '<span class="product-weight-total-wrap">权重总值：<strong class="product-weight-total">0</strong></span></div>' +
                '<div><button type="button" class="layui-btn layui-btn-xs layui-btn-normal btn-load-items">从巡检项载入</button> ' +
                '<a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-danger btn-remove-block">删除该产品</a></div>' +
                '</div>' +
                '<div class="product-block-body">' +
                '<table class="layui-table"><thead><tr><th style="width:50px;">NO</th><th>巡检项名</th><th style="width:100px;">类型</th><th style="width:140px;">单位</th><th style="width:80px;">权重</th><th style="width:90px;">百分比权重</th><th style="width:70px;">操作</th></tr></thead>' +
                '<tbody class="item-tbody">' + tbodyRows + '</tbody></table>' +
                '</div></div>';
            $('#product-blocks-wrap').append(html);
            form.render('select');
            updateBlockWeightTotalAndRate($('#' + blockId));
        }

        function collectData() {
            var name = ($('input[name="name"]').val() || '').trim();
            var desc = ($('input[name="desc"]').val() || '').trim();
            var item = [];
            $('.product-block').each(function () {
                var productCode = ($(this).find('.item-product').val() || '').trim() || null;
                var itemRow = [];
                $(this).find('.item-tbody tr').each(function () {
                    var $tr = $(this);
                    var rowName = $tr.find('.item-name').length ? ($tr.find('.item-name').val() || '').trim() : ($tr.find('.item-name-text').text() || '').trim();
                    if (!rowName) return;
                    var typeVal = 2;
                    if ($tr.find('.item-type-select').length) typeVal = parseInt($tr.find('.item-type-select').val(), 10) || 2;
                    else if ($tr.find('.item-type-text').length) typeVal = ($tr.find('.item-type-text').text().trim() === '选择' ? 1 : ($tr.find('.item-type-text').text().trim() === '数值' ? 2 : 3));
                    var unitVal = $tr.find('.item-unit-input').length ? ($tr.find('.item-unit-input').val() || '').trim() : ($tr.find('.item-unit-text').text() || '').trim();
                    var refId = $tr.data('reference-item-id') || null;
                    var w = $tr.find('.item-weight').val();
                    var weight = (w !== '' && w !== undefined) ? parseInt(w, 10) : null;
                    if (weight == null || isNaN(weight)) weight = null;
                    var rateText = $tr.find('.item-weight-rate').text().trim();
                    var weightRate = (rateText !== '' && rateText !== '-') ? parseFloat(rateText) : null;
                    if (weightRate != null && isNaN(weightRate)) weightRate = null; else if (weightRate != null) weightRate = round4(weightRate);
                    var rawRules = $tr.attr('data-rules') || '[]';
                    var rulesJson = rawRules;
                    try { JSON.parse(rawRules); } catch (e) { rulesJson = '[]'; }
                    itemRow.push({
                        name: rowName,
                        type: typeVal,
                        unit: unitVal,
                        referenceItemId: refId || undefined,
                        weight: weight,
                        weightRate: weightRate,
                        rules: rulesJson
                    });
                });
                if (productCode || (itemRow && itemRow.length > 0)) {
                    item.push({ productCode: productCode || '', itemRow: itemRow });
                }
            });
            return { name: name, desc: desc, item: item };
        }

        function dataToBackendDto(data) {
            var items = [];
            var sortOrder = 0;
            (data.item || []).forEach(function (g) {
                var productCode = (g.productCode || '').trim() || null;
                (g.itemRow || []).forEach(function (r) {
                    if (!r.name || !(r.name + '').trim()) return;
                    var ruleConfig = (r.rules != null && r.rules !== '') ? (typeof r.rules === 'string' ? r.rules : JSON.stringify(r.rules || [])) : null;
                    var weightInt = (r.weight != null && !isNaN(r.weight)) ? parseInt(r.weight, 10) : null;
                    var weightRate = (r.weightRate != null && !isNaN(r.weightRate)) ? round4(parseFloat(r.weightRate)) : null;
                    items.push({
                        templateId: templateId || null,
                        productCode: productCode,
                        itemName: (r.name + '').trim(),
                        itemType: r.type != null ? parseInt(r.type, 10) : 2,
                        unit: (r.unit != null && (r.unit + '').trim()) ? (r.unit + '').trim() : null,
                        sortOrder: sortOrder++,
                        referenceItemId: (r.referenceItemId || '').trim() || null,
                        weight: weightInt,
                        weightRate: weightRate,
                        ruleConfig: ruleConfig
                    });
                });
            });
            return {
                id: $('input[name="id"]').val() || null,
                name: data.name,
                remark: data.desc || null,
                items: items
            };
        }

        function backendToData(apiData) {
            if (!apiData) return { name: '', desc: '', item: [] };
            var item = [];
            var byProduct = {};
            (apiData.items || []).forEach(function (it) {
                var code = it.productCode || '';
                if (!byProduct[code]) byProduct[code] = { productCode: code, itemRow: [] };
                var w = it.weight != null ? parseInt(it.weight, 10) : undefined;
                var wr = (it.weightRate != null && (it.weightRate + '').trim() !== '') ? round4(parseFloat(it.weightRate)) : undefined;
                byProduct[code].itemRow.push({
                    name: it.itemName || '',
                    type: it.itemType != null ? it.itemType : 2,
                    unit: it.unit || '',
                    referenceItemId: it.referenceItemId || undefined,
                    weight: w,
                    weightRate: wr,
                    rules: (it.ruleConfig != null && (it.ruleConfig + '').trim() !== '') ? (it.ruleConfig + '').trim() : undefined
                });
            });
            Object.keys(byProduct).forEach(function (code) {
                item.push(byProduct[code]);
            });
            return {
                name: apiData.name || '',
                desc: apiData.remark || '',
                item: item
            };
        }

        $('#btn-add-product').on('click', function () {
            addProductBlock({ productCode: '', itemRow: [] });
        });

        $(document).on('click', '.btn-remove-block', function () {
            $(this).closest('.product-block').remove();
        });

        $(document).on('click', '.btn-load-items', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var $block = $(this).closest('.product-block');
            var blockId = $block.attr('id');
            var productCode = ($block.find('.item-product').val() || '').trim();
            if (!productCode) {
                layer.msg('请先选择产品');
                return;
            }
            get(router.inspect_item_listAllPool, {}, function (list) {
                var arr = Array.isArray(list) ? list : (list && list.data) ? list.data : [];
                ensureStringIdInList(arr);
                if (arr.length === 0) {
                    layer.msg('公共库暂无巡检项，请先在「巡检项」中维护（关联模板选“无”）');
                    return;
                }
                var layerId = 'load-items-' + blockId;
                var content = '<div id="' + layerId + '" style="padding:12px; max-height:320px; overflow-y:auto;">' +
                    '<table class="layui-table"><thead><tr><th style="width:40px;"><input type="checkbox" class="load-check-all" lay-skin="primary"></th><th>巡检项名</th><th style="width:80px;">类型</th><th style="width:90px;">单位</th></tr></thead><tbody>';
                arr.forEach(function (it) {
                    var typeVal = it.itemType != null ? it.itemType : 2;
                    var typeStr = typeVal === 1 ? '选择' : typeVal === 2 ? '数值' : '是否';
                    var itemId = (it.id || '').toString().replace(/"/g, '&quot;');
                    content += '<tr><td><input type="checkbox" class="load-item-cb" lay-skin="primary" data-id="' + itemId + '" data-name="' + (it.itemName || '').replace(/"/g, '&quot;') + '" data-type="' + typeVal + '" data-unit="' + (it.unit || '').replace(/"/g, '&quot;') + '"></td>' +
                        '<td>' + (it.itemName || '').replace(/</g, '&lt;') + '</td><td>' + typeStr + '</td><td>' + (it.unit || '-').replace(/</g, '&lt;') + '</td></tr>';
                });
                content += '</tbody></table></div>';
                layer.open({
                    type: 1,
                    title: '从巡检项中选择载入',
                    area: ['520px', '420px'],
                    content: content,
                    btn: ['确定', '取消'],
                    yes: function (idx) {
                        var $box = $('#' + layerId);
                        $box.find('.load-item-cb:checked').each(function () {
                            var $cb = $(this);
                            addItemRowToBlock(blockId, {
                                referenceItemId: $cb.data('id') || '',
                                name: $cb.data('name') || '',
                                type: parseInt($cb.data('type'), 10) || 2,
                                unit: $cb.data('unit') || '',
                                weight: null
                            });
                        });
                        layer.close(idx);
                    }
                });
                setTimeout(function () {
                    form.render('checkbox');
                    var $layerBox = $('#' + layerId);
                    if ($layerBox.length) {
                        $layerBox.on('change', '.load-check-all', function () {
                            var c = $(this).prop('checked');
                            $layerBox.find('.load-item-cb').prop('checked', c);
                            form.render('checkbox');
                        });
                    }
                }, 100);
            });
        });

        $(document).on('click', '.btn-remove-row', function () {
            var $tbody = $(this).closest('.item-tbody');
            $(this).closest('tr').remove();
            $tbody.find('tr').each(function (i) {
                $(this).find('.item-no').text(i + 1);
            });
            updateBlockWeightTotalAndRate($(this).closest('.product-block'));
        });

        $(document).on('input blur', '.item-weight', function () {
            var $block = $(this).closest('.product-block');
            var v = $(this).val();
            if (v !== '' && v !== undefined) {
                var n = parseInt(v, 10);
                if (!isNaN(n) && n < 0) $(this).val(0);
            }
            updateBlockWeightTotalAndRate($block);
        });

        // 解析单位字符串为选项列表（支持 选择A/选择B、选择A|选择B、逗号等）
        function parseUnitToOptions(unitStr) {
            if (!unitStr || !(unitStr + '').trim()) return [];
            return (unitStr + '').split(/[,，、\/／|｜]/).map(function (s) { return s.trim(); }).filter(Boolean);
        }

        // 配置规则：表格模式（按巡检项类型展示不同列）；选择类型且传入 optionList 时渲染下拉框
        function buildRuleRowHtml(typeVal, rule, rowIndex, optionList) {
            var esc = function (s) { return (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); };
            if (typeVal === 3) {
                var bv = rule.boolValue != null ? parseInt(rule.boolValue, 10) : 1;
                return '<tr>' +
                    '<td><select class="rule-bool"><option value="1"' + (bv === 1 ? ' selected' : '') + '>是</option><option value="0"' + (bv === 0 ? ' selected' : '') + '>否</option></select></td>' +
                    '<td><input type="number" class="rule-weight layui-input" value="' + esc(rule.weight) + '" min="0" style="width:80px;"></td>' +
                    '<td><a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-danger rule-row-del">删除</a></td></tr>';
            }
            if (typeVal === 2) {
                return '<tr>' +
                    '<td><input type="number" step="any" class="rule-min layui-input" value="' + esc(rule.minValue) + '" placeholder="最小值" style="width:90px;"></td>' +
                    '<td><input type="number" step="any" class="rule-max layui-input" value="' + esc(rule.maxValue) + '" placeholder="最大值" style="width:90px;"></td>' +
                    '<td><input type="number" class="rule-weight layui-input" value="' + esc(rule.weight) + '" min="0" style="width:80px;"></td>' +
                    '<td><a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-danger rule-row-del">删除</a></td></tr>';
            }
            // 类型1 选择：有 optionList 时用下拉框，否则用输入框
            if (typeVal === 1 && optionList && optionList.length > 0) {
                var optVal = (rule.optionValue != null ? rule.optionValue : '');
                var optHtml = '<option value="">请选择</option>';
                for (var i = 0; i < optionList.length; i++) {
                    var o = optionList[i];
                    optHtml += '<option value="' + esc(o) + '"' + (optVal === o ? ' selected' : '') + '>' + esc(o) + '</option>';
                }
                return '<tr>' +
                    '<td><select class="rule-option layui-input" style="width:140px;">' + optHtml + '</select></td>' +
                    '<td><input type="number" class="rule-weight layui-input" value="' + esc(rule.weight) + '" min="0" style="width:80px;"></td>' +
                    '<td><a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-danger rule-row-del">删除</a></td></tr>';
            }
            return '<tr>' +
                '<td><input type="text" class="rule-option layui-input" value="' + esc(rule.optionValue) + '" placeholder="选项值" style="width:120px;"></td>' +
                '<td><input type="number" class="rule-weight layui-input" value="' + esc(rule.weight) + '" min="0" style="width:80px;"></td>' +
                '<td><a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-danger rule-row-del">删除</a></td></tr>';
        }

        function ruleTableHead(typeVal) {
            if (typeVal === 3) return '<thead><tr><th>选项</th><th style="width:100px;">分值</th><th style="width:60px;">操作</th></tr></thead>';
            if (typeVal === 2) return '<thead><tr><th>最小值</th><th>最大值</th><th style="width:100px;">分值</th><th style="width:60px;">操作</th></tr></thead>';
            return '<thead><tr><th>选项值</th><th style="width:100px;">分值</th><th style="width:60px;">操作</th></tr></thead>';
        }

        $(document).on('click', '.btn-config-rule', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var $tr = $(this).closest('tr');
            var typeVal = 2;
            if ($tr.find('.item-type-select').length) {
                typeVal = parseInt($tr.find('.item-type-select').val(), 10) || 2;
            } else if ($tr.find('.item-type-text').length) {
                var txt = $tr.find('.item-type-text').text().trim();
                typeVal = txt === '选择' ? 1 : (txt === '数值' ? 2 : 3);
            }
            var unitVal = $tr.find('.item-unit-input').length ? ($tr.find('.item-unit-input').val() || '').trim() : ($tr.find('.item-unit-text').text() || '').trim();
            var optionList = (typeVal === 1) ? parseUnitToOptions(unitVal) : [];

            var raw = $tr.attr('data-rules') || '[]';
            var rules;
            try { rules = JSON.parse(raw); } catch (e) { rules = []; }
            if (!Array.isArray(rules)) rules = [];

            var typeName = typeVal === 1 ? '选择' : typeVal === 2 ? '数值' : '是否';
            var tbodyHtml = '';
            rules.forEach(function (r, i) {
                tbodyHtml += buildRuleRowHtml(typeVal, r, i, optionList);
            });
            if (tbodyHtml === '') {
                if (typeVal === 3) {
                    tbodyHtml = buildRuleRowHtml(typeVal, { boolValue: 1, weight: '' }, 0) + buildRuleRowHtml(typeVal, { boolValue: 0, weight: '' }, 1);
                } else if (typeVal === 2) {
                    tbodyHtml = buildRuleRowHtml(typeVal, { minValue: '', maxValue: '', weight: '' }, 0);
                } else {
                    tbodyHtml = buildRuleRowHtml(typeVal, { optionValue: '', weight: '' }, 0, optionList);
                }
            }

            var hintHtml = '<div class="rule-config-hint">分值为 100 分制权重（如 40 分表示权重 0.4），总分将按权重总值换算为 0～100。</div>';
            if (typeVal === 3) hintHtml += '<div class="rule-config-hint">是否互斥，仅会匹配「是」或「否」其一，请分别设置分值。</div>';
            else if (typeVal === 1) hintHtml += '<div class="rule-config-hint">选项互斥，仅会匹配其中一个选项，请为每个选项设置分值。</div>';

            var boxId = 'rule-config-box-' + Date.now();
            var theadHtml = ruleTableHead(typeVal);
            var contentHtml = '<div id="' + boxId + '" class="rule-config-box" data-type-val="' + typeVal + '">' +
                '<div class="rule-config-title">当前类型：' + typeName + '</div>' +
                (hintHtml ? hintHtml : '') +
                '<div class="rule-config-table-wrap"><table class="layui-table">' + theadHtml + '<tbody class="rule-tbody">' + tbodyHtml + '</tbody></table></div>' +
                '<button type="button" class="layui-btn layui-btn-sm layui-btn-normal rule-add-row">新增一行</button>' +
                '</div>';

            layer.open({
                type: 1,
                title: '配置规则',
                area: ['520px', '420px'],
                content: contentHtml,
                btn: ['确定', '取消'],
                success: function (layero, idx) {
                    var $box = $('#' + boxId);
                    $box.data('optionList', optionList);
                    $box.on('click', '.rule-add-row', function () {
                        if (typeVal === 3) {
                            var hasYes = $box.find('.rule-tbody .rule-bool').filter(function () { return $(this).val() === '1'; }).length > 0;
                            var hasNo = $box.find('.rule-tbody .rule-bool').filter(function () { return $(this).val() === '0'; }).length > 0;
                            if (hasYes && hasNo) {
                                layer.msg('是否互斥，仅需配置「是」「否」两项');
                                return;
                            }
                            var t = !hasYes ? { boolValue: 1, weight: '' } : { boolValue: 0, weight: '' };
                            $box.find('.rule-tbody').append(buildRuleRowHtml(typeVal, t, 0));
                        } else {
                            var list = (typeVal === 1) ? ($box.data('optionList') || []) : null;
                            var t = typeVal === 2 ? { minValue: '', maxValue: '', weight: '' } : { optionValue: '', weight: '' };
                            $box.find('.rule-tbody').append(buildRuleRowHtml(typeVal, t, 0, list));
                        }
                        form.render('select');
                    });
                    $box.on('click', '.rule-row-del', function () {
                        $(this).closest('tr').remove();
                    });
                    form.render('select');
                },
                yes: function (idx) {
                    var rows = [];
                    $('#' + boxId).find('.rule-tbody tr').each(function () {
                        var $row = $(this);
                        var w = $row.find('.rule-weight').val();
                        var weight = (w !== '' && w !== undefined) ? parseInt(w, 10) : null;
                        if (weight === null || isNaN(weight)) return;
                        if (typeVal === 3) {
                            rows.push({ ruleType: 1, boolValue: parseInt($row.find('.rule-bool').val(), 10), weight: weight });
                        } else if (typeVal === 2) {
                            var minV = $row.find('.rule-min').val();
                            var maxV = $row.find('.rule-max').val();
                            rows.push({ ruleType: 2, minValue: minV !== '' ? parseFloat(minV) : null, maxValue: maxV !== '' ? parseFloat(maxV) : null, weight: weight });
                        } else {
                            var opt = ($row.find('.rule-option').val() || '').trim();
                            if (opt === '') return;
                            rows.push({ ruleType: 3, optionValue: opt, weight: weight });
                        }
                    });
                    $tr.attr('data-rules', JSON.stringify(rows));
                    layer.close(idx);
                }
            });
        });

        // 简单拖拽排序：同一产品块内拖动行调整顺序
        var draggingTr = null;
        $(document).on('dragstart', '.item-tbody tr', function (e) {
            draggingTr = this;
            e.originalEvent.dataTransfer.effectAllowed = 'move';
        });
        $(document).on('dragover', '.item-tbody tr', function (e) {
            if (!draggingTr || draggingTr === this) return;
            e.preventDefault();
            e.originalEvent.dataTransfer.dropEffect = 'move';
        });
        $(document).on('drop', '.item-tbody tr', function (e) {
            if (!draggingTr || draggingTr === this) return;
            e.preventDefault();
            var $target = $(this);
            var $drag = $(draggingTr);
            if ($drag.index() < $target.index()) {
                $target.after($drag);
            } else {
                $target.before($drag);
            }
            var $tbody = $target.closest('.item-tbody');
            $tbody.find('tr').each(function (i) {
                $(this).find('.item-no').text(i + 1);
            });
        });
        $(document).on('dragend', '.item-tbody tr', function () {
            draggingTr = null;
        });

        function renderTemplateForm(apiData) {
            var data = backendToData(apiData);
            $('#template-form input[name="id"]').val(apiData && apiData.id ? apiData.id : '');
            $('input[name="name"]').val(data.name);
            $('input[name="desc"]').val(data.desc);
            $('#product-blocks-wrap').empty();
            productBlockIndex = 0;
            if (data.item && data.item.length) {
                data.item.forEach(function (productItem) {
                    addProductBlock(productItem);
                });
            } else {
                addProductBlock();
            }
            form.render();
        }

        get(router.product_listAll, {}, function (list) {
            productList = Array.isArray(list) ? list : (list && list.data) ? list.data : [];
            ensureStringIdInList(productList);
            if (id) {
                templateId = id;
                get(router.inspect_template_withItems, { templateId: id }, function (data) {
                    if (data) {
                        if (data.id != null) data.id = String(data.id);
                        if (data.items) ensureStringIdInList(data.items);
                    }
                    renderTemplateForm(data);
                });
            } else {
                addProductBlock();
            }
        });

        $('#btn-save').on('click', function () {
            var data = collectData();
            if (!data.name) {
                layer.msg('请输入模板名称');
                return;
            }
            var dto = dataToBackendDto(data);
            post(router.inspect_template_edit, dto, function () {
                var index = parent.layer.getFrameIndex(window.name);
                parent.layer.close(index);
                if (parent.reloadTb) parent.reloadTb();
            }, function (code, msg) {
                layer.msg(msg || '保存失败');
            });
        });

        $('#btn-cancel').on('click', function () {
            var index = parent.layer.getFrameIndex(window.name);
            parent.layer.close(index);
        });
    });
</script>
</body>
</html>
