<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
</head>
<body>
<div style="padding: 16px;">
    <form class="layui-form layui-form-pane" action="" id="common-edit-form" lay-filter="common-edit-form">
        <div class="layui-form-item">
            <label class="layui-form-label"><span style="color:red">*</span> <span
                    lang-i18n="gateway.serverName">服务名</span></label>
            <div class="layui-input-block">
                <input type="text" name="serverName" autocomplete="off" lay-verify="required" class="layui-input"
                       lang-i18n="common.placeholder">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label"><span style="color:red">*</span> <span
                    lang-i18n="gateway.protocol"></span></label>
            <div class="layui-input-block">
                <select name="protocol" id="protocol" lay-verify="required" lay-filter="protocol-select">
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label"><span style="color:red">*</span><span
                    lang-i18n="gateway.host"></span></label>
            <div class="layui-input-block">
                <input type="text" name="uri" autocomplete="off" lay-verify="required" class="layui-input"
                       lang-i18n="common.placeholder">
            </div>
        </div>
        <div class="layui-form-item" id="username-form-item" style="display: none;">
            <label class="layui-form-label">账户名</label>
            <div class="layui-input-block">
                <input type="text" name="username" id="username-input" autocomplete="off" class="layui-input"
                       lang-i18n="common.placeholder">
            </div>
        </div>
        <div class="layui-form-item" id="password-form-item" style="display: none;">
            <label class="layui-form-label">密码</label>
            <div class="layui-input-block">
                <input type="password" name="password" id="password-input" autocomplete="off" class="layui-input"
                       lang-i18n="common.placeholder">
            </div>
        </div>
        <div class="layui-form-item" id="suffix-form-item" style="display: none;">
            <label class="layui-form-label"><span id="topic-required-star" style="color:red;display:none">*</span> <span
                    lang-i18n="mqtt.topic">订阅主题</span></label>
            <div class="layui-input-block">
                <input type="text" name="topic" id="topic-input" autocomplete="off" class="layui-input"
                       placeholder="/mqtt 或 topic 等">
            </div>
        </div>
        <div id="polling-form-item" style="display: none;">
            <div class="layui-form-item s7-only-item" style="display: none;">
                <label class="layui-form-label">Rack</label>
                <div class="layui-input-block" style="margin-left:110px;">
                    <input type="number" id="s7-remote-rack" min="0" value="0" class="layui-input" placeholder="0">
                    <div class="layui-form-mid layui-word-aux" style="padding:0 0 0 2px;font-size:12px;">机架号，通常为 0</div>
                </div>
            </div>
            <div class="layui-form-item s7-only-item" style="display: none;">
                <label class="layui-form-label">Slot</label>
                <div class="layui-input-block" style="margin-left:110px;">
                    <input type="number" id="s7-remote-slot" min="0" value="1" class="layui-input"
                           placeholder="200Smart/1200/1500=1, 300=2, 400=3">
                    <div class="layui-form-mid layui-word-aux" style="padding:0 0 0 2px;font-size:12px;">插槽号：S7-200 Smart / 1200 / 1500 填 1，S7-300 填 2，S7-400 填 3</div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">超时(ms)</label>
                <div class="layui-input-block" style="margin-left:110px;">
                    <input type="number" id="polling-timeout" min="1000" value="5000" class="layui-input" placeholder="5000">
                </div>
            </div>
            <div class="layui-form-item" id="collect-cron-form-item">
                <label class="layui-form-label"><span id="cron-required-star" style="color:red;display:none">*</span>
                    采集Cron</label>
                <div class="layui-input-block">
                    <input type="text" name="collectCron" id="collect-cron-input" placeholder="如 0 * * * * ? 每分钟"
                           class="layui-input">
                </div>
            </div>
        </div>
        <div class="layui-form-item" style="text-align: right; margin-top: 16px;">
            <button class="layui-btn" lay-submit lay-filter="common-edit-btn" lang-i18n="common.msg.confirm">确定</button>
            <button type="reset" class="layui-btn layui-btn-primary" lang-i18n="common.msg.reset">重置</button>
        </div>
    </form>
</div>
<script>
    var current_row_data;
    layui.use(['form', 'layer'], function () {
        var form = layui.form;
        var layer = layui.layer;

        function isPollingProtocol(p) {
            return p === 's7' || p === 'modbus tcp' || p === 'opc ua';
        }

        function toggleByProtocol(protocol) {
            var p = protocol ? String(protocol).toLowerCase() : '';
            var isMqtt = p === 'mqtt' || p === 'tc_mqtt';
            var needAuth = p === 'mqtt' || p === 'tc_mqtt' || p === 'rest' || p === 'wincc';
            var isPolling = isPollingProtocol(p);
            var isS7 = p === 's7';
            $('#suffix-form-item').toggle(isMqtt);
            $('#username-form-item, #password-form-item').toggle(needAuth);
            $('#polling-form-item').toggle(isPolling);
            $('.s7-only-item').toggle(isS7);
            $('#collect-enabled-form-item, #collect-interval-form-item, #collect-cron-form-item').toggle(!isMqtt);
            if (isMqtt) {
                $('#topic-required-star').show();
                $('#topic-input').attr('lay-verify', 'required');
                $('#cron-required-star').hide();
                $('#collect-cron-input').removeAttr('lay-verify');
            } else {
                $('#topic-required-star').hide();
                $('#topic-input').removeAttr('lay-verify');
                $('#cron-required-star').show();
                $('#collect-cron-input').attr('lay-verify', 'required');
            }
            form.render();
        }

        function buildPollingParams(proto) {
            var params = {
                timeout: parseInt($('#polling-timeout').val(), 10) || 5000
            };
            if (proto === 's7') {
                params.remoteRack = parseInt($('#s7-remote-rack').val(), 10) || 0;
                params.remoteSlot = parseInt($('#s7-remote-slot').val(), 10) || 1;
            }
            return params;
        }

        function setPollingParams(params, proto) {
            if (!params) {
                $('#s7-remote-rack').val(0);
                $('#s7-remote-slot').val(1);
                $('#polling-timeout').val(5000);
                return;
            }
            $('#polling-timeout').val(params.timeout != null ? params.timeout : 5000);
            if (proto === 's7') {
                $('#s7-remote-rack').val(params.remoteRack != null ? params.remoteRack : 0);
                $('#s7-remote-slot').val(params.remoteSlot != null ? params.remoteSlot : 1);
            }
        }

        get(router.gw_protocols, null, function (result) {
            $.each(result, function (index, item) {
                $('#protocol').append(new Option(item.name, item.id));
            });
            form.render();
            form.on('select(protocol-select)', function (data) {
                toggleByProtocol(data.value);
            });
            // 新建时协议默认选第一个
            if (!id && result && result.length > 0) {
                $('#protocol').val(result[0].id);
                form.render('select');
                toggleByProtocol(result[0].id);
            }
        });

        var id = layui.url().search.id;
        if (id) {
            get(router.gw_id, {id: id}, function (result) {
                current_row_data = result;
                form.val("common-edit-form", Object.assign({}, current_row_data));
                toggleByProtocol(result.protocol);
                var proto = result.protocol ? String(result.protocol).toLowerCase() : '';
                if (isPollingProtocol(proto) && result.params) {
                    try {
                        var p = typeof result.params === 'string' ? JSON.parse(result.params) : result.params;
                        setPollingParams(p, proto);
                    } catch (e) {
                    }
                }
            });
        } else {
            form.val("common-edit-form", {});
            current_row_data = {};
        }

        form.on('submit(common-edit-btn)', function (data) {
            var field = data.field; // 获取表单字段值
            for (let key in field) {
                current_row_data[key] = field[key];
            }
            var protocol = (current_row_data.protocol || '').toLowerCase();
            if (isPollingProtocol(protocol)) {
                current_row_data.params = JSON.stringify(buildPollingParams(protocol));
            }
            post(router.gw_edit, current_row_data, function () {
                var index = parent.layer.getFrameIndex(window.name);
                parent.layer.close(index);
                if (parent.reloadTb) parent.reloadTb();
            }, function (code, msg) {
                layer.alert(msg, {title: 'error'});
            });
            return false;
        });
    });
</script>
</body>
</html>
