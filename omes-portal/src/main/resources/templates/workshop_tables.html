<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>场景管理</title>
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
    <style>
        /* 场景管理页 - 页面头部 */
        .workshop-tables-page { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .workshop-page-header {
            margin-bottom: 20px;
            padding: 20px 24px;
            background: linear-gradient(135deg, var(--bg-panel) 0%, var(--bg-panel-alt) 100%);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            box-shadow: var(--shadow-card);
        }
        .workshop-page-header .header-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: var(--color-primary-soft);
            color: var(--color-primary);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 24px; margin-right: 16px; vertical-align: middle;
        }
        .workshop-page-header .header-title {
            font-size: 20px; font-weight: 600; color: var(--text-main);
            margin: 0 0 4px 0; vertical-align: middle;
        }
        .workshop-page-header .header-desc {
            font-size: 13px; color: var(--text-sub);
            margin: 0; padding-left: 64px;
        }
    </style>
</head>
<body>
<div class="layui-tab-content workshop-tables-page">
    <div class="workshop-page-header" id="workshop-page-header">
        <span class="header-icon"><i class="layui-icon layui-icon-tree"></i></span>
        <h1 class="header-title" lang-i18n="workshop.tables.title">场景管理</h1>
        <p class="header-desc" lang-i18n="workshop.tables.desc">按树形管理产线/车间场景，支持配置采集与工艺组态</p>
    </div>
    <table class="layui-hide" id="tb-common"></table>
</div>
<script type="text/html" id="common-tool">
    <div class="layui-clear-space">
        <a class="layui-btn layui-btn-xs layui-btn-primary" lay-event="edit">
            <i class="layui-icon layui-icon-edit"></i>
        </a>
        <a class="layui-btn layui-btn-xs layui-btn-primary layui-bg-red" lay-event="del">
            <i class="layui-icon layui-icon-delete"></i>
        </a>
        <a class="layui-btn layui-btn-xs layui-btn-primary" lay-event="add">
            <i class="layui-icon layui-icon-add-1"></i>
        </a>
        <a class="layui-btn layui-btn-xs layui-btn-blue" lay-event="collect">
            <i class="layui-icon layui-icon-util"></i>
        </a>
        <a class="layui-btn layui-btn-xs layui-btn-blue" lay-event="scada">
            <i class="layui-icon layui-icon-layouts"></i>
        </a>
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="meta2d">
            <i class="layui-icon layui-icon-picture"></i>
        </a>
    </div>
</script>
<script type="text/html" id="common-toolbar">
    <div class="layui-btn-container">
        <a class="layui-btn layui-btn-sm layui-btn-primary" lay-event="add">
            <i class="layui-icon layui-icon-add-1"></i>
        </a>
        <button class="layui-btn layui-btn-sm layui-btn-primary" id="rowMode">
            <span>{{= d.lineStyle ? i18np.prop('common.mode.multi') : i18np.prop('common.mode.single') }}</span>
            <i class="layui-icon layui-icon-down layui-font-12"></i>
        </button>
    </div>
</script>
<script type="text/html" id="picker-toolbar">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-sm layui-btn-normal" id="picker-confirm">确定</button>
        <button class="layui-btn layui-btn-sm layui-btn-primary" id="picker-cancel">取消</button>
    </div>
</script>

<script th:inline="none">
    var current_row_data;
    var table;
    var isPickerMode = (function () {
        var s = (typeof layui !== 'undefined' && layui.url && layui.url()) ? layui.url().search : {};
        return (s.mode || '') === 'picker';
    })();
    var isSinglePicker = (function () {
        var s = (typeof layui !== 'undefined' && layui.url && layui.url()) ? layui.url().search : {};
        return String(s.single || s.singlePicker || '') === '1' || String(s.single || '').toLowerCase() === 'true';
    })();
    var pickerConfirmCallback = null;

    window.setPickerCallback = function (cb) {
        pickerConfirmCallback = cb;
    };

    layui.use(function () {
        table = layui.treeTable;
        var dropdown = layui.dropdown;

        var baseCols = [
            {type: 'checkbox', title: '', fixed: true},
            {field: 'name', title: i18np.prop('workshop.name')},
            {field: 'selfCode', title: i18np.prop('workshop.code')}
        ];
        if (!isPickerMode) {
            baseCols.push({
                fixed: 'right',
                title: i18np.prop('common.operate'),
                width: 200,
                minWidth: 125,
                templet: '#common-tool'
            });
        }

        var page = {
            cols: [baseCols],
            toolbar: isPickerMode ? '#picker-toolbar' : '#common-toolbar',
            defaultToolbar: isPickerMode ? [] : ['filter', 'exports', 'print'],
        };

        // 创建表格实例
        table.render({
            elem: '#tb-common',
            url: initRequestUrl(router.workshop_tree),
            headers: getCommonHeader(),
            method: 'GET',
            toolbar: page.toolbar,
            defaultToolbar: page.defaultToolbar,
            cols: page.cols,
            done: function () {
                if (isPickerMode) {
                    $('.header-title').text('选择场景');
                    $('.header-desc').hide();
                    $('#picker-confirm').on('click', function () {
                        var checkStatus = table.checkStatus('tb-common');
                        var data = (checkStatus && checkStatus.data) ? checkStatus.data : [];
                        if (typeof pickerConfirmCallback === 'function') {
                            pickerConfirmCallback(data);
                        } else {
                            try {
                                if (parent.inspectPlanEditPickerReceiver && parent.inspectPlanEditPickerReceiver.workshopPickerCallbackReceiver) {
                                    parent.inspectPlanEditPickerReceiver.workshopPickerCallbackReceiver(data);
                                }
                            } catch (e) {}
                            parent.layer.close(parent.layer.getFrameIndex(window.name));
                        }
                    });
                    $('#picker-cancel').on('click', function () {
                        parent.layer.close(parent.layer.getFrameIndex(window.name));
                    });

                    // 单选 picker：任意勾选一个后，自动取消其他勾选
                    if (isSinglePicker) {
                        // 由于 treeTable 的 DOM 渲染是异步的，延迟一帧绑定
                        setTimeout(function () {
                            var $container = $('#tb-common');
                            // 避免重复绑定
                            $container.off('change.moSinglePicker');
                            $container.on('change.moSinglePicker', 'input[type="checkbox"]', function () {
                                if (!this.checked) return;
                                var $all = $container.find('.layui-table-body input[type="checkbox"]');
                                $all.not(this).prop('checked', false);
                                try {
                                    // layui 的 checkbox 样式同步（如果可用）
                                    if (layui && layui.form && typeof layui.form.render === 'function') {
                                        layui.form.render('checkbox');
                                    }
                                } catch (e) {
                                    // ignore
                                }
                            });
                        }, 0);
                    }
                    return;
                }
                // 行模式
                dropdown.render({
                    elem: '#rowMode',
                    data: [{
                        id: 'default-row',
                        title: i18np.prop('common.mode.single')
                    }, {
                        id: 'multi-row',
                        title: i18np.prop('common.mode.multi')
                    }],
                    click: function (obj) {
                        switch (obj.id) {
                            case 'default-row':
                                table.reload('tb-common', { lineStyle: null });
                                break;
                            case 'multi-row':
                                table.reload('tb-common', { lineStyle: 'height: 95px;' });
                                break;
                        }
                    }
                });
            },
            response: {
                statusName: 'code',
                statusCode: 200,
            },
            parseData: function (res) {
                return { "code": res.code, "msg": res.msg, "data": res.data };
            },
            page: false,
            maxHeight: isPickerMode ? '70vh' : '501px',
        });

        if (!isPickerMode) {
            // 工具栏事件
            table.on('toolbar(tb-common)', function (obj) {
                var id = obj.config.id;
                var checkStatus = table.checkStatus(id);
                switch (obj.event) {
                    case 'getCheckData':
                        var data = checkStatus.data;
                        if (data.length === 0) return layer.msg(i18np.prop('common.msg.least.one'));
                        layer.alert(layui.util.escape(JSON.stringify(data)));
                        break;
                    case 'getData':
                        layer.alert(layui.util.escape(JSON.stringify(table.getData(id))));
                        break;
                    case 'add':
                        current_row_data = null;
                        openWindow('common.add', '/view/workshop_form_edit', ['60%', '35%']);
                        break;
                }
            });

            table.on('tool(tb-common)', function (obj) {
                var data = obj.data;
                current_row_data = data;
                if (obj.event === 'edit') {
                    openWindow('common.edit', '/view/workshop_form_edit', ['60%', '35%']);
                } else if (obj.event === 'del') {
                    delWindow(router.workshop_del, [data.id], reloadTb);
                } else if (obj.event === 'add') {
                    current_row_data = null;
                    openWindow('common.add', '/view/workshop_form_edit?pcode=' + data.code, ['60%', '35%']);
                } else if (obj.event === 'collect') {
                    openAreaWindow('workshop.collect', '/view/workshop_config_collect?id=' + data.id, ['80%', '100%']);
                } else if (obj.event === 'scada') {
                    openWindow('workshop.scada', '/view/workshop_config_scada?id=' + data.id, ['60%', '70%']);
                } else if (obj.event === 'meta2d') {
                    var q = 'workshopId=' + encodeURIComponent(data.id) + '&workshopCode=' + encodeURIComponent(data.selfCode || '') + '&workshopName=' + encodeURIComponent(data.name || '');
                    // 本地开发：使用 Vite dev server（5174）
                    window.open('http://localhost:5174/meta2d/#/edit?' + q, '_blank');
                }
            });

            var tableInst = table.getOptions('tb-common');
            if (tableInst && tableInst.elem && tableInst.elem.next) {
                tableInst.elem.next().find('.layui-table-main').on('scroll', function () {
                    dropdown.close('dropdown-table-tool');
                });
            }
        }
    });

    function reloadTb() {
        table.reloadData('tb-common');
    }


</script>
</body>
</html>
