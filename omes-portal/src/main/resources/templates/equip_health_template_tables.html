<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
</head>
<body>
<div class="layui-tab-content form-table-layout">
    <div class="form-table-wrap">
        <table class="layui-hide" id="tb-template"></table>
    </div>
</div>

<script type="text/html" id="tb-toolbar">
    <div class="layui-btn-container">
        <a class="layui-btn layui-btn-sm layui-btn-primary" lay-event="add">
            <i class="layui-icon layui-icon-add-1"></i> <span lang-i18n="common.add"></span>
        </a>
    </div>
</script>

<script type="text/html" id="tpl-operate">
    <a class="layui-btn layui-btn-xs layui-btn-primary" lay-event="edit"><i class="layui-icon layui-icon-edit"></i></a>
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="computeByTemplate" title=""><i
            class="layui-icon layui-icon-ok-circle"></i> <span lang-i18n="equipHealth.startScoring"></span></a>
</script>

<script th:inline="none">
    var table;
    layui.use(function () {
        table = layui.table;
        var layer = layui.layer;

        table.render({
            elem: '#tb-template',
            id: 'tb-template',
            url: initRequestUrl(router.equip_health_listTemplates),
            method: 'GET',
            headers: getCommonHeader(),
            toolbar: '#tb-toolbar',
            defaultToolbar: [],
            cols: [[
                {type: 'numbers', title: 'NO'},
                {field: 'name', title: i18np.prop('equipHealth.templateName'), minWidth: 140},
                {field: 'periodHours', title: i18np.prop('equipHealth.periodHours'), width: 110},
                {field: 'healthyThreshold', title: i18np.prop('equipHealth.healthyThreshold'), width: 90},
                {field: 'attentionThreshold', title: i18np.prop('equipHealth.attentionThreshold'), width: 100},
                {field: 'warningThreshold', title: i18np.prop('equipHealth.warningThreshold'), width: 90},
                {
                    title: i18np.prop('common.operate'),
                    width: 160,
                    fixed: 'right',
                    templet: '#tpl-operate'
                }
            ]],
            response: {statusName: 'code', statusCode: 200},
            parseData: function (res) {
                return {code: res.code, msg: res.msg, data: res.data || []};
            },
            page: false,
            height: '500px'
        });

        table.on('toolbar(tb-template)', function (obj) {
            if (obj.event === 'add') {
                current_row_data = null;
                openWindow('equipHealth.templateAdd', '/view/equip_health_template_edit', ['520px', '85%'], function () {
                    if (window.reloadTb) window.reloadTb();
                });
            }
        });

        table.on('tool(tb-template)', function (obj) {
            var d = obj.data;
            if (obj.event === 'edit') {
                current_row_data = d;
                openWindow('equipHealth.templateEdit', '/view/equip_health_template_edit?id=' + d.id, ['520px', '85%'], function () {
                    if (window.reloadTb) window.reloadTb();
                });
            } else if (obj.event === 'computeByTemplate') {
                var loadIdx = layer.load(1, {shade: 0.3});
                get(router.equip_health_computeByTemplate, {templateId: d.id}, function (res) {
                    layer.close(loadIdx);
                    var data = res && res.data;
                    var count = data && data.count != null ? data.count : 0;
                    var msg = (data && data.message) ? data.message : (i18np.prop('equipHealth.computeByTemplateDone') || '已对 ' + count + ' 台关联设备完成评分');
                    layer.msg(msg);
                }, function (code, msg) {
                    layer.close(loadIdx);
                    layer.alert(msg || (i18np.prop('common.msg.operateFailed') || '操作失败'), {title: i18np.prop('common.msg.error') || '错误'});
                });
            }
        });

        window.reloadTb = function () {
            table.reload('tb-template');
        };
    });
</script>
</body>
</html>
