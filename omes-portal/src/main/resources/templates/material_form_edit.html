<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <style>
        .material-form-edit {
            box-sizing: border-box;
            min-height: 100%;
            padding: 20px 24px 24px;
        }

        .material-form-edit .layui-form-pane .layui-form-item {
            margin-bottom: 14px;
        }

        .material-form-edit__actions {
            margin-top: 4px;
            margin-bottom: 0 !important;
            padding-top: 18px;
            border-top: 1px solid var(--border-base);
        }

        .material-form-edit__actions .layui-input-block {
            text-align: right;
        }

        .material-form-edit__actions .layui-btn + .layui-btn {
            margin-left: 10px;
        }
    </style>
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
</head>
<body>
<div class="material-form-edit">
    <form class="layui-form layui-form-pane" action="" id="common-edit-form" lay-filter="common-edit-form">
        <div class="layui-form-item">
            <label class="layui-form-label" lang-i18n="material.name"></label>
            <div class="layui-input-block">
                <input type="text" name="name" autocomplete="off" lay-verify="required"
                       class="layui-input" lang-i18n="common.placeholder">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label" lang-i18n="material.code"></label>
            <div class="layui-input-block">
                <input type="text" name="selfCode" autocomplete="off" lay-verify="required"
                       class="layui-input lay-unable-edit" lang-i18n="common.placeholder">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label" lang-i18n="material.classify"></label>
            <div class="layui-input-block">
                <select name="classifyCode" id="classifyCode">
                    <option value=""></option>
                </select>
            </div>
        </div>
        <div class="layui-form-item material-form-edit__actions">
            <div class="layui-input-block">
                <button class="layui-btn" lay-submit lay-filter="common-edit-button" lang-i18n="common.msg.confirm">确认
                </button>
                <button type="reset" class="layui-btn layui-btn-primary" lang-i18n="common.msg.reset">重置</button>
            </div>
        </div>
    </form>
</div>
<script>
    var current_row_data = parent.current_row_data;
    var mc = parent.mc;
    layui.use(['form', 'layer'], function () {
        var form = layui.form,
            layer = layui.layer;

        if (mc == null) {
            var param = {
                "requirePage": false
            };
            post(router.mc_page, param, function (result) {
                mc = result;
            });
        }
        if (mc != null) {
            $.each(mc, function (index, item) {
                //option  第一个参数是页面显示的值，第二个参数是传递到后台的值
                $('#classifyCode').append(new Option(item.name, item.selfCode));//往下拉菜单里添加元素
            });
        }
        form.render();

        if (current_row_data != null) {
            form.val("common-edit-form", {
                "name": current_row_data.name,
                "selfCode": current_row_data.selfCode,
                "classifyCode": current_row_data.classifyCode,
            });
            if (current_row_data.selfCode != null && current_row_data.selfCode !== "") {
                $(".lay-unable-edit").prop("disabled", true);
                form.render();
            }
        } else {
            form.val("common-edit-form", {
                "name": "",
                "selfCode": "",
                "classifyCode": ""
            });
            current_row_data = {};
        }
        // 提交事件
        form.on('submit(common-edit-button)', function (data) {
            var field = data.field; // 获取表单字段值
            current_row_data.name = field.name;
            current_row_data.selfCode = field.selfCode;
            current_row_data.classifyCode = field.classifyCode;

            post(router.mat_edit, current_row_data, function () {
                var index = parent.layer.getFrameIndex(window.name);
                parent.layer.close(index);
                parent.reloadMaterialTb();
            }, function (code, msg) {
                layer.alert(msg, {
                    title: 'error'
                });
            })
            return false;
        });
    });
</script>
</body>
</html>
