<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>巡检项</title>
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
    <style>
        .item-edit-page { overflow-y: auto; min-height: 100%; padding: 16px 20px 24px; box-sizing: border-box; }
        .item-card { background: #fff; border: 1px solid #eee; border-radius: 6px; margin-bottom: 16px; }
        .item-card-title { padding: 10px 16px; background: #f8f8f8; border-bottom: 1px solid #eee; font-weight: 600; color: #333; font-size: 14px; }
        .item-card-body { padding: 18px 20px; }
        .item-row { display: flex; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
        .item-row:last-child { margin-bottom: 0; }
        .item-label { width: 100px; flex-shrink: 0; color: #333; font-size: 14px; }
        .item-field { flex: 1; min-width: 200px; }
        .item-field .layui-input { width: 100%; max-width: 360px; }
        .item-actions { margin-top: 8px; padding-top: 20px; border-top: 1px solid #eee; }
        .item-actions .layui-btn { margin-right: 10px; }
    </style>
</head>
<body>
<div class="item-edit-page">
    <form id="item-form" class="layui-form" lay-filter="item-form">
        <input type="hidden" name="id">
        <div class="item-card">
            <div class="item-card-title">巡检项信息</div>
            <div class="item-card-body">
                <div class="item-row">
                    <span class="item-label">巡检项名</span>
                    <div class="item-field">
                        <input type="text" name="itemName" required lay-verify="required" placeholder="如：运行状态、运行电流" class="layui-input" autocomplete="off">
                    </div>
                </div>
                <div class="item-row">
                    <span class="item-label">类型</span>
                    <div class="item-field">
                        <select name="itemType" id="itemType">
                            <option value="1">选择</option>
                            <option value="2" selected>数值</option>
                            <option value="3">是否</option>
                        </select>
                    </div>
                </div>
                <div class="item-row">
                    <span class="item-label">单位</span>
                    <div class="item-field">
                        <input type="text" name="unit" placeholder="A、MPa、正常/不足" class="layui-input" autocomplete="off">
                    </div>
                </div>
                <div class="item-row">
                    <span class="item-label">最小值</span>
                    <div class="item-field">
                        <input type="number" step="0.0001" name="minValue" placeholder="仅数值型有效" class="layui-input" autocomplete="off">
                    </div>
                </div>
                <div class="item-row">
                    <span class="item-label">最大值</span>
                    <div class="item-field">
                        <input type="number" step="0.0001" name="maxValue" placeholder="仅数值型有效" class="layui-input" autocomplete="off">
                    </div>
                </div>
                <div class="item-row">
                    <span class="item-label">是否必填</span>
                    <div class="item-field">
                        <input type="checkbox" name="requiredFlag" lay-skin="switch" lay-text="是|否">
                    </div>
                </div>
            </div>
        </div>
        <div class="item-actions">
            <button type="button" class="layui-btn" id="btn-save">保存</button>
            <button type="button" class="layui-btn layui-btn-primary" id="btn-cancel">取消</button>
        </div>
    </form>
</div>
<script>
    layui.use(['form', 'layer'], function () {
        var form = layui.form, layer = layui.layer;
        var id = layui.url().search.id;

        function toggleNumericFields() {
            var typeVal = parseInt($('#itemType').val(), 10) || 2;
            var isNumeric = typeVal === 2;
            var $rows = $('input[name="minValue"],input[name="maxValue"],input[name="requiredFlag"]')
                .closest('.item-row');
            if (isNumeric) {
                $rows.show();
            } else {
                $rows.hide();
            }
        }

        if (id) {
            get(router.inspect_item_id, { id: id }, function (data) {
                if (data) {
                    $('input[name="id"]').val(data.id);
                    $('input[name="itemName"]').val(data.itemName || '');
                    $('select[name="itemType"]').val(data.itemType != null ? String(data.itemType) : '2');
                    $('input[name="unit"]').val(data.unit || '');
                    $('input[name="minValue"]').val(data.minValue != null ? data.minValue : '');
                    $('input[name="maxValue"]').val(data.maxValue != null ? data.maxValue : '');
                    $('input[name="requiredFlag"]').prop('checked', !!data.requiredFlag);
                    form.render('select');
                    form.render('checkbox');
                    toggleNumericFields();
                }
            });
        }

        form.on('select', function (data) {
            if (data.elem && data.elem.name === 'itemType') {
                toggleNumericFields();
            }
        });

        // 初始化时根据默认类型控制展示
        toggleNumericFields();

        $('#btn-save').on('click', function () {
            var itemName = ($('input[name="itemName"]').val() || '').trim();
            if (!itemName) {
                layer.msg('请输入巡检项名');
                return;
            }
            var typeVal = parseInt($('select[name="itemType"]').val(), 10) || 2;
            var minVal = $('input[name="minValue"]').val();
            var maxVal = $('input[name="maxValue"]').val();
            var dto = {
                id: ($('input[name="id"]').val() || '').trim() || null,
                templateId: null,
                itemName: itemName,
                itemType: typeVal,
                unit: ($('input[name="unit"]').val() || '').trim() || null,
                minValue: minVal !== '' ? parseFloat(minVal) : null,
                maxValue: maxVal !== '' ? parseFloat(maxVal) : null,
                requiredFlag: $('input[name="requiredFlag"]').prop('checked')
            };
            post(router.inspect_item_edit, dto, function () {
                var index = parent.layer.getFrameIndex(window.name);
                parent.layer.close(index);
                if (parent.reloadTb) parent.reloadTb();
            }, function (code, msg) {
                layer.msg(msg || '保存失败');
            });
        });

        $('#btn-cancel').on('click', function () {
            var index = parent.layer.getFrameIndex(window.name);
            parent.layer.close(index);
        });
    });
</script>
</body>
</html>
