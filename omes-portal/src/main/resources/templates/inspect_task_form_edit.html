<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
</head>
<body>
<div style="padding: 16px;">
    <form class="layui-form layui-form-pane" id="inspect-task-form" lay-filter="inspect-task-form">
        <input type="hidden" name="id">
        <input type="hidden" name="planId">
        <div class="layui-form-item">
            <label class="layui-form-label">所属计划</label>
            <div class="layui-input-block">
                <input type="text" name="planName" id="planNameDisplay" placeholder="选择计划" readonly class="layui-input layui-disabled">
                <a class="layui-btn layui-btn-sm" id="btn-select-plan" style="margin-top:4px;">选择计划</a>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">计划执行时间</label>
            <div class="layui-input-block">
                <input type="text" name="scheduledTime" id="scheduledTime" placeholder="选择时间" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-block">
                <select name="status" id="statusSelect">
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">执行人ID</label>
            <div class="layui-input-block">
                <input type="text" name="executorId" placeholder="执行人ID" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">执行人姓名</label>
            <div class="layui-input-block">
                <input type="text" name="executorName" placeholder="执行人姓名" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">关联场景</label>
            <div class="layui-input-block">
                <select name="workshopCode" id="workshopCodeSelect">
                    <option value="">按计划范围</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">备注</label>
            <div class="layui-input-block">
                <textarea name="remark" placeholder="请输入备注" class="layui-textarea"></textarea>
            </div>
        </div>
        <div class="layui-form-item">
            <button class="layui-btn" lay-submit lay-filter="inspect-task-submit">保存</button>
        </div>
    </form>
</div>
<script>
    var current = {};
    layui.use(['form', 'layer', 'laydate'], function () {
        var form = layui.form, layer = layui.layer, laydate = layui.laydate;
        laydate.render({ elem: '#scheduledTime', type: 'datetime' });
        var id = layui.url().search.id;
        var planIdParam = layui.url().search.planId;
        if (planIdParam) {
            current.planId = planIdParam;
            get(router.inspect_plan_id, { id: planIdParam }, function (p) {
                if (p) { current.planName = p.name; $('#planNameDisplay').val(p.name); }
            });
        }
        function fillStatusOptions(done) {
            get(router.inspect_task_statusTypes, {}, function (statusMap) {
                var $sel = $('#statusSelect');
                $sel.find('option').remove();
                $sel.append('<option value="">请选择</option>');
                if (statusMap && typeof statusMap === 'object') {
                    var keys = Object.keys(statusMap).filter(function (k) { return statusMap.hasOwnProperty(k); }).sort(function (a, b) { return Number(a) - Number(b); });
                    keys.forEach(function (k) { $sel.append('<option value="' + k + '">' + statusMap[k] + '</option>'); });
                }
                form.render('select');
                if (typeof done === 'function') done();
            });
        }
        function fillWorkshopOptions(done) {
            get(router.workshop_tree, null, function (tree) {
                var $sel = $('#workshopCodeSelect');
                $sel.find('option:not(:first)').remove();
                function walk(nodes) {
                    if (!nodes || !nodes.length) return;
                    nodes.forEach(function (n) {
                        if (n.selfCode) {
                            $sel.append('<option value="' + (n.selfCode || '') + '">' + (n.name || n.selfCode) + '</option>');
                        }
                        if (n.children && n.children.length) walk(n.children);
                    });
                }
                walk(tree);
                form.render('select');
                if (typeof done === 'function') done();
            });
        }
        fillStatusOptions(function () {
            fillWorkshopOptions(function () {
            if (id) {
                get(router.inspect_task_id, { id: id }, function (data) {
                    current = data;
                    form.val('inspect-task-form', {
                        id: data.id, planId: data.planId, planName: data.planName,
                        scheduledTime: data.scheduledTime ? data.scheduledTime.replace('T', ' ') : '',
                        status: String(data.status != null ? data.status : 0),
                        executorId: data.executorId, executorName: data.executorName,
                        workshopCode: data.workshopCode || '',
                        remark: data.remark
                    });
                    $('#planNameDisplay').val(data.planName);
                    form.render();
                });
            }
            });
        });
        $('#btn-select-plan').on('click', function () {
            layer.open({
                type: 2, title: '选择巡检计划', area: ['700px', '450px'],
                content: '/view/inspect_plan_tables',
                btn: ['确定'],
                yes: function (idx, layero) {
                    var iframeWin = layero.find('iframe')[0].contentWindow;
                    var checkStatus = iframeWin.table ? iframeWin.table.checkStatus('tb-inspect-plan') : null;
                    if (!checkStatus || !checkStatus.data || checkStatus.data.length === 0) {
                        layer.msg('请选择一条计划'); return;
                    }
                    var row = checkStatus.data[0];
                    current.planId = row.id; current.planName = row.name;
                    $('#planNameDisplay').val(row.name); $('input[name="planId"]').val(row.id);
                    layer.close(idx);
                }
            });
        });
        form.on('submit(inspect-task-submit)', function (data) {
            var field = data.field;
            var workshopCode = (field.workshopCode && String(field.workshopCode).trim()) ? String(field.workshopCode).trim() : null;
            var dto = {
                id: field.id, planId: current.planId || field.planId,
                scheduledTime: field.scheduledTime ? field.scheduledTime.replace(' ', 'T') + ':00' : null,
                status: parseInt(field.status, 10), executorId: field.executorId || null, executorName: field.executorName || null,
                workshopCode: workshopCode, remark: field.remark
            };
            post(router.inspect_task_edit, dto, function () {
                var index = parent.layer.getFrameIndex(window.name);
                parent.layer.close(index);
                if (parent.reloadTb) parent.reloadTb();
            }, function (code, msg) { layer.msg(msg || '保存失败'); });
            return false;
        });
    });
</script>
</body>
</html>
