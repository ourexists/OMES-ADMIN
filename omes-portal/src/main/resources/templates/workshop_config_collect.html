<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
    <style>
        .json-container {
            display: flex;
            gap: 16px;
        }

        .json-box {
            flex: 1;
            padding: 10px;
        }

        .json-box textarea {
            width: 100%;
            height: 400px;
            font-family: monospace;
            font-size: 13px;
            padding: 8px;
            resize: none;
        }

        .json-box .title {
            font-weight: bold;
            margin-bottom: 8px;
        }

        #json-template {
            font-weight: bold;
        }
    </style>
</head>
<body>
<div style="padding: 16px;">
    <form class="layui-form layui-form-pane" action="" id="common-edit-form" lay-filter="common-edit-form">
        <div class="layui-form-item">
            <label class="layui-form-label" lang-i18n="data.collect_type" style="font-weight: bold;"></label>
            <div class="layui-input-block">
                <select name="collectType" id="collectType">
                </select>
            </div>
        </div>
        <div class="json-container">
            <div class="json-box">
                <div class="title" lang-i18n="workshop.config_collect_json">采集配置(JSON)</div>
                <textarea id="json-input" placeholder='{"attrs":[]}'></textarea>
            </div>
            <div class="json-box">
                <div class="title">配置模板示例</div>
                <textarea id="json-template" readonly disabled></textarea>
            </div>
        </div>

        <div class="layui-form-item" style="text-align: right; margin-top: 10px">
            <button class="layui-btn" lay-submit lay-filter="common-edit-button"
                    lang-i18n="common.msg.confirm"></button>
        </div>
    </form>
</div>
<script th:inline="none">
    var current_data;
    layui.use(function () {
        let form = layui.form,
            layer = layui.layer;

        const jsonTemplate = {
            attrs: {
                comment: (i18np.prop("workshop.config_collect_attrs") || "采集项配置"),
                value: [
                    {
                        name: { value: "attributeName", comment: (i18np.prop("workshop.config_collect_name") || "名称") },
                        map: { value: "mapField", comment: (i18np.prop("workshop.config_collect_map") || "映射") },
                        value: { value: "defaultValue", comment: (i18np.prop("workshop.config_collect_value") || "默认值") },
                        unit: { value: "", comment: (i18np.prop("equipattr.unit") || "单位") },
                        needCollect: { value: true, comment: (i18np.prop("data.collect") || "是否采集") }
                    }
                ]
            }
        };
        $('#json-template').val(renderJsonWithComment(jsonTemplate));

        let id = layui.url().search.id;

        get(router.workshop_collect_type, null, function (result) {
            $.each(result, function (index, item) {
                $('#collectType').append(new Option(item, item));
            });
            form.render();
        });

        get(router.workshop_config_collect, {"workshopId": id}, function (r) {
            if (r == null) {
                current_data = {};
                form.val("common-edit-form", {});
                $('#json-input').val(JSON.stringify({ attrs: [] }, null, 4));
            } else {
                current_data = r.config || {};
                form.val("common-edit-form", Object.assign({}, current_data));
                var jsonText = JSON.stringify(
                    current_data,
                    function (key, value) { return key === "collectType" ? undefined : value; },
                    4);
                $('#json-input').val(jsonText || '{"attrs":[]}');
            }
        });

        form.on('submit(common-edit-button)', function (data) {
            var raw = $("#json-input").val().trim();
            if (!raw) {
                layer.msg(i18np.prop("common.msg.json_invalid") || "请填写有效 JSON");
                return false;
            }
            var configJSON;
            try {
                configJSON = JSON.parse(raw);
            } catch (e) {
                layer.msg((i18np.prop("common.msg.json_invalid") || "JSON 格式错误") + ": " + e.message);
                return false;
            }
            var field = data.field;
            for (var key in field) {
                configJSON[key] = field[key];
            }
            if (!configJSON.attrs) {
                configJSON.attrs = [];
            }
            post(router.workshop_setConfig_collect, {
                "workshopId": id,
                "config": configJSON
            }, function () {
                var index = parent.layer.getFrameIndex(window.name);
                parent.layer.close(index);
            }, function (code, msg) {
                layer.alert(msg, { title: 'error' });
            });
            return false;
        });
    });
</script>
</body>
</html>
