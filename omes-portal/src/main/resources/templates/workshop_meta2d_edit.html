<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <link rel="stylesheet" href="../static/tree-select/treeSelect.css">
    <link rel="stylesheet" href="../static/fullscreen/fullscreen.css">

    <!-- Meta2d 本地资源（请将 Meta2d dist 放到 static/vendor/meta2d/ 下） -->
    <link rel="stylesheet" href="../static/vendor/meta2d/meta2d.css">

    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
    <script src="../static/tree-select/treeSelect.js"></script>
    <script src="../static/fullscreen/fullscreen.js"></script>
    <script src="../static/vendor/meta2d/meta2d.min.js"></script>
</head>
<style>
    .meta2d-page {
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 10px;
        box-sizing: border-box;
    }

    .meta2d-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px;
        border: 1px solid #e4e6eb;
        border-radius: 6px;
        background: var(--bg-card, #fff);
    }

    .meta2d-body {
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        grid-template-columns: 280px 1fr 320px;
        gap: 10px;
    }

    .panel {
        border: 1px solid #e4e6eb;
        border-radius: 6px;
        background: var(--bg-card, #fff);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    .panel-title {
        padding: 10px 12px;
        font-weight: 600;
        border-bottom: 1px solid #eef0f4;
        color: var(--text-primary, #222);
    }

    .panel-body {
        padding: 10px 12px;
        overflow: auto;
        min-height: 0;
    }

    #meta2dContainer {
        width: 100%;
        height: 100%;
        background: #f7f8fa;
    }

    .kv {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
    }

    .kv label {
        color: var(--text-secondary, #666);
        font-size: 12px;
    }

    .help {
        margin-top: 6px;
        color: var(--text-secondary, #666);
        font-size: 12px;
        line-height: 1.5;
    }
</style>
<body>
<div class="meta2d-page">
    <div class="meta2d-toolbar">
        <div>
            <span class="layui-badge layui-bg-blue">Meta2d 场景组态</span>
            <span class="layui-badge-rim" id="currentWorkshopName">未选择场景</span>
        </div>
        <div>
            <button class="layui-btn layui-btn-sm layui-btn-primary" id="btnReload">重新加载</button>
            <button class="layui-btn layui-btn-sm" id="btnSave">保存</button>
            <button class="layui-btn layui-btn-sm layui-btn-warm" id="btnPreview">预览</button>
        </div>
    </div>

    <div class="meta2d-body">
        <div class="panel">
            <div class="panel-title">场景</div>
            <div class="panel-body">
                <div id="sceneTree"></div>
                <div class="help">
                    选择一个场景后可编辑组态；保存后可在预览页运行（先对接“场景采集实时值”）。
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">画布</div>
            <div class="panel-body" style="padding:0;">
                <div id="meta2dContainer"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">绑定（MVP：文本绑定场景采集项）</div>
            <div class="panel-body">
                <div class="kv">
                    <label>当前 PenId</label>
                    <input class="layui-input" id="penId" placeholder="点击画布选择图元" readonly>
                </div>
                <div class="kv">
                    <label>属性</label>
                    <select class="layui-select" id="bindProp">
                        <option value="text">text</option>
                        <option value="color">color</option>
                        <option value="visible">visible</option>
                    </select>
                </div>
                <div class="kv">
                    <label>数据源</label>
                    <select class="layui-select" id="workshopAttrKey">
                        <option value="">请选择（先选择场景）</option>
                    </select>
                </div>
                <div class="kv">
                    <label>说明</label>
                    <div style="font-size:12px;color:#666;">key 默认使用采集项的 <code>map</code></div>
                </div>
                <button class="layui-btn layui-btn-sm layui-btn-fluid" id="btnBind">添加/更新绑定</button>
                <button class="layui-btn layui-btn-sm layui-btn-danger layui-btn-fluid" id="btnUnbind">移除当前 Pen 的绑定</button>
                <hr style="margin:12px 0;">
                <div style="font-weight:600;margin-bottom:8px;">当前绑定列表</div>
                <pre id="bindingsPreview" style="background:#0b1020;color:#d7e2ff;padding:10px;border-radius:6px;white-space:pre-wrap;"></pre>
                <div class="help">
                    下一步可以扩展：设备实时态绑定、点位(tag)绑定、表达式/阈值/映射等。
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="none">
    var selectedWorkshop = null;
    var meta2d = null;
    var meta2dConfig = { canvas: null, bindings: [], refreshIntervalSec: 2 };

    function queryParam(name) {
        var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)', 'i');
        var r = window.location.search.substr(1).match(reg);
        if (r != null) return decodeURIComponent(r[2]);
        return null;
    }

    function ensureMeta2d() {
        if (meta2d) return true;
        if (typeof Meta2d === 'undefined') {
            layer.alert('未找到 Meta2d 资源：请将 meta2d.min.js/meta2d.css 放到 static/vendor/meta2d/ 下');
            return false;
        }
        meta2d = new Meta2d('meta2dContainer');
        meta2d.on('active', function (pens) {
            try {
                if (pens && pens.length) {
                    $('#penId').val(pens[0].id || '');
                }
            } catch (e) {
            }
        });
        return true;
    }

    function renderBindingsPreview() {
        $('#bindingsPreview').text(JSON.stringify(meta2dConfig.bindings || [], null, 2));
    }

    function loadWorkshopAttrs() {
        if (!selectedWorkshop || !selectedWorkshop.selfCode) return;
        get(router.workshop_realtime_collect, { workshopCode: selectedWorkshop.selfCode }, function (rows) {
            var $sel = $('#workshopAttrKey');
            $sel.empty();
            $sel.append('<option value="">请选择</option>');
            if (rows && rows.length) {
                rows.forEach(function (r) {
                    var key = r.map || '';
                    var label = (r.name || '') + (r.unit ? (' [' + r.unit + ']') : '') + (key ? ('  ' + key) : '');
                    $sel.append('<option value="' + (key || '').replace(/"/g, '&quot;') + '">' + label.replace(/</g, '&lt;') + '</option>');
                });
            }
            layui.form.render('select');
        });
    }

    function loadMeta2dConfig() {
        if (!selectedWorkshop || !selectedWorkshop.id) return;
        get(router.workshop_config_meta2d, { workshopId: selectedWorkshop.id }, function (cfgDto) {
            meta2dConfig = (cfgDto && cfgDto.meta2dConfig) ? cfgDto.meta2dConfig : { canvas: null, bindings: [], refreshIntervalSec: 2 };
            if (!meta2dConfig.bindings) meta2dConfig.bindings = [];
            renderBindingsPreview();
            if (ensureMeta2d()) {
                if (meta2dConfig.canvas) {
                    try { meta2d.open(meta2dConfig.canvas); } catch (e) { }
                } else {
                    try { meta2d.open({ pens: [] }); } catch (e) { }
                }
            }
        });
    }

    function saveMeta2dConfig() {
        if (!selectedWorkshop || !selectedWorkshop.id) {
            layer.msg('请先选择场景');
            return;
        }
        if (!ensureMeta2d()) return;
        var canvas = null;
        try { canvas = meta2d.data ? meta2d.data() : (meta2d.canvas && meta2d.canvas.data ? meta2d.canvas.data() : null); } catch (e) { }
        var dto = {
            workshopId: selectedWorkshop.id,
            meta2dConfig: {
                canvas: canvas,
                bindings: meta2dConfig.bindings || [],
                refreshIntervalSec: meta2dConfig.refreshIntervalSec || 2
            }
        };
        post(router.workshop_set_meta2d, dto, function () {
            layer.msg('保存成功');
        });
    }

    layui.use(function () {
        var form = layui.form;

        // 支持从场景管理页直接带参数打开
        var presetWorkshopId = queryParam('workshopId');
        var presetWorkshopCode = queryParam('workshopCode');
        var presetWorkshopName = queryParam('workshopName');
        if (presetWorkshopId) {
            selectedWorkshop = { id: presetWorkshopId, selfCode: presetWorkshopCode, name: presetWorkshopName };
            $('#currentWorkshopName').text(presetWorkshopName || presetWorkshopCode || presetWorkshopId);
            loadWorkshopAttrs();
            loadMeta2dConfig();
        }

        get(router.workshop_tree, null, function (result) {
            new TreeSelect({
                el: '#sceneTree',
                data: result,
                needVirtualRoot: true,
                virtualRootName: i18np.prop('common.all'),
                customName: { title: 'name', field: 'selfCode' },
                onSelect: function (obj) {
                    selectedWorkshop = obj;
                    $('#currentWorkshopName').text(obj.name || obj.selfCode || '已选择');
                    loadWorkshopAttrs();
                    loadMeta2dConfig();
                }
            });
        });

        $('#btnReload').on('click', function () {
            loadWorkshopAttrs();
            loadMeta2dConfig();
        });
        $('#btnSave').on('click', function () {
            saveMeta2dConfig();
        });
        $('#btnPreview').on('click', function () {
            if (!selectedWorkshop || !selectedWorkshop.id) {
                layer.msg('请先选择场景');
                return;
            }
            var qs = 'workshopId=' + encodeURIComponent(selectedWorkshop.id);
            if (selectedWorkshop.selfCode) qs += '&workshopCode=' + encodeURIComponent(selectedWorkshop.selfCode);
            window.open('/view/workshop_meta2d_view?' + qs, '_blank');
        });

        $('#btnBind').on('click', function () {
            var penId = ($('#penId').val() || '').trim();
            var prop = $('#bindProp').val();
            var key = $('#workshopAttrKey').val();
            if (!penId) return layer.msg('请先在画布中选中一个图元');
            if (!key) return layer.msg('请选择一个场景采集项');

            var list = meta2dConfig.bindings || [];
            var idx = -1;
            for (var i = 0; i < list.length; i++) {
                if (list[i] && list[i].penId === penId && list[i].prop === prop) { idx = i; break; }
            }
            var item = { penId: penId, prop: prop, sourceType: 'WORKSHOP_ATTR', sourceKey: key, options: {} };
            if (idx >= 0) list[idx] = item; else list.push(item);
            meta2dConfig.bindings = list;
            renderBindingsPreview();
            layer.msg('绑定已更新（记得保存）');
        });

        $('#btnUnbind').on('click', function () {
            var penId = ($('#penId').val() || '').trim();
            if (!penId) return layer.msg('请先在画布中选中一个图元');
            meta2dConfig.bindings = (meta2dConfig.bindings || []).filter(function (b) { return b && b.penId !== penId; });
            renderBindingsPreview();
            layer.msg('已移除（记得保存）');
        });

        form.render();
        renderBindingsPreview();
    });
</script>
</body>
</html>
