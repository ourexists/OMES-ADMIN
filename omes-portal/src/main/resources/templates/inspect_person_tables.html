<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>巡检人员</title>
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
</head>
<body>
<div class="layui-tab-content form-table-layout">
    <form class="layui-form layui-row layui-col-space16">
        <div class="layui-col-md2">
            <input type="text" name="name" placeholder="姓名" class="layui-input" id="qName">
        </div>
        <div class="layui-col-md2">
            <input type="text" name="jobNumber" placeholder="工号" class="layui-input" id="qJobNumber">
        </div>
        <div class="layui-col-md2">
            <button class="layui-btn layui-btn-sm" lay-submit lay-filter="inspect-person-search">查询</button>
            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" id="btn-clear">清空</button>
        </div>
    </form>
    <div class="form-table-wrap">
        <table class="layui-hide" id="tb-inspect-person"></table>
    </div>
</div>
<script type="text/html" id="tb-toolbar">
    <div class="layui-btn-container">
        <a class="layui-btn layui-btn-sm" lay-event="add">新增</a>
        <a class="layui-btn layui-btn-sm layui-btn-primary" lay-event="refresh">刷新</a>
        <a class="layui-btn layui-btn-sm layui-bg-red" lay-event="deleteBatch">批量删除</a>
    </div>
</script>
<script type="text/html" id="tb-tool-tpl">
    <div class="layui-clear-space">
        <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-xs layui-bg-red" lay-event="del">删除</a>
    </div>
</script>
<script th:inline="none">
    var table;
    layui.use(['form', 'table'], function () {
        var form = layui.form;
        table = layui.table;
        table.render({
            elem: '#tb-inspect-person',
            id: 'tb-inspect-person',
            url: initRequestUrl(router.inspect_person_page),
            headers: getCommonHeader(),
            method: 'POST',
            contentType: 'application/json',
            toolbar: '#tb-toolbar',
            defaultToolbar: ['filter', 'exports', 'print'],
            cols: [[
                {type: 'checkbox', fixed: true},
                {type: 'numbers', title: 'NO'},
                {field: 'name', title: '姓名', width: 100},
                {field: 'jobNumber', title: '工号', width: 120},
                {field: 'mobile', title: '手机号', width: 120},
                {field: 'accountName', title: '关联账户', width: 120},
                {field: 'remark', title: '备注', minWidth: 120},
                {field: 'createdTime', title: '创建时间', width: 165},
                {fixed: 'right', title: '操作', width: 120, templet: '#tb-tool-tpl'}
            ]],
            request: {pageName: 'page', limitName: 'pageSize'},
            response: {statusName: 'code', statusCode: 200},
            parseData: function (res) {
                var list = (res.data || []).map(function (t) {
                    var row = t ? Object.assign({}, t) : {};
                    row.id = row.id == null ? '' : String(row.id);
                    return row;
                });
                return { code: res.code, msg: res.msg, count: (res.pagination && res.pagination.total) || 0, data: list };
            },
            limit: 10, limits: [10, 20, 50, 100],
            page: true,
            height: 'full'
        });
        form.on('submit(inspect-person-search)', function () {
            table.reloadData('tb-inspect-person', {
                where: {name: $('#qName').val(), jobNumber: $('#qJobNumber').val()},
                page: {curr: 1}
            });
            return false;
        });
        $('#btn-clear').on('click', function () {
            $('#qName').val('');
            $('#qJobNumber').val('');
            form.render();
            table.reloadData('tb-inspect-person', {where: {}, page: {curr: 1}});
        });
        table.on('toolbar(tb-inspect-person)', function (obj) {
            var checkStatus = table.checkStatus('tb-inspect-person');
            var data = checkStatus.data;
            if (obj.event === 'add') {
                openWindow('新增巡检人员', '/view/inspect_person_form_edit');
            } else if (obj.event === 'refresh') {
                table.reloadData('tb-inspect-person');
            } else if (obj.event === 'deleteBatch') {
                if (!data || data.length === 0) {
                    layer.msg('请至少选择一条');
                    return;
                }
                var ids = data.map(function (r) {
                    return r.id;
                });
                delWindow(router.inspect_person_del, ids, reloadTb);
            }
        });
        table.on('tool(tb-inspect-person)', function (obj) {
            var d = obj.data;
            if (obj.event === 'edit') {
                openWindow('编辑巡检人员', '/view/inspect_person_form_edit?id=' + d.id);
            } else if (obj.event === 'del') {
                delWindow(router.inspect_person_del, [d.id], reloadTb);
            }
        });
    });

    function reloadTb() {
        if (typeof table !== 'undefined') table.reloadData('tb-inspect-person');
    }
</script>
</body>
</html>
