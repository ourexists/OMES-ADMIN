    function reloadHealth() {
        if (healthLock) return;
        healthLock = true;
        const workshopCode = selected_tree_node == null ? null : selected_tree_node.selfCode;
        const statDate = new Date();
        statDate.setHours(0, 0, 0, 0);

        function finish(list) {
            const healthy = list.filter(d => (d.healthLevel || 0) === 0).length;
            const attention = list.filter(d => (d.healthLevel || 0) === 1).length;
            const warning = list.filter(d => (d.healthLevel || 0) === 2).length;
            const fault = list.filter(d => (d.healthLevel || 0) === 3).length;
            const total = list.length;
            const avgScore = total > 0
                ? Math.round(list.reduce((s, d) => s + (d.score != null ? d.score : 0), 0) / total)
                : null;

            $('#healthCountHealthy').text(healthy);
            $('#healthCountAttention').text(attention);
            $('#healthCountWarning').text(warning);
            $('#healthCountFault').text(fault);
            $('#healthAvgScore').text(avgScore != null ? avgScore : '--');

            healthLock = false;
        }

        function loadHealthIndicators(snSet) {
            postAsync(router.equip_health_listByStatTime, {
                statTime: formatDate(statDate),
                pageNum: 1,
                pageSize: 9999
            }, function (res) {
                let list = Array.isArray(res) ? res : [];
                if (snSet && snSet.size > 0) {
                    list = list.filter(d => d.sn && snSet.has(d.sn));
                }
                finish(list);
            }, function () {
                finish([]);
            });
        }

        if (workshopCode == null) {
            loadHealthIndicators(null);
            return;
        }
        postAsync(router.equip_page, {
            workshopCode: workshopCode,
            needWorkshopCascade: true,
            requirePage: false,
            pageNum: 1,
            pageSize: 9999
        }, function (e) {
            if (e == null) e = [];
            if (!Array.isArray(e)) e = (e.list != null) ? e.list : [];
            const snSet = new Set(e.map(item => item.selfCode).filter(Boolean));
            loadHealthIndicators(snSet);
        }, function () {
            loadHealthIndicators(null);
        });
    }

    function alarmHtmlEsc(s) {
        if (s == null) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function reloadMessage() {
        if (messageLock) return;
        messageLock = true;
        postAsync(router.message_page, {
            page: 1,
            pageSize: 10,
            platform: client.platform,
            limitCurrentUser: true,
            type: 1
        }, function (res) {
            try {
                const list = res || [];
                let html = '';
                list.forEach(item => {
                    const level = resolveAlarmLevel(item);
                    const levelText = level === 'danger' ? '严重' : (level === 'warn' ? '警告' : '提示');
                    const readBtn = item.readStatus == 0
                        ? `<button type="button" class="alarm-read-btn" onclick='markAlarmRead(${JSON.stringify(item.id)}, this)' title="标记已读"><i class="layui-icon layui-icon-success"></i></button>`
                        : '';
                    const alarmDot = item.readStatus == 0 ? '<div class="alarm-dot"></div>' : '';
                    html += `
                        <div class="alarm-item level-${level} ${item.readStatus == 0 ? 'new' : 'read'}">
                            ${alarmDot}
                            <div class="alarm-body">
                                <div class="alarm-row-top">
                                    <span class="alarm-level-tag level-${level}">${levelText}</span>
                                    <div class="alarm-row-actions">
                                        <span class="alarm-time">${alarmHtmlEsc(item.createdTime)}</span>
                                        ${readBtn}
                                    </div>
                                </div>
                                <div class="alarm-title">${alarmHtmlEsc(item.title)}</div>
                                <div class="alarm-content" title="${alarmHtmlEsc(item.context)}">${alarmHtmlEsc(item.context)}</div>
                            </div>
                        </div>
                    `;
                });
                $('#alarmList').html(html);
            } finally {
                messageLock = false;
            }
        }, function () {
            messageLock = false;
        });
    }

    function resolveAlarmLevel(item) {
        const text = `${item && item.title ? item.title : ''} ${item && item.context ? item.context : ''}`.toLowerCase();
        if (/严重|紧急|critical|fatal|故障|宕机|停机|火警|中断/.test(text)) return 'danger';
        if (/告警|报警|警告|warn|异常|离线|超限|失败|error/.test(text)) return 'warn';
        return 'notice';
    }

    function reloadCount() {
        if (countLock) return;
        countLock = true;
        postAsync(router.equip_count, {
            needWorkshopCascade: true,
            workshopCode: selected_tree_node == null ? null : selected_tree_node.selfCode,
        }, function (result) {
            try {
                $("#totalCount").text(result.total);
                $("#onlineCount").text(result.online);
                $("#offlineCount").text(result.offline);
                $("#alarmCount").text(result.alarm);
                $("#runCount").text(result.run);
                $("#stopCount").text(result.stopped);
                updateKpiWarnState(result);
                renderKpiDelta(result);
                renderStateProgress(result);
                statusChart.setOption({
                    series: [
                        {
                            data: [
                                {value: result.online, name: '在线', itemStyle: {color: TECH_COLORS.online}},
                                {value: result.offline, name: '离线', itemStyle: {color: TECH_COLORS.offline}},
                            ]
                        },
                        {
                            data: [
                                {value: result.run, name: '运行', itemStyle: {color: TECH_COLORS.running}},
                                {value: result.stopped, name: '停止', itemStyle: {color: TECH_COLORS.stopped}},
                                {value: result.alarm, name: '告警', itemStyle: {color: TECH_COLORS.alarm}}
                            ]
                        }
                    ]
                }, false);
                updateAlarmMarquee(result.alarm);
            } finally {
                countLock = false;
            }
        }, function () {
            countLock = false;
        });
    }

    function updateKpiWarnState(result) {
        function toggleWarn(id, active) {
            const numEl = document.getElementById(id);
            if (!numEl) return;
            const box = numEl.closest('.kpi-item');
            if (!box) return;
            box.classList.toggle('warn', !!active);
        }

        toggleWarn('offlineCount', Number(result.offline || 0) > 0);
        toggleWarn('alarmCount', Number(result.alarm || 0) > 0);
    }

    function renderKpiDelta(result) {
        const map = [
            {id: 'totalCount', val: Number(result.total || 0)},
            {id: 'onlineCount', val: Number(result.online || 0)},
            {id: 'offlineCount', val: Number(result.offline || 0)},
            {id: 'alarmCount', val: Number(result.alarm || 0)},
            {id: 'runCount', val: Number(result.run || 0)},
            {id: 'stopCount', val: Number(result.stopped || 0)},
        ];
        map.forEach(function (item) {
            const numEl = document.getElementById(item.id);
            if (!numEl) return;
            const box = numEl.closest('.kpi-item');
            if (!box) return;
            let deltaEl = box.querySelector('.kpi-delta');
            if (!deltaEl) {
                deltaEl = document.createElement('div');
                deltaEl.className = 'kpi-delta';
                box.appendChild(deltaEl);
            }
            if (!lastCountSnapshot) {
                deltaEl.className = 'kpi-delta';
                deltaEl.textContent = '--';
                return;
            }
            const prev = Number(lastCountSnapshot[item.id] || 0);
            const diff = item.val - prev;
            if (diff > 0) {
                deltaEl.className = 'kpi-delta up';
                deltaEl.textContent = '▲ +' + diff;
            } else if (diff < 0) {
                deltaEl.className = 'kpi-delta down';
                deltaEl.textContent = '▼ ' + diff;
            } else {
                deltaEl.className = 'kpi-delta';
                deltaEl.textContent = '— 0';
            }
        });
        lastCountSnapshot = {
            totalCount: Number(result.total || 0),
            onlineCount: Number(result.online || 0),
            offlineCount: Number(result.offline || 0),
            alarmCount: Number(result.alarm || 0),
            runCount: Number(result.run || 0),
            stopCount: Number(result.stopped || 0),
        };
    }

    function renderStateProgress(result) {
        const el = document.getElementById('stateProgressList');
        if (!el || !result) return;
        const total = Number(result.total || 0);
        const safePct = function (v) {
            if (total <= 0) return 0;
            return Math.round((Number(v || 0) * 100) / total);
        };
        const rows = [
            {label: '在线', icon: '●', value: Number(result.online || 0), color: '#22d3ee'},
            {label: '运行', icon: '●', value: Number(result.run || 0), color: '#34d399'},
            {label: '停止', icon: '●', value: Number(result.stopped || 0), color: '#f59e0b'},
            {label: '告警', icon: '●', value: Number(result.alarm || 0), color: '#f87171', alarm: true}
        ];
        el.innerHTML = rows.map(function (row) {
            const pct = safePct(row.value);
            const rowClass = row.alarm && row.value > 0 ? 'state-progress-item is-alarm' : 'state-progress-item';
            return `
                <div class="${rowClass}">
                    <span class="state-progress-label">
                        <span class="state-progress-dot" style="color:${row.color};background:${row.color};"></span>
                        ${row.label}
                    </span>
                    <div class="state-progress-track">
                        <div class="state-progress-fill" style="width:${pct}%;background:linear-gradient(90deg, ${row.color}, rgba(255,255,255,0.15));"></div>
                    </div>
                    <span class="state-progress-value">${row.value} / ${pct}%</span>
                </div>
            `;
        }).join('');
    }

    function updateAlarmMarquee(unreadCount) {
        const el = document.getElementById('alarmMarquee');
        const footer = document.querySelector('.screen-footer');
        if (footer) {
            footer.classList.remove('notice', 'warn', 'danger');
        }
        if (unreadCount > 0) {
            if (unreadCount >= 15) {
                el.innerText = `⛔ 严重：当前场景存在 ${unreadCount} 台设备告警，请立即处理`;
                footer && footer.classList.add('danger');
            } else if (unreadCount >= 5) {
                el.innerText = `⚠ 警告：当前场景存在 ${unreadCount} 台设备告警，请优先处理`;
                footer && footer.classList.add('warn');
            } else {
                el.innerText = `ℹ 提示：当前场景存在 ${unreadCount} 台设备告警，请关注`;
                footer && footer.classList.add('notice');
            }
        } else {
            el.innerText = '';
        }
    }

    function reloadTrendChart() {
        if (chartLock) return;
        chartLock = true;
        const now = new Date();
        const end = new Date(now);
        const start = new Date(now);
        end.setDate(now.getDate() - 1);
        start.setDate(now.getDate() - 8);
        postAsync(router.equip_state_snapshot_count, {
            startDate: formatDate(start),
            endDate: formatDate(end),
            onlineState: 1,
            countType: 1,
            needWorkshopCascade: true,
            workshopCode: selected_tree_node == null ? null : selected_tree_node.selfCode,
        }, function (result) {
            try {
                const data = (result || []).map(item => [item.time, item.num]);
                trendChart.setOption({
                    xAxis: {min: start, max: end},
                    series: [{data: data}]
                }, false);
            } finally {
                chartLock = false;
            }
        }, function () {
            chartLock = false;
        });
    }

    function reloadCurrentTrendChart() {
        if (currentTrendChartLock) return;
        currentTrendChartLock = true;
        const end = new Date();
        const start = new Date();
        start.setHours(0, 0, 0, 0);
        let onlineData = [];
        let alarmData = [];
        let runData = [];
        let pending = 3;
        const check = () => {
            if (--pending !== 0) return;
            try {
                currentTrendChart.setOption({
                    xAxis: {min: start, max: end},
                    series: [{data: onlineData}, {data: runData}, {data: alarmData}]
                }, false);
            } catch (e) { /* ignore */
            }
            currentTrendChartLock = false;
        };
        const snap = {
            startDate: formatDate(start),
            endDate: formatDate(end),
            needWorkshopCascade: true,
            workshopCode: selected_tree_node == null ? null : selected_tree_node.selfCode
        };
        postAsync(router.equip_state_snapshot_count, Object.assign({onlineState: 1}, snap), function (result) {
            onlineData = (result || []).map(item => [item.time, item.num]);
            check();
        }, function () {
            check();
        });
        postAsync(router.equip_state_snapshot_count, Object.assign({alarmState: 1}, snap), function (result) {
            alarmData = (result || []).map(item => [item.time, item.num]);
            check();
        }, function () {
            check();
        });
        postAsync(router.equip_state_snapshot_count, Object.assign({runState: 1}, snap), function (result) {
            runData = (result || []).map(item => [item.time, item.num]);
            check();
        }, function () {
            check();
        });
    }

    function reloadMap(needViewReset) {
        if (reloading) return;
        reloading = true;
        const params = {
            workshopCode: selected_tree_node == null ? null : selected_tree_node.selfCode,
            needRealtime: true,
            requirePage: false,
            needWorkshopCascade: true,
            queryWorkshop: true,
            queryAttrs: true,
        };
        const done = function () {
            reloading = false;
        };
        postAsync(router.equip_page, params, function (e) {
            try {
                if (e == null) {
                    renderMaplibreMarkers([], needViewReset);
                    return;
                }
                let r = e.filter(item => item.lng != null && item.lat != null);
                renderMaplibreMarkers(r, needViewReset);
            } finally {
                done();
            }
        }, function () {
            renderMaplibreMarkers([], needViewReset);
            done();
        });
    }

    function markAlarmRead(messageId, btn) {
        get(router.message_read, {messageId}, function () {
            const item = btn.closest('.alarm-item');
            item.classList.remove('new');
            item.classList.add('read');
            const dot = item.querySelector('.alarm-dot');
            if (dot) dot.remove();
            btn.remove();
        });
    }

    function calcStatus(d) {
        if (d.onlineState === 0) return 'offline';
        if (d.alarmState >= 1) return 'alarm';
        if (d.runState === 1) return 'running';
        if (d.runState === 0) return 'stop';
        if (d.onlineState === 1) return 'online';
        return 'offline';
    }

    /** 在线蓝点、告警红点需要波纹；全离线灰点不要 */
    function mapDotShouldRipple(d) {
        if (d && d.sceneStats) {
            const total = Number(d.sceneStats.total || 0);
            const offline = Number(d.sceneStats.offline || 0);
            if (total > 0 && offline >= total) return false;
            return true;
        }
        const status = calcStatus(d);
        return status === 'online' || status === 'alarm';
    }

    /** 与同页 TECH_COLORS（theme.css）一致 */
    function mapDotFillColor(d) {
        if (d && d.sceneStats) {
            const total = Number(d.sceneStats.total || 0);
            const offline = Number(d.sceneStats.offline || 0);
            if ((d.sceneStats.alarm || 0) > 0) return TECH_COLORS.alarm;
            if (total > 0 && offline >= total) return TECH_COLORS.offline;
            return TECH_COLORS.online;
        }
        const status = calcStatus(d);
        if (status === 'alarm') return TECH_COLORS.alarm;
        if (status === 'running') return TECH_COLORS.running;
        if (status === 'stop') return TECH_COLORS.stopped;
        if (status === 'online') return TECH_COLORS.online;
        return TECH_COLORS.offline;
    }

    /** 像素半径（略放大以便深蓝底图上更易辨认） */
    function mapDotRadius(d) {
        if (d && d.sceneStats) {
            const c = Number(d.sceneStats.total || 0);
            return Math.min(9, Math.max(5, 4.2 + c * 0.38));
        }
        const status = calcStatus(d);
        if (status === 'alarm') return 7;
        if (status === 'running') return 6;
        if (status === 'stop') return 5.5;
        if (status === 'online') return 6;
        return 5;
    }

    function mapPopupEscape(text) {
        if (text == null) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function mapPopupAttrDisplayValue(t) {
        if (t == null || t.value == null) return '—';
        const v = t.value;
        if (typeof v === 'object') return mapPopupEscape(JSON.stringify(v));
        return mapPopupEscape(String(v));
    }

    function mapPopupAttrsHtml(attrs) {
        if (!attrs || !attrs.length) return '';
        let h = '<div class="map-popup-section"><span class="map-popup-section-title">实时属性</span>';
        attrs.forEach(function (t) {
            const unit = (t.unit != null && String(t.unit).trim()) ? (' ' + mapPopupEscape(String(t.unit).trim())) : '';
            h += '<span class="map-popup-row map-popup-sub">' + mapPopupEscape(t.name || '-') + '：' + mapPopupAttrDisplayValue(t) + unit + '</span>';
        });
        h += '</div>';
        return h;
    }

    function mapPopupAlarmsHtml(alarmTexts) {
        if (!alarmTexts || !alarmTexts.length) return '';
        let h = '<div class="map-popup-section"><span class="map-popup-section-title">报警信息</span>';
        alarmTexts.forEach(function (txt) {
            h += '<span class="map-popup-row map-popup-sub map-popup-alarm-line">' + mapPopupEscape(txt) + '</span>';
        });
        h += '</div>';
        return h;
    }

    function createPopupHtml(d) {
        if (d.isSceneAggregate && Array.isArray(d.devices)) {
            const devices = d.devices;
            let listHtml = '<div class="map-device-list">';
            devices.forEach(function (dev) {
                const onlineDot = dev.onlineState === 1
                    ? '<span class="status-dot-map status-online"></span>'
                    : '<span class="status-dot-map status-offline"></span>';
                let runDot = '<span class="status-dot-map status-offline"></span>';
                if (dev.onlineState === 1) {
                    runDot = dev.runState === 1
                        ? '<span class="status-dot-map status-running"></span>'
                        : '<span class="status-dot-map status-stopped"></span>';
                }
                const alarmDot = (dev.alarmState || 0) >= 1
                    ? '<span class="status-dot-map status-alarm"></span>'
                    : '<span class="status-dot-map status-offline"></span>';
                const codeHint = dev.selfCode ? '<span class="map-popup-sub map-device-code">' + mapPopupEscape(dev.selfCode) + '</span>' : '';
                listHtml += '<div class="map-device-item">' +
                    '<div class="map-device-head"><span class="map-device-name">' + mapPopupEscape(dev.name || '-') + '</span>' + codeHint +
                    '<span>在线:' + onlineDot + ' 运行:' + runDot + ' 告警:' + alarmDot + '</span></div>' +
                    mapPopupAttrsHtml(dev.attrs) +
                    mapPopupAlarmsHtml(dev.alarmTexts) +
                    '</div>';
            });
            listHtml += '</div>';
            const st = d.sceneStats || {};
            const summary = '<span class="map-popup-row">设备 ' + (st.total || 0) + ' 台（在线 ' + (st.online || 0) + ' / 离线 ' + (st.offline || 0) + '）</span>';
            return {
                title: '<b>' + mapPopupEscape(d.sceneName || d.name || '场景') + '</b>',
                body: summary + listHtml
            };
        }
        let runSpan = '<span class="status-dot-map status-offline"></span>';
        if (d.onlineState === 1) {
            runSpan = d.runState === 1 ? '<span class="status-dot-map status-running"></span>' : '<span class="status-dot-map status-stopped"></span>';
        }
        const wsName = d.workshop == null ? '' : mapPopupEscape(d.workshop.name || '');
        let html =
            `<span class="map-popup-row">${mapPopupEscape(i18np.prop("workshop.name"))}：${wsName}</span>` +
            `<span class="map-popup-row">${mapPopupEscape(i18np.prop("equip.code"))}：${mapPopupEscape(d.selfCode || '')}</span>` +
            `<span class="map-popup-row">${mapPopupEscape(i18np.prop("equip.onlineState"))}：${d.onlineState === 1 ? '<span class="status-dot-map status-online"></span>' : '<span class="status-dot-map status-offline"></span>'}</span>` +
            `<span class="map-popup-row">${mapPopupEscape(i18np.prop("equip.runState"))}：${runSpan}</span>` +
            `<span class="map-popup-row">${mapPopupEscape(i18np.prop("equip.alarmState"))}：${(d.alarmState || 0) >= 1 ? '<span class="status-dot-map status-alarm"></span>' : '<span class="status-dot-map status-offline"></span>'}</span>`;
        html += mapPopupAttrsHtml(d.attrs);
        html += mapPopupAlarmsHtml(d.alarmTexts);
        return {title: '<b>' + mapPopupEscape(d.name || '') + '</b>', body: html};
    }

    window.onresize = () => {
        statusChart && statusChart.resize();
        trendChart && trendChart.resize();
        currentTrendChart && currentTrendChart.resize();
        if (gisMap && typeof gisMap.resize === 'function') {
            gisMap.resize();
        }
    };
</script>
</body>
</html>
