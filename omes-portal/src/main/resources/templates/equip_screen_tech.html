<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMES - 设备监控大屏</title>
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <link rel="stylesheet" href="../static/css/equip_screen_tech_theme.css">
    <link rel="stylesheet" href="../static/tree-select/treeSelect.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
    <script src="../static/js/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="../static/js/techScreenMaplibre.js"></script>
    <script src="../static/tree-select/treeSelect.js"></script>
    <!--    <script src="https://api.map.baidu.com/api?v=1.0&&type=webgl&ak=xqC8Us41v5zZxz5SGXOwslbpxAGakVMs"></script>-->

    <style>
        /* 科技风：优先使用本地字体，Orbitron 可选 */
        html, body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            background: var(--tech-bg-page);
            color: var(--tech-text-primary);
            font-family: "DIN", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }

        /* 管网 GIS 风：深海军蓝底 + 青蓝网格 */
        .tech-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(180deg, rgba(8, 18, 35, 0.98) 0%, var(--tech-bg-page) 38%, var(--tech-bg-page-end) 100%),
            repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(var(--tech-cyan-rgb), 0.035) 2px, rgba(var(--tech-cyan-rgb), 0.035) 4px),
            repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(var(--tech-cyan-rgb), 0.035) 2px, rgba(var(--tech-cyan-rgb), 0.035) 4px);
            pointer-events: none;
        }

        /* 扫描线动画 */
        .scan-line {
            position: fixed;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(var(--tech-cyan-rgb), 0.14), transparent);
            animation: scan 8s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
            }
            100% {
                top: 100%;
            }
        }

        /* 色彩与布局变量见 ../static/css/equip_screen_tech_theme.css */

        .container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== 顶部：科技风标题栏 ========== */
        .screen-header {
            height: var(--header-h);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(20px, 1.5vw, 36px);
            background: linear-gradient(180deg, rgba(0, 216, 255, 0.07) 0%, transparent 100%);
            border-bottom: 1px solid var(--tech-border);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        .screen-title-wrap {
            display: flex;
            align-items: baseline;
            gap: clamp(8px, 0.6vw, 14px);
        }

        .screen-title {
            font-size: var(--title-fs);
            font-weight: 700;
            letter-spacing: clamp(2px, 0.2vw, 6px);
            color: #f0f9ff;
            text-shadow: 0 0 20px var(--tech-glow), 0 0 36px rgba(24, 144, 255, 0.35);
        }

        .screen-title-accent {
            display: inline-block;
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--tech-cyan), var(--tech-blue));
            margin-right: 12px;
            vertical-align: middle;
            box-shadow: 0 0 12px var(--tech-cyan);
            animation: pulse-bar 2s ease-in-out infinite;
        }

        @keyframes pulse-bar {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        #workshopName {
            font-size: clamp(12px, 0.9vw, 15px);
            color: var(--tech-cyan);
            letter-spacing: 2px;
            margin-left: 8px;
        }

        .header-time {
            font-size: clamp(12px, 0.9vw, 16px);
            color: var(--tech-cyan);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--tech-glow);
        }

        /* ========== 主体：左 | 中间(地图在上方) | 右 ========== */
        .screen-body {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: row;
            padding: var(--body-gap);
            gap: var(--body-gap);
        }

        .side-panel {
            width: var(--side-width);
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: var(--body-gap);
            min-height: 0;
        }

        /* 中间列：地图在上方，下方健康区 */
        .center-map {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: var(--body-gap);
            color: #1f1f1f;
        }

        /* 中间列：地图 65%，下方健康区 35% */
        .center-map .map-wrap {
            flex: 1 1 65%;
            min-height: clamp(120px, 14vh, 200px);
            max-height: 75vh;
            display: flex;
            flex-direction: column;
        }

        .center-map .map-wrap .panel-box {
            flex: 1;
            min-height: 0;
        }

        /* ========== 科技风面板：棱角边框 + 四角装饰 ========== */
        .panel-box {
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border: 1px solid var(--tech-border);
            box-shadow: inset 0 0 30px rgba(0, 216, 255, 0.06), 0 0 24px rgba(0, 0, 0, 0.5);
            border-radius: 2px;
            overflow: hidden;
        }


        .panel-title {
            position: relative;
            padding: clamp(6px, 0.5vw, 10px) 12px clamp(4px, 0.4vw, 8px) 16px;
            font-size: var(--panel-title-fs);
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 216, 255, 0.2);
        }

        .panel-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 14px;
            background: linear-gradient(180deg, var(--tech-cyan), var(--tech-blue));
            box-shadow: 0 0 10px var(--tech-cyan);
        }

        /* ========== KPI 数字块 ========== */
        .kpi {
            display: flex;
            flex-wrap: wrap;
            padding: clamp(4px, 0.4vw, 8px);
            gap: clamp(3px, 0.3vw, 6px);
        }

        .kpi-item {
            flex: 1 1 calc(33.33% - 8px);
            min-width: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: clamp(4px, 0.4vw, 6px) 2px;
            background: rgba(0, 216, 255, 0.05);
            border: 1px solid rgba(0, 216, 255, 0.16);
            border-radius: 2px;
        }

        .kpi-num {
            font-size: clamp(18px, 1.4vw, 24px);
            font-weight: 700;
            color: var(--tech-cyan);
            text-shadow: 0 0 12px var(--tech-glow);
            line-height: 1.2;
        }

        .kpi-title {
            font-size: clamp(9px, 0.7vw, 11px);
            color: #94a3b8;
            margin-top: 2px;
            letter-spacing: 1px;
        }

        .kpi-health .health-ok {
            color: #22c55e;
        }

        .kpi-health .health-attention {
            color: #eab308;
        }

        .kpi-health .health-warning {
            color: #f97316;
        }

        .kpi-health .health-fault {
            color: #ef4444;
        }

        /* ========== 图表容器 ========== */
        .panel-box .chart-wrap {
            flex: 1;
            min-height: 0;
            padding: 4px;
        }

        #statusChart, #trendChart, #currentTrendChart {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* ========== 告警列表 ========== */
        .alarm-panel {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .alarm-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 4px 6px;
            font-size: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) var(--scroll-track);
        }

        .alarm-list::-webkit-scrollbar {
            width: 5px;
        }

        .alarm-list::-webkit-scrollbar-track {
            background: var(--scroll-track);
            border-radius: 3px;
        }

        .alarm-list::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 3px;
        }

        .alarm-item {
            display: flex;
            align-items: flex-start;
            padding: 8px 6px 10px;
            border-bottom: 1px dashed rgba(0, 216, 255, 0.2);
            transition: background 0.2s;
        }

        .alarm-item:hover {
            background: rgba(0, 216, 255, 0.05);
        }

        .alarm-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin: 6px 10px 0 0;
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
            flex-shrink: 0;
        }

        .alarm-body {
            flex: 1;
            min-width: 0;
        }

        /* 第一行：等级标签居左，时间与操作按钮居右，避免与标题挤在同一行导致重叠 */
        .alarm-row-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-width: 0;
        }

        .alarm-row-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .alarm-level-tag {
            flex-shrink: 0;
            padding: 1px 6px;
            border-radius: 999px;
            border: 1px solid transparent;
            font-size: 10px;
            line-height: 1.4;
            letter-spacing: 0.5px;
        }

        .alarm-level-tag.level-notice {
            color: #bfdbfe;
            border-color: rgba(96, 165, 250, 0.45);
            background: rgba(30, 58, 138, 0.28);
        }

        .alarm-level-tag.level-warn {
            color: #fde68a;
            border-color: rgba(245, 158, 11, 0.45);
            background: rgba(120, 53, 15, 0.3);
        }

        .alarm-level-tag.level-danger {
            color: #fecaca;
            border-color: rgba(248, 113, 113, 0.5);
            background: rgba(127, 29, 29, 0.3);
            text-shadow: 0 0 8px rgba(248, 113, 113, 0.38);
        }

        .map-popup-row {
            display: block;
            margin-top: 1px;
        }

        .map-tooltip-wrap {
            min-width: 180px;
            line-height: 1.5;
        }

        .map-tooltip-title {
            margin-bottom: 4px;
            font-weight: 700;
            color: #e2e8f0;
        }

        .map-tooltip-body {
            color: #cbd5e1;
        }

        .map-device-list {
            margin-top: 4px;
            max-height: min(52vh, 360px);
            overflow-y: auto;
            padding-right: 4px;
        }

        .map-device-item {
            padding: 6px 0 8px;
            border-bottom: 1px dashed rgba(0, 216, 255, 0.2);
            white-space: normal;
        }

        .map-device-head {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 8px;
            margin-bottom: 2px;
        }

        .map-popup-section {
            margin-top: 6px;
            padding: 4px 0 2px 8px;
            border-left: 2px solid rgba(0, 216, 255, 0.35);
        }

        .map-popup-section-title {
            display: block;
            font-size: 10px;
            color: #7dd3fc;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .map-popup-sub {
            display: block;
            font-size: 11px;
            color: #94a3b8;
            line-height: 1.45;
            word-break: break-word;
        }

        .map-popup-alarm-line {
            color: #fca5a5;
        }

        .map-device-code {
            margin-left: 4px;
            opacity: 0.85;
        }

        .map-device-item:last-child {
            border-bottom: none;
        }

        .map-device-name {
            display: inline-block;
            color: #e2e8f0;
            margin-right: 6px;
            padding: 1px 6px;
            border-radius: 999px;
            border: 1px solid rgba(0, 216, 255, 0.38);
            background: linear-gradient(180deg, rgba(30, 58, 138, 0.35) 0%, rgba(15, 23, 42, 0.45) 100%);
            box-shadow: inset 0 0 8px rgba(0, 216, 255, 0.18);
        }

        .status-dot-map {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            vertical-align: middle;
            box-shadow: 0 0 8px currentColor;
        }

        /* 与同页 theme.css --color-status-* / getTechScreenColors 一致 */
        .status-dot-map.status-online {
            color: var(--color-status-online);
            background: var(--color-status-online);
        }

        .status-dot-map.status-running {
            color: var(--color-status-running);
            background: var(--color-status-running);
        }

        .status-dot-map.status-stopped {
            color: var(--color-status-stopped);
            background: var(--color-status-stopped);
        }

        .status-dot-map.status-alarm {
            color: var(--color-status-alarm);
            background: var(--color-status-alarm);
        }

        .status-dot-map.status-offline {
            color: var(--color-status-offline);
            background: var(--color-status-offline);
        }

        .alarm-title {
            display: block;
            margin-top: 5px;
            font-size: 12px;
            line-height: 1.4;
            font-weight: 500;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alarm-time {
            color: #94a3b8;
            font-size: 10px;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            line-height: 1.3;
        }

        .alarm-content {
            margin-top: 5px;
            padding-bottom: 1px;
            color: #94a3b8;
            font-size: 11px;
            line-height: 1.45;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alarm-read-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            padding: 0;
            font-size: 0;
            color: var(--tech-cyan);
            background: rgba(0, 216, 255, 0.1);
            border: 1px solid rgba(0, 216, 255, 0.38);
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .alarm-read-btn .layui-icon {
            font-size: 12px;
        }

        .alarm-read-btn:hover {
            background: rgba(0, 216, 255, 0.2);
            box-shadow: 0 0 8px var(--tech-glow);
        }

        .alarm-item.read {
            opacity: 0.6;
        }

        .alarm-item.new .alarm-dot {
            animation: blink 1.2s infinite;
        }

        .alarm-item.level-notice {
            border-left: 2px solid rgba(96, 165, 250, 0.5);
            background: linear-gradient(90deg, rgba(30, 58, 138, 0.14) 0%, transparent 55%);
        }

        .alarm-item.level-warn {
            border-left: 2px solid rgba(245, 158, 11, 0.55);
            background: linear-gradient(90deg, rgba(120, 53, 15, 0.16) 0%, transparent 55%);
        }

        .alarm-item.level-danger {
            border-left: 2px solid rgba(248, 113, 113, 0.65);
            background: linear-gradient(90deg, rgba(127, 29, 29, 0.2) 0%, transparent 60%);
        }

        @keyframes blink {
            50% {
                opacity: 0.4;
            }
        }

        /* ========== 底部 ========== */
        .screen-footer {
            height: var(--footer-h);
            flex-shrink: 0;
            padding: 0 clamp(16px, 1.2vw, 24px);
            background: rgba(5, 14, 28, 0.92);
            border-top: 1px solid var(--tech-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #94a3b8;
            font-size: clamp(10px, 0.75vw, 12px);
            letter-spacing: 1px;
        }

        #alarmMarquee {
            color: #fca5a5;
            font-weight: 500;
        }

        /* 地图面板全高（仅地图区） */
        .center-map .map-wrap .panel-box {
            height: 100%;
        }

        /* 右侧栏：弹性均分，可收缩 */
        .side-panel-right .panel-box-trend {
            flex: 1 1 0;
            min-height: clamp(56px, 6vh, 80px);
        }

        .side-panel-right .alarm-panel {
            flex: 1.2 1 0;
            min-height: clamp(64px, 7vh, 96px);
        }

        /* ========== 大屏整体布局层 ========== */
        .container {
            background: radial-gradient(circle at 48% 28%, rgba(24, 144, 255, 0.12), transparent 46%),
            linear-gradient(180deg, rgba(5, 12, 22, 0.82) 0%, rgba(5, 10, 18, 0.94) 100%);
        }

        .screen-header {
            height: clamp(56px, 6vh, 82px);
            padding: 0 clamp(12px, 1vw, 22px);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: linear-gradient(180deg, rgba(5, 18, 38, 0.95) 0%, rgba(3, 12, 28, 0.6) 100%);
            border-bottom: 1px solid rgba(0, 216, 255, 0.28);
            box-shadow: inset 0 -1px 0 rgba(24, 144, 255, 0.28), 0 10px 30px rgba(0, 0, 0, 0.45);
        }

        .header-left {
            justify-self: start;
        }

        .header-right {
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .btn-screen-fullscreen {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 13px;
            line-height: 1;
            color: var(--tech-cyan);
            background: linear-gradient(180deg, rgba(6, 22, 42, 0.92) 0%, rgba(4, 14, 28, 0.72) 100%);
            border: 1px solid rgba(0, 216, 255, 0.45);
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            font-family: inherit;
        }

        .btn-screen-fullscreen:hover {
            border-color: rgba(0, 216, 255, 0.78);
            color: #e0f2fe;
            box-shadow: 0 0 12px rgba(0, 216, 255, 0.2);
        }

        .btn-screen-fullscreen .layui-icon {
            font-size: 16px;
        }

        .screen-title-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 14px;
        }

        .screen-title-wrap::before,
        .screen-title-wrap::after {
            content: '';
            position: absolute;
            top: 50%;
            width: clamp(56px, 6vw, 112px);
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 216, 255, 0.62), transparent);
            transform: translateY(-50%);
        }

        .screen-title-wrap::before {
            right: 100%;
        }

        .screen-title-wrap::after {
            left: 100%;
        }

        .screen-title {
            font-size: clamp(20px, 1.45vw, 28px);
            letter-spacing: clamp(2px, 0.25vw, 5px);
            line-height: 1;
            padding: 8px clamp(14px, 1.2vw, 26px);
            border: 1px solid rgba(0, 216, 255, 0.38);
            background: linear-gradient(180deg, rgba(9, 30, 58, 0.92) 0%, rgba(6, 20, 40, 0.72) 100%);
            box-shadow: inset 0 0 18px rgba(0, 216, 255, 0.15);
            border-radius: 4px;
            position: relative;
        }

        .screen-title::before,
        .screen-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 9px;
            height: 9px;
            border: 1px solid rgba(0, 216, 255, 0.65);
            background: rgba(15, 23, 42, 0.85);
            transform: translateY(-50%) rotate(45deg);
            box-shadow: 0 0 7px rgba(0, 216, 255, 0.45);
        }

        .screen-title::before {
            left: -6px;
            border-right: none;
            border-top: none;
        }

        .screen-title::after {
            right: -6px;
            border-left: none;
            border-bottom: none;
        }

        .screen-header::before,
        .screen-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 64px;
            height: 8px;
            border-bottom: 2px solid rgba(0, 216, 255, 0.5);
            opacity: 0.9;
            pointer-events: none;
        }

        .screen-header::before {
            left: 8px;
            border-left: 2px solid rgba(0, 216, 255, 0.4);
            clip-path: polygon(0 100%, 0 0, 65% 0, 100% 100%);
        }

        .screen-header::after {
            right: 8px;
            border-right: 2px solid rgba(0, 216, 255, 0.4);
            clip-path: polygon(35% 0, 100% 0, 100% 100%, 0 100%);
        }

        .header-time {
            padding: 3px 10px;
            border: 1px solid rgba(0, 216, 255, 0.28);
            background: rgba(8, 27, 52, 0.42);
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(24, 144, 255, 0.15);
            font-size: clamp(11px, 0.82vw, 14px);
            letter-spacing: 1px;
        }

        #workshopName {
            margin-left: 0;
            padding: 3px 10px;
            border: 1px solid rgba(0, 216, 255, 0.26);
            background: rgba(8, 27, 52, 0.36);
            border-radius: 4px;
            max-width: min(30vw, 420px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .screen-body {
            position: relative;
            padding: var(--edge-gap);
            gap: var(--edge-gap);
        }

        .screen-body::before {
            content: '';
            position: absolute;
            inset: var(--edge-gap);
            pointer-events: none;
            background: radial-gradient(circle at 50% 42%, rgba(0, 216, 255, 0.14) 0%, rgba(0, 216, 255, 0.04) 28%, transparent 54%);
            z-index: 0;
        }

        .screen-body::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: clamp(56px, 7vh, 88px);
            width: min(62vw, 1100px);
            height: clamp(130px, 20vh, 240px);
            transform: translateX(-50%);
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(0, 216, 255, 0.18), rgba(0, 216, 255, 0.04) 45%, transparent 70%);
            filter: blur(10px);
            z-index: 0;
        }

        .side-panel {
            width: var(--left-pane-w);
            gap: var(--edge-gap);
            z-index: 3;
        }

        .side-panel-right {
            width: var(--right-pane-w);
        }

        .center-map {
            position: relative;
            z-index: 1;
            min-height: 0;
        }

        .center-map .map-wrap {
            flex: 1 1 auto;
            min-height: 0;
            max-height: none;
            height: 100%;
        }

        .center-map .map-wrap .panel-box {
            border-color: rgba(0, 216, 255, 0.25);
            box-shadow: inset 0 0 38px rgba(24, 144, 255, 0.12), 0 10px 28px rgba(2, 6, 23, 0.65);
        }


        .center-map .health-below-map {
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: 10px;
            z-index: 8;
            max-height: 15vh;
            pointer-events: none;
        }

        .center-map .health-avg-floating {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 9;
            pointer-events: none;
            min-width: 140px;
            padding: 10px 12px;
            border: 1px solid rgba(0, 216, 255, 0.42);
            background: linear-gradient(180deg, rgba(6, 29, 53, 0.82) 0%, rgba(3, 16, 36, 0.45) 100%);
            box-shadow: inset 0 0 14px rgba(0, 216, 255, 0.16), 0 4px 14px rgba(2, 6, 23, 0.5);
            border-radius: 6px;
            text-align: center;
        }

        .center-map .health-avg-floating .avg-label {
            font-size: 11px;
            color: rgba(94, 184, 255, 0.95);
            letter-spacing: 1px;
        }

        .center-map .health-avg-floating .avg-value {
            margin-top: 4px;
            font-size: 34px;
            font-weight: 700;
            line-height: 1;
            color: #00d8ff;
            text-shadow: 0 0 14px rgba(0, 216, 255, 0.6);
            font-variant-numeric: tabular-nums;
        }

        .panel-box {
            background: linear-gradient(180deg, rgba(8, 27, 52, 0.76) 0%, rgba(4, 16, 34, 0.78) 100%);
            border-color: rgba(0, 216, 255, 0.32);
            box-shadow: inset 0 0 28px rgba(24, 144, 255, 0.09), 0 6px 22px rgba(2, 6, 23, 0.65);
            backdrop-filter: blur(2px);
        }

        .panel-title {
            background: linear-gradient(90deg, rgba(24, 144, 255, 0.14) 0%, rgba(24, 144, 255, 0.03) 40%, transparent 100%);
        }

        .side-panel-right .panel-title {
            text-shadow: 0 0 10px rgba(0, 216, 255, 0.28);
        }

        .kpi-item {
            background: linear-gradient(180deg, rgba(24, 144, 255, 0.1) 0%, rgba(24, 144, 255, 0.04) 100%);
            border-color: rgba(0, 216, 255, 0.25);
        }

        .kpi-num {
            text-shadow: 0 0 16px rgba(0, 216, 255, 0.42);
        }

        .kpi-item .kpi-delta {
            margin-top: 2px;
            font-size: 10px;
            line-height: 1;
            min-height: 12px;
            color: #64748b;
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
        }

        .kpi-item .kpi-delta.up {
            color: #4ade80;
            text-shadow: 0 0 8px rgba(74, 222, 128, 0.35);
        }

        .kpi-item .kpi-delta.down {
            color: #f87171;
            text-shadow: 0 0 8px rgba(248, 113, 113, 0.35);
        }

        .kpi-item.warn {
            border-color: rgba(248, 113, 113, 0.62);
            box-shadow: inset 0 0 20px rgba(239, 68, 68, 0.16), 0 0 14px rgba(239, 68, 68, 0.22);
            animation: kpiWarnPulse 1.35s ease-in-out infinite;
        }

        .kpi-item.warn .kpi-title {
            color: #fecaca;
        }

        .kpi-item.warn .kpi-num {
            color: #fda4af;
            text-shadow: 0 0 16px rgba(248, 113, 113, 0.6);
        }

        @keyframes kpiWarnPulse {
            0%, 100% {
                transform: translateZ(0);
                filter: brightness(1);
            }
            50% {
                transform: translateY(-1px);
                filter: brightness(1.12);
            }
        }

        .alarm-list {
            padding: 6px 8px;
        }

        .side-panel-right .panel-box .chart-wrap {
            display: flex;
            flex-direction: column;
            min-height: 0;
            background-image: linear-gradient(rgba(0, 216, 255, 0.07) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 216, 255, 0.06) 1px, transparent 1px);
            background-size: 100% 24px, 24px 100%;
            background-position: 0 0, 0 0;
            border-top: 1px solid rgba(0, 216, 255, 0.12);
        }

        .side-panel-right .panel-box .chart-wrap #currentTrendChart {
            flex: 1;
            min-height: 0;
            height: auto !important;
        }

        .state-progress-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 4px 10px 10px;
            border-top: 1px solid rgba(0, 216, 255, 0.16);
            background: linear-gradient(180deg, rgba(2, 6, 23, 0.15) 0%, rgba(2, 6, 23, 0.42) 100%);
        }

        .state-progress-item {
            display: grid;
            grid-template-columns: 66px 1fr 56px;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #cbd5e1;
        }

        .state-progress-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #93c5fd;
            letter-spacing: 1px;
        }

        .state-progress-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
            flex-shrink: 0;
        }

        .state-progress-track {
            position: relative;
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.86);
            border: 1px solid rgba(0, 216, 255, 0.2);
        }

        .state-progress-track::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                    90deg,
                    rgba(34, 197, 94, 0.15) 0%,
                    rgba(34, 197, 94, 0.15) 50%,
                    rgba(245, 158, 11, 0.14) 50%,
                    rgba(245, 158, 11, 0.14) 80%,
                    rgba(239, 68, 68, 0.15) 80%,
                    rgba(239, 68, 68, 0.15) 100%
            );
            pointer-events: none;
        }

        .state-progress-fill {
            position: relative;
            height: 100%;
            border-radius: 999px;
            box-shadow: 0 0 8px rgba(0, 216, 255, 0.45);
        }

        .state-progress-fill::after {
            content: '';
            position: absolute;
            right: -1px;
            top: -2px;
            width: 4px;
            height: 12px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.75);
            opacity: 0.7;
        }

        .state-progress-value {
            justify-self: end;
            color: #e2e8f0;
            font-variant-numeric: tabular-nums;
        }

        .state-progress-item.is-alarm .state-progress-value,
        .state-progress-item.is-alarm .state-progress-label {
            color: #fca5a5;
        }

        .state-progress-item.is-alarm .state-progress-fill {
            animation: alarmPulse 1.25s ease-in-out infinite;
        }

        @keyframes alarmPulse {
            0%, 100% {
                filter: brightness(1);
                box-shadow: 0 0 8px rgba(248, 113, 113, 0.5);
            }
            50% {
                filter: brightness(1.25);
                box-shadow: 0 0 14px rgba(248, 113, 113, 0.8);
            }
        }

        .alarm-item {
            border-bottom-color: rgba(24, 144, 255, 0.24);
        }

        .alarm-dot {
            box-shadow: 0 0 10px #ef4444, 0 0 18px rgba(239, 68, 68, 0.38);
        }

        .screen-footer {
            height: clamp(34px, 3.8vh, 52px);
            background: linear-gradient(180deg, rgba(4, 16, 34, 0.75) 0%, rgba(3, 12, 28, 0.95) 100%);
        }

        .screen-footer.notice {
            background: linear-gradient(180deg, rgba(30, 58, 138, 0.6) 0%, rgba(15, 23, 42, 0.94) 100%);
            border-top-color: rgba(96, 165, 250, 0.62);
            box-shadow: inset 0 0 22px rgba(59, 130, 246, 0.18);
            animation: footerPulseNotice 2.2s ease-in-out infinite;
        }

        .screen-footer.warn {
            background: linear-gradient(180deg, rgba(120, 53, 15, 0.62) 0%, rgba(67, 20, 7, 0.93) 100%);
            border-top-color: rgba(251, 191, 36, 0.66);
            box-shadow: inset 0 0 24px rgba(245, 158, 11, 0.22);
            animation: footerPulseWarn 1.55s ease-in-out infinite;
        }

        .screen-footer.danger {
            background: linear-gradient(180deg, rgba(127, 29, 29, 0.66) 0%, rgba(69, 10, 10, 0.94) 100%);
            border-top-color: rgba(248, 113, 113, 0.72);
            box-shadow: inset 0 0 26px rgba(239, 68, 68, 0.24);
            animation: footerPulseDanger 1s ease-in-out infinite;
        }

        .screen-footer.notice #alarmMarquee {
            color: #b8e6ff;
            text-shadow: 0 0 10px rgba(24, 144, 255, 0.45);
        }

        .screen-footer.warn #alarmMarquee {
            color: #fef3c7;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.52);
        }

        .screen-footer.danger #alarmMarquee {
            color: #fee2e2;
            text-shadow: 0 0 12px rgba(248, 113, 113, 0.62);
        }

        @keyframes footerPulseNotice {
            0%, 100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.08);
            }
        }

        @keyframes footerPulseWarn {
            0%, 100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.12);
            }
        }

        @keyframes footerPulseDanger {
            0%, 100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.16);
            }
        }

        .side-panel > .panel-box:first-child {
            flex: 1.05 1 0;
        }

        .side-panel > .panel-box-status {
            flex: 0.95 1 0 !important;
        }

        .side-panel-right .panel-box-trend:first-child {
            flex: 0.95 1 0;
        }

        .side-panel-right .panel-box-trend:nth-child(2) {
            flex: 1.05 1 0;
        }

        .side-panel-right .alarm-panel {
            box-shadow: inset 0 0 32px rgba(239, 68, 68, 0.08), 0 8px 24px rgba(2, 6, 23, 0.65);
        }

        /* 场景选择插件：仅增强样式与层级，不改动结构和逻辑 */
        .scene-tree-toggle {
            z-index: 10020;
            right: 0;
            border-radius: 8px 0 0 8px;
            border: 1px solid rgba(0, 216, 255, 0.5);
            background: linear-gradient(180deg, rgba(24, 144, 255, 0.68) 0%, rgba(6, 22, 45, 0.92) 100%);
        }

        .scene-tree-panel {
            z-index: 10019;
            background: linear-gradient(180deg, rgba(8, 27, 52, 0.96) 0%, rgba(4, 16, 34, 0.98) 100%);
            color: #e2e8f0;
            border-left: 1px solid rgba(0, 216, 255, 0.3);
            box-shadow: -8px 0 26px rgba(2, 6, 23, 0.75);
        }

        .scene-tree-header {
            border-bottom-color: rgba(0, 216, 255, 0.25);
            color: var(--tech-cyan);
            letter-spacing: 1px;
        }

        .scene-tree-body .layui-input,
        .scene-tree-body .layui-btn {
            background: rgba(15, 23, 42, 0.76);
            color: #cbd5e1;
            border-color: rgba(0, 216, 255, 0.3);
        }

        .scene-tree-body .layui-tree-txt {
            color: #e8f4ff;
        }

        @media (max-width: 1600px) {
            .side-panel {
                width: clamp(250px, 19vw, 340px);
            }

            .side-panel-right {
                width: clamp(220px, 16.5vw, 300px);
            }
        }

        /* 地图浮层：健康数据块（无外框） */
        .center-map .health-below-map .panel-box-health {
            pointer-events: auto;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .center-map .health-below-map .health-panel-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 8px;
            align-items: stretch;
            overflow: visible;
        }

        .center-map .health-below-map .health-kpi-left {
            border-right: none;
            padding: 0;
            overflow: visible;
        }

        .center-map .health-below-map .kpi.kpi-health {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 4px;
            padding: 0;
        }

        .center-map .health-below-map .health-kpi-col {
            display: contents;
        }

        .center-map .health-below-map .kpi-health .kpi-item {
            margin: 0;
            min-height: 48px;
            padding: 4px 5px 10px;
            border: 1px solid rgba(0, 216, 255, 0.35);
            background: linear-gradient(180deg, rgba(6, 29, 53, 0.86) 0%, rgba(3, 16, 36, 0.5) 100%);
            box-shadow: inset 0 0 16px rgba(0, 216, 255, 0.12);
            border-radius: 6px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            overflow: visible;
        }

        .center-map .health-below-map .kpi-health .kpi-item::before,
        .center-map .health-below-map .kpi-health .kpi-item::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .center-map .health-below-map .kpi-health .kpi-item::before {
            bottom: -7px;
            width: 68%;
            height: 6px;
            border: 1px solid rgba(0, 216, 255, 0.45);
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
            background: linear-gradient(180deg, rgba(24, 144, 255, 0.2), rgba(24, 144, 255, 0.05));
            box-shadow: 0 0 12px rgba(0, 216, 255, 0.45);
        }

        .center-map .health-below-map .kpi-health .kpi-item::after {
            bottom: -10px;
            width: 58%;
            height: 2px;
            border-radius: 999px;
            background: rgba(0, 216, 255, 0.18);
            filter: blur(1px);
        }

        .center-map .health-below-map .kpi-health .kpi-item .kpi-title {
            order: 2;
            font-size: 9px;
            color: rgba(0, 216, 255, 0.88);
            margin-top: 1px;
            text-shadow: 0 0 8px rgba(0, 216, 255, 0.35);
            line-height: 1;
        }

        .center-map .health-below-map .kpi-health .kpi-num {
            order: 1;
            font-size: 18px;
            line-height: 1;
            font-weight: 700;
            text-shadow: 0 0 14px rgba(0, 216, 255, 0.55);
        }

        .center-map .health-below-map .kpi-health .kpi-num.health-ok {
            color: #00d8ff;
        }

        .center-map .health-below-map .kpi-health .kpi-num.health-attention {
            color: #ffcc00;
        }

        .center-map .health-below-map .kpi-health .kpi-num.health-warning {
            color: #ff9f43;
        }

        .center-map .health-below-map .kpi-health .kpi-num.health-fault {
            color: #ff5a5a;
        }

        .center-map .map-wrap .panel-box.panel-box-map {
            overflow: hidden;
        }

        .ml-map-host-wrap {
            position: relative;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        /* 底图：Dark Matter + deepBlue 深蓝化（与管网 GIS 大屏海军底协调） */
        .ml-map-host-wrap #map {
            flex: 1;
            min-height: 0;
            width: 100%;
            background: var(--map-bg-loading);
        }

        .ml-map-host-wrap .maplibregl-map {
            font-family: inherit;
        }

        .ml-map-host-wrap .maplibregl-ctrl-attrib {
            background: rgba(5, 14, 26, 0.88) !important;
            color: #9fb0c2 !important;
            font-size: 10px !important;
        }

        .ml-map-host-wrap .maplibregl-ctrl-attrib a {
            color: #5eb8ff !important;
        }

        .ml-map-legend {
            position: absolute;
            left: 10px;
            top: 10px;
            z-index: 700;
            padding: 8px 10px;
            border-radius: 4px;
            background: rgba(5, 14, 26, 0.88);
            border: 1px solid rgba(0, 216, 255, 0.22);
            font-size: 10px;
            color: #d1dce8;
            line-height: 1.55;
            pointer-events: none;
        }

        .ml-map-legend .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .maplibre-tech-popup .maplibregl-popup-content {
            background: rgba(5, 14, 28, 0.96);
            border: 1px solid rgba(0, 216, 255, 0.38);
            border-radius: 4px;
            color: #e8f4ff;
            padding: 10px 12px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        }

        .maplibre-tech-popup .maplibregl-popup-close-button {
            color: #94a3b8;
            font-size: 18px;
            padding: 4px 8px;
        }

        .maplibre-tech-popup .maplibregl-popup-tip {
            border-top-color: rgba(8, 27, 52, 0.95);
        }
    </style>
</head>
<body>
<div class="tech-bg"></div>
<div class="scan-line"></div>

<div class="container">
    <header class="screen-header">
        <div class="header-left">
            <div id="currentTime" class="header-time"></div>
        </div>
        <div class="screen-title-wrap">
            <span class="screen-title">设备运行监控中心</span>
        </div>
        <div class="header-right">
            <span id="workshopName"></span>
            <button type="button" class="btn-screen-fullscreen" id="btnScreenFullscreen" title="全屏" aria-label="全屏">
                <i class="layui-icon layui-icon-screen-full" aria-hidden="true"></i>
                <span class="btn-fs-text">全屏</span>
            </button>
        </div>
    </header>

    <main class="screen-body">
        <aside class="side-panel">
            <div class="panel-box">
                <div class="panel-title" lang-i18n="common.overview"></div>
                <div class="kpi">
                    <div class="kpi-item">
                        <div class="kpi-num" id="totalCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.total"></div>
                    </div>
                    <div class="kpi-item">
                        <div class="kpi-num" id="onlineCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.online"></div>
                    </div>
                    <div class="kpi-item">
                        <div class="kpi-num" id="offlineCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.offline"></div>
                    </div>
                    <div class="kpi-item">
                        <div class="kpi-num" id="alarmCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.alarm"></div>
                    </div>
                    <div class="kpi-item">
                        <div class="kpi-num" id="runCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.run"></div>
                    </div>
                    <div class="kpi-item">
                        <div class="kpi-num" id="stopCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.stop"></div>
                    </div>
                </div>
            </div>

            <div class="panel-box panel-box-status" style="flex: 1; min-height: clamp(100px, 12vh, 180px);">
                <div class="panel-title" lang-i18n="title.equip_status"></div>
                <div class="chart-wrap">
                    <div id="statusChart" style="height:100%;"></div>
                </div>
            </div>
            <div class="panel-box">
                <div class="state-progress-wrap" id="stateProgressList"></div>
            </div>
        </aside>

        <section class="center-map">
            <div class="map-wrap">
                <div class="panel-box panel-box-map">
                    <div class="ml-map-host-wrap">
                        <div class="ml-map-legend" aria-hidden="true">
                            <div class="legend-item"><span class="status-dot status-online"></span> 在线</div>
                            <div class="legend-item"><span class="status-dot status-offline"></span> 离线</div>
                            <div class="legend-item"><span class="status-dot status-running"></span> 运行</div>
                            <div class="legend-item"><span class="status-dot status-stopped"></span> 停止</div>
                            <div class="legend-item"><span class="status-dot status-alarm"></span> 报警</div>
                        </div>
                        <div id="map"></div>
                    </div>
                </div>
            </div>
            <div class="health-avg-floating">
                <div class="avg-label">平均健康分</div>
                <div class="avg-value" id="healthAvgScore">--</div>
            </div>
            <div class="health-below-map">
                <div class="panel-box-health">
                    <div class="health-panel-row">
                        <div class="health-kpi-left">
                            <div class="kpi kpi-health">
                                <div class="health-kpi-col">
                                    <div class="kpi-item">
                                        <span class="kpi-title">健康</span>
                                        <div class="kpi-num health-ok" id="healthCountHealthy">0</div>
                                    </div>
                                    <div class="kpi-item">
                                        <span class="kpi-title">关注</span>
                                        <div class="kpi-num health-attention" id="healthCountAttention">0</div>
                                    </div>
                                </div>
                                <div class="health-kpi-col">
                                    <div class="kpi-item">
                                        <span class="kpi-title">预警</span>
                                        <div class="kpi-num health-warning" id="healthCountWarning">0</div>
                                    </div>
                                    <div class="kpi-item">
                                        <span class="kpi-title">故障</span>
                                        <div class="kpi-num health-fault" id="healthCountFault">0</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <aside class="side-panel side-panel-right">
            <div class="panel-box panel-box-trend">

    /** 与 equip_screen_tech_theme.css 中 --color-status-* 同源（见 getTechScreenColorsSafe） */

    /**
     * 大屏专用异步 POST。global.js 的 post() 使用 sync XHR（async:false），
     * 多接口连续请求会长时间阻塞主线程，页面表现为卡死。
     * 逻辑与 post 一致，仅改为异步并依赖 handleResponseData（global.js）。
     */
    function postAsync(url, param, successFunc, failFuc, urlParam) {
        let req_url = initRequestUrl(url);
        if (urlParam != null) {
            urlParam.forEach((value, key) => {
                req_url += '&' + key + '=' + value;
            });
        }
        $.ajax({
            url: req_url,
            data: JSON.stringify(param),
            type: 'POST',
            dataType: 'json',
            headers: getCommonHeader(),
            async: true,
            contentType: 'application/json',
            success: function (data) {
                handleResponseData(data, successFunc, failFuc);
            },
            error: function (e, msg) {
                if (e.status >= 401 && e.status < 500) {
                    layer.confirm(i18np.prop('common.msg.lock_token'), null, function () {
                        localStorage.removeItem(store.token_header);
                        window.parent.location.href = '/view/login';
                    });
                } else {
                    layer.alert('请求异常，错误提示：' + msg);
                }
                if (typeof failFuc === 'function') {
                    try {
                        failFuc();
                    } catch (ignore) { /* ignore */
                    }
                }
            }
        });
    }

    layui.use(function () {
        var $ = layui.$;

        const pageFullscreenEl = $('.container').get(0);

        function syncFullscreenButtonLabel() {
            const fs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
            $('.btn-fs-text').text(fs ? '退出全屏' : '全屏');
            $('#btnScreenFullscreen').attr('title', fs ? '退出全屏' : '全屏').attr('aria-label', fs ? '退出全屏' : '全屏');
        }

        function requestPageFullscreen(el) {
            if (!el) return;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }

        function exitPageFullscreen() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
        }

        $('#btnScreenFullscreen').on('click', function () {
            const fs = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
            if (fs) {

                requestPageFullscreen(pageFullscreenEl);
            }

        $(document).on('fullscreenchange webkitfullscreenchange mozfullscreenchange MSFullscreenChange', function () {
            syncFullscreenButtonLabel();

        const SCREEN_REFRESH_MS = 30000;
        let screenRefreshTimer = null;
        function scheduleScreenDataRefresh() {
            if (screenRefreshTimer != null) {
                clearTimeout(screenRefreshTimer);
            }
            screenRefreshTimer = setTimeout(function tick() {
                screenRefreshTimer = null;
                if (typeof document !== 'undefined' && document.visibilityState === 'hidden') {
                    screenRefreshTimer = setTimeout(tick, SCREEN_REFRESH_MS);
                    return;
                }
                reloadCount();
                reloadCurrentTrendChart();
                reloadHealth();
                reloadMessage();
                reloadMap(false);
                screenRefreshTimer = setTimeout(tick, SCREEN_REFRESH_MS);

    function scenePointToMapDevice(item) {
        const lat = Number(item.offsetLat != null ? item.offsetLat : item.lat);
        const lng = Number(item.offsetLng != null ? item.offsetLng : item.lng);
        const st = item.sceneStats || {};
        const total = Number(st.total || 0);
        const offline = Number(st.offline || 0);
        const alarm = Number(st.alarm || 0);
        const running = Number(st.running || 0);
        const key = String(item.sceneCode || ('sc_' + lng.toFixed(5) + '_' + lat.toFixed(5)));
        return {
            id: key,
            lat: lat,
            lng: lng,
            name: item.sceneName || item.name || key,
            selfCode: key,
            sceneName: item.sceneName,
            isSceneAggregate: true,
            devices: item.devices,
            sceneStats: item.sceneStats,
            workshop: null,
            type: 0,
            onlineState: total > 0 && offline >= total ? 0 : 1,
            alarmState: alarm >= 1 ? 1 : 0,
            runState: running >= 1 ? 1 : 0
        };
    }

    function renderMaplibreMarkers(list, needViewReset) {
        if (!gisMap || !mapReady) return;
        const filtered = (list || []).filter(function (item) {
            return item.lng != null && item.lat != null;
        });
        const scenePoints = aggregateByScene(filtered);
        const pointSource = applyMapPointOffset(scenePoints);
        const devices = pointSource.map(scenePointToMapDevice);
        gisMap.setDevices(devices, needViewReset);
    }

    function aggregateByScene(items) {
        const groups = new Map();
        (items || []).forEach(function (item) {
            const lng = Number(item.lng);
            const lat = Number(item.lat);
            if (!Number.isFinite(lng) || !Number.isFinite(lat)) return;
            const wk = item.workshop || {};
            const sceneCode = wk.selfCode || item.workshopCode || wk.code || `scene_${lng.toFixed(4)}_${lat.toFixed(4)}`;
            const sceneName = wk.name || item.workshopName || item.sceneName || '未命名场景';
            if (!groups.has(sceneCode)) {
                groups.set(sceneCode, {
                    sceneCode: sceneCode,
                    sceneName: sceneName,
                    items: [],
                    sumLng: 0,
                    sumLat: 0,
                    sceneStats: {total: 0, online: 0, offline: 0, running: 0, stopped: 0, alarm: 0}
                });
            }
            const g = groups.get(sceneCode);
            g.items.push(item);
            g.sumLng += lng;
            g.sumLat += lat;
            g.sceneStats.total += 1;
            if (item.onlineState === 1) g.sceneStats.online += 1; else g.sceneStats.offline += 1;
            if (item.runState === 1) g.sceneStats.running += 1;
            if (item.runState === 0) g.sceneStats.stopped += 1;
            if ((item.alarmState || 0) >= 1) g.sceneStats.alarm += 1;
        });
        const result = [];
        groups.forEach(function (g) {
            const total = Math.max(1, g.sceneStats.total);
            const devices = g.items.map(function (d) {
                return {
                    name: d.name || d.selfCode || '-',
                    selfCode: d.selfCode,
                    onlineState: d.onlineState,
                    runState: d.runState,
                    alarmState: d.alarmState,
                    attrs: d.attrs,
                    alarmTexts: d.alarmTexts
                };
            });
            result.push({
                name: g.sceneName,
                lng: g.sumLng / total,
                lat: g.sumLat / total,
                sceneCode: g.sceneCode,
                sceneName: g.sceneName,
                sceneStats: g.sceneStats,
                devices: devices,
                isSceneAggregate: true
            });
        });
        return result;
    }

    function applyMapPointOffset(items) {
        const groups = new Map();
        (items || []).forEach(function (item) {
            const lng = Number(item.lng);
            const lat = Number(item.lat);
            if (!Number.isFinite(lng) || !Number.isFinite(lat)) return;
            const key = `${lng.toFixed(5)}_${lat.toFixed(5)}`;
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(item);
        });

        const result = [];
        groups.forEach(function (group) {
            if (group.length === 1) {
                result.push(group[0]);
                return;
            }
            const baseLng = Number(group[0].lng);
            const baseLat = Number(group[0].lat);
            const latRad = baseLat * Math.PI / 180;
            const lngMeter = Math.max(1, 111320 * Math.cos(latRad));
            const latMeter = 110540;
            const stepMeter = 36;
            group.forEach(function (item, idx) {
                const ring = Math.floor(idx / 8) + 1;
                const angle = (idx % 8) * (Math.PI / 4) + ring * 0.25;
                const meter = stepMeter * ring;
                const lngOffset = (Math.cos(angle) * meter) / lngMeter;
                const latOffset = (Math.sin(angle) * meter) / latMeter;
                result.push(Object.assign({}, item, {
                    offsetLng: baseLng + lngOffset,
                    offsetLat: baseLat + latOffset
                }));
            });
        });
        return result;
    }
