<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
    <script src="../static/js/echarts.min.js"></script>
</head>
<style>
    /*body {*/
    /*    background: var(--bg-page, #f3f5f8);*/
    /*}*/

    .equip-detail-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        background: var(--bg-panel, #fff);
        border-radius: 4px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
        margin-bottom: 16px;
        border: 1px solid var(--border-base, #e1e6ef);
    }

    .equip-overview {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .equip-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #52c41a 0%, #73d13d 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 28px;
    }

    .equip-icon.offline {
        background: linear-gradient(135deg, #8c8c8c 0%, #bfbfbf 100%);
    }

    .equip-icon.alarm {
        background: linear-gradient(135deg, #ff4d4f 0%, #ff7875 100%);
    }

    .equip-icon.run {
        background: linear-gradient(135deg, #52c41a 0%, #73d13d 100%);
    }

    .equip-icon.stop {
        background: linear-gradient(135deg, #fa8c16 0%, #ffa940 100%);
    }

    .equip-icon.online {
        background: linear-gradient(135deg, #52c41a 0%, #73d13d 100%);
    }

    .equip-name-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
    }

    .equip-name {
        font-size: 20px;
        font-weight: 600;
        color: #2f3b4a;
    }

    .equip-status-tag {
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
    }

    .equip-status-tag.online {
        background: #f6ffed;
        color: #52c41a;
        border: 1px solid #b7eb8f;
    }

    .equip-status-tag.offline {
        background: #f5f5f5;
        color: #8c8c8c;
        border: 1px solid #d9d9d9;
    }

    .equip-status-tag.alarm {
        background: #fff2f0;
        color: #ff4d4f;
        border: 1px solid #ffccc7;
    }

    .equip-status-tag.run {
        background: #f6ffed;
        color: #52c41a;
        border: 1px solid #b7eb8f;
    }

    .equip-status-tag.stop {
        background: #fff7e6;
        color: #fa8c16;
        border: 1px solid #ffd591;
    }

    .equip-meta {
        font-size: 12px;
        color: #6b7785;
    }

    .equip-actions {
        display: flex;
        gap: 8px;
    }

    .info-section {
        background: var(--bg-panel, #fff);
        border-radius: 4px;
        padding: 16px 24px;
        margin-bottom: 16px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
        border: 1px solid var(--border-base, #e1e6ef);
    }

    .info-section-title {
        font-size: 14px;
        font-weight: 600;
        color: #2f3b4a;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #e4e8ee;
    }

    .info-row {
        display: flex;
        padding: 6px 0;
        font-size: 13px;
    }

    .info-label {
        width: 120px;
        color: var(--text-sub, #6b7785);
        flex-shrink: 0;
        padding-right: 12px;
    }

    .info-value {
        color: #2f3b4a;
    }

    .copy-btn {
        margin-left: 8px;
        font-size: 12px;
        padding: 0 6px;
        height: 22px;
        line-height: 22px;
    }

    .realtime-header {
        background: var(--bg-panel, #fff);
        border-radius: 4px;
        padding: 0 6px;
        margin-bottom: 12px;
    }

    .realtime-mid {
        height: 320px;
        background: var(--bg-panel, #fff);
        border-radius: 4px;
        padding: 12px;
        margin-bottom: 12px;
        border: 1px solid var(--border-base, #e1e6ef);
    }

    .realtime-mid #realtime-run-chart-container {
        width: 100%;
        height: 100%;
    }

    .realtime-footer {
        background: var(--bg-panel, #fff);
        border-radius: 4px;
        padding: 0;
        margin: 0;
        /*border: 1px solid var(--border-base, #e1e6ef);*/
    }

    .layui-tab-title {
        background: var(--bg-panel, #fff);
        border: 1px solid var(--border-base, #e1e6ef);
        border-radius: 4px 4px 0 0;
    }

    .layui-tab-content {
        background: var(--bg-panel, #fff);
        border: 1px solid var(--border-base, #e1e6ef);
        border-top: none;
        padding: 16px;
        border-radius: 0 0 4px 4px;
    }

    /* 设备属性卡片 */
    .attrs-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
    }

    .attr-card {
        position: relative;
        background: var(--bg-panel, #fff);
        border: 1px solid var(--border-base, #e1e6ef);
        border-radius: 8px;
        padding: 16px 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
        min-height: 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .attr-card:nth-child(6n+1) {
        background: #e6f7ff;
        border-color: #91d5ff;
    }

    .attr-card:nth-child(6n+2) {
        background: #f6ffed;
        border-color: #b7eb8f;
    }

    .attr-card:nth-child(6n+3) {
        background: #fff7e6;
        border-color: #ffd591;
    }

    .attr-card:nth-child(6n+4) {
        background: #fff1f0;
        border-color: #ffa39e;
    }

    .attr-card:nth-child(6n+5) {
        background: #f9f0ff;
        border-color: #d3adf7;
    }

    .attr-card:nth-child(6n+6) {
        background: #e6fffb;
        border-color: #87e8de;
    }

    .attr-card .attr-pin {
        position: absolute;
        top: 8px;
        right: 10px;
        color: #1890ff;
        font-size: 16px;
        pointer-events: none;
    }

    .attr-card .attr-label {
        font-size: 16px;
        color: var(--text-sub, #6b7785);
        margin-bottom: 6px;
        line-height: 1.25;
    }

    .attr-card .attr-value-wrap {
        line-height: 1.25;
        word-break: break-all;
    }

    .attr-card .attr-value {
        font-size: 28px;
        font-weight: 600;
        color: #2f3b4a;
    }

    .attr-card .attr-unit {
        font-size: 15px;
        font-weight: 400;
        color: var(--text-sub, #8c8c8c);
        margin-left: 4px;
    }

    /* 控制属性卡片 */
    .ctrl-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 14px;
    }

    .ctrl-card {
        background: var(--bg-panel, #fff);
        border: 1px solid var(--border-base, #e1e6ef);
        border-radius: 10px;
        padding: 18px 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .ctrl-card .ctrl-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .ctrl-card .ctrl-name {
        font-size: 15px;
        font-weight: 600;
        color: #2f3b4a;
    }

    .ctrl-card .ctrl-type-tag {
        font-size: 11px;
        padding: 1px 8px;
        border-radius: 4px;
    }

    .ctrl-card .ctrl-type-tag.digital {
        background: #e6f7ff;
        color: #1890ff;
        border: 1px solid #91d5ff;
    }

    .ctrl-card .ctrl-type-tag.analog {
        background: #fff7e6;
        color: #fa8c16;
        border: 1px solid #ffd591;
    }

    .ctrl-card .ctrl-addr {
        font-size: 12px;
        color: #8c8c8c;
        font-family: Consolas, Monaco, monospace;
    }

    .ctrl-card .ctrl-current {
        font-size: 13px;
        color: #595959;
    }

    .ctrl-card .ctrl-current-val {
        font-weight: 600;
        font-size: 15px;
    }

    .ctrl-card .ctrl-current-val.v-on {
        color: #52c41a;
    }

    .ctrl-card .ctrl-current-val.v-off {
        color: #8c8c8c;
    }

    .ctrl-card .ctrl-current-val.v-num {
        color: #1890ff;
    }

    .ctrl-card .ctrl-body {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .ctrl-card .ctrl-range {
        font-size: 11px;
        color: #8c8c8c;
    }

    .ctrl-switch-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .ctrl-switch-btn {
        min-width: 70px;
        height: 36px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all .2s;
    }

    .ctrl-switch-btn.on {
        background: #f0f0f0;
        color: #8c8c8c;
        border: 1px solid #d9d9d9;
    }

    .ctrl-switch-btn.on:hover {
        background: #e8e8e8;
    }

    .ctrl-switch-btn.on.active {
        background: #52c41a;
        color: #fff;
        border: none;
        box-shadow: 0 2px 6px rgba(82, 196, 26, .4);
    }

    .ctrl-switch-btn.on.active:hover {
        background: #389e0d;
    }

    .ctrl-switch-btn.off {
        background: #f0f0f0;
        color: #8c8c8c;
        border: 1px solid #d9d9d9;
    }

    .ctrl-switch-btn.off:hover {
        background: #e8e8e8;
    }

    .ctrl-switch-btn.off.active {
        background: #ff4d4f;
        color: #fff;
        border: none;
        box-shadow: 0 2px 6px rgba(255, 77, 79, .4);
    }

    .ctrl-switch-btn.off.active:hover {
        background: #d9363e;
    }

    .ctrl-switch-status {
        font-size: 13px;
        font-weight: 600;
        min-width: 30px;
    }

    .ctrl-switch-status.s-on {
        color: #52c41a;
    }

    .ctrl-switch-status.s-off {
        color: #8c8c8c;
    }

    .ctrl-analog-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
    }

    .ctrl-analog-wrap input {
        width: 100px;
        height: 32px;
        padding: 0 8px;
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        font-size: 14px;
        outline: none;
    }

    .ctrl-analog-wrap input:focus {
        border-color: #1890ff;
        box-shadow: 0 0 0 2px rgba(24, 144, 255, .12);
    }

    .ctrl-analog-wrap .ctrl-unit {
        font-size: 13px;
        color: #8c8c8c;
    }

    .ctrl-analog-wrap .ctrl-send-btn {
        height: 32px;
        padding: 0 14px;
        border-radius: 4px;
        background: #1890ff;
        color: #fff;
        border: none;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
    }

    .ctrl-analog-wrap .ctrl-send-btn:hover {
        background: #096dd9;
    }

    .ctrl-analog-wrap .ctrl-send-btn:disabled {
        background: #d9d9d9;
        cursor: not-allowed;
    }

    /* 日志 Tab：三态报表 */
    .state-report-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
    }

    .state-report-toolbar .layui-form-mid {
        color: #8c8c8c;
        font-size: 12px;
    }

    .state-report-tabs {
        margin-top: 4px;
        border: 1px solid var(--border-base, #e1e6ef);
        border-radius: 4px;
        background: var(--bg-panel, #fff);
    }

    .state-report-tabs .layui-tab-title {
        margin-bottom: 0;
        border-bottom: 1px solid #e4e8ee;
    }

    .state-report-tabs .layui-tab-content {
        padding: 12px 12px 4px;
        margin: 0;
    }

    .state-report-tabs .layui-tab-item {
        overflow: visible;
    }
</style>
<body>
<div class="oemes-container" style="padding: 15px">
    <!-- 顶部：设备概览 + 操作按钮 -->
    <div class="equip-detail-header">
        <div class="equip-overview">
            <div class="equip-icon" id="equipIcon">
                <i class="layui-icon layui-icon-template"></i>
            </div>
            <div>
                <div class="equip-name-row">
                    <span class="equip-name" id="equipName">-</span>
                    <span class="equip-status-tag" id="equipStatusTag">-</span>
                </div>
                <div class="equip-meta">
                    <span lang-i18n="equip.code"></span>: <span id="equipSn">-</span> &nbsp;
                    <span lang-i18n="workshop.name"></span>: <span id="equipWorkshop">-</span>
                </div>
            </div>
        </div>
        <div class="equip-actions">
            <button class="layui-btn layui-btn-sm" id="btnSyncStatus" lang-i18n="equip.sync_status"></button>
            <button class="layui-btn layui-btn-sm layui-btn-primary" id="btnBackList"
                    lang-i18n="equip.back_list"></button>
        </div>
    </div>

    <!-- Tab 导航 -->
    <div class="layui-tab layui-tab-brief" lay-filter="equipDetailTab">
        <ul class="layui-tab-title">
            <li class="layui-this" lay-id="info" lang-i18n="equip.basic_info"></li>
            <li lay-id="realtime" lang-i18n="equip.realtime_status"></li>
            <li lay-id="invoke" lang-i18n="equip.function_call"></li>
            <li lay-id="log" lang-i18n="equip.log_view"></li>
        </ul>
        <div class="layui-tab-content">
            <!-- Tab1: 设备信息 -->
            <div class="layui-tab-item layui-show">
                <div class="info-section">
                    <div class="info-section-title" lang-i18n="equip.basic_info"></div>
                    <div class="info-row">
                        <span class="info-label" lang-i18n="equip.name"></span>
                        <span class="info-value" id="infoName">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label" lang-i18n="equip.code"></span>
                        <span class="info-value" id="infoSn">-</span>
                        <button class="layui-btn layui-btn-xs layui-btn-primary copy-btn" data-copy="infoSn">复制
                        </button>
                    </div>
                    <div class="info-row">
                        <span class="info-label" lang-i18n="equip.type"></span>
                        <span class="info-value" id="infoType">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label" lang-i18n="equip.onlineState"></span>
                        <span class="info-value" id="infoOnlineState">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label" lang-i18n="equip.runState"></span>
                        <span class="info-value" id="infoRunState">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label" lang-i18n="equip.alarmState"></span>
                        <span class="info-value" id="infoAlarmState">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label" lang-i18n="common.address"></span>
                        <span class="info-value" id="infoAddress">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label" lang-i18n="common.lng"></span>
                        <span class="info-value" id="infoLng">-</span>
                        <span class="info-label" style="width:60px;margin-left: 50px" lang-i18n="common.lat"></span>
                        <span class="info-value" id="infoLat">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">创建时间</span>
                        <span class="info-value" id="infoCreateTime">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">最后在线</span>
                        <span class="info-value" id="infoOnlineChangeTime">-</span>
                    </div>
                </div>
                <div class="info-section" id="gatewaySection" style="display:none">
                    <div class="info-section-title">网关信息</div>
                    <div class="info-row"><span class="info-label">网关</span><span class="info-value" id="infoGateway">-</span>
                    </div>
                </div>
                <div class="info-section" id="attrsSection" style="display:none">
                    <div class="info-section-title" lang-i18n="equipattr.name"></div>
                    <div id="attrsContainer"></div>
                </div>
                <div class="info-section" id="controlSection" style="display:none">
                    <div class="info-section-title">控制属性</div>
                    <div id="controlContainer" class="ctrl-cards"></div>
                </div>
            </div>

            <!-- Tab2: 实时状态（equip_collect_echarts 内容） -->
            <div class="layui-tab-item" id="realtimeTabContent">
                <div class="realtime-header">
                    <form class="layui-form layui-row layui-col-space16" id="realtimeQueryForm">
                        <div class="layui-form-item">
                            <div class="layui-inline" id="realtime-timeduration">
                                <div class="layui-input-inline">
                                    <input type="text" id="realtime-startDate" name="startDate" class="layui-input"
                                           lang-i18n="common.starttime">
                                </div>
                                <div class="layui-form-mid">-</div>
                                <div class="layui-input-inline">
                                    <input type="text" id="realtime-endDate" name="endDate" class="layui-input"
                                           lang-i18n="common.endtime">
                                </div>
                            </div>
                            <button class="layui-btn layui-btn-sm" lay-submit lay-filter="realtime-doSearch"
                                    lang-i18n="common.search"></button>
                        </div>
                    </form>
                </div>
                <div class="realtime-mid">
                    <div id="realtime-run-chart-container"></div>
                </div>
                <div class="layui-tab layui-tab-brief realtime-footer" id="realtimeFooter" style="display: none;">
                    <ul class="layui-tab-title">
                        <li class="layui-this">趋势图</li>
                        <li>数据表</li>
                    </ul>
                    <div class="layui-tab-content">
                        <div class="layui-tab-item layui-show">
                            <div id="realtime-chart-container"></div>
                        </div>
                        <div class="layui-tab-item">
                            <table class="layui-hide" id="realtime-tb-common"></table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab3: 功能调用 -->
            <div class="layui-tab-item">
                <div class="info-section">
                    <p class="layui-text" style="color:#8c8c8c">功能调用模块待扩展</p>
                </div>
            </div>

            <!-- Tab4: 日志查看 -->
            <div class="layui-tab-item">
                <form class="layui-form" id="stateReportQueryForm">
                    <div class="state-report-toolbar">
                        <div class="layui-inline" id="state-timeline-daterange">
                            <div class="layui-input-inline" style="width: 170px;">
                                <input type="text" id="state-timeline-start" class="layui-input"
                                       placeholder="开始时间">
                            </div>
                            <div class="layui-input-inline" style="width: 170px;">
                                <input type="text" id="state-timeline-end" class="layui-input"
                                       placeholder="结束时间">
                            </div>
                        </div>
                        <button type="button" class="layui-btn layui-btn-sm" lay-submit
                                lay-filter="state-timeline-doSearch">查询
                        </button>
                        <span class="layui-form-mid">时间跨度最长 30 天</span>
                    </div>
                </form>
                <div class="layui-tab layui-tab-brief state-report-tabs" lay-filter="stateReportTriTab">
                    <ul class="layui-tab-title">
                        <li class="layui-this" lay-id="stateRun">运行</li>
                        <li lay-id="stateOnline">在线</li>
                        <li lay-id="stateAlarm">报警</li>
                    </ul>
                    <div class="layui-tab-content">
                        <div class="layui-tab-item layui-show">
                            <table class="layui-hide" id="stateTbRun"></table>
                        </div>
                        <div class="layui-tab-item">
                            <table class="layui-hide" id="stateTbOnline"></table>
                        </div>
                        <div class="layui-tab-item">
                            <table class="layui-hide" id="stateTbAlarm"></table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="none">
    let equipId;
    let equipData;
    let sn;
    let realtime_datalist = [];
    let realtime_config_data = [];
    let realtime_run_chart;
    let realtime_tread_chart;
    let realtime_table_inited = false;
    let realtime_collect_inited = false;
    let state_report_tables_inited = false;
    let table;

    layui.use(function () {
        let form = layui.form;
        table = layui.table;
        let laydate = layui.laydate;
        let element = layui.element;

        equipId = layui.url().search.id;
        if (!equipId) {
            layer.msg('缺少设备ID');
            return;
        }

        setTimeout(function () {
            loadEquipData();
        }, 100);

        document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible' && equipId) loadEquipData(true);
        });

        document.getElementById('btnSyncStatus').onclick = function () {
            loadEquipData(true);
        };
        document.getElementById('btnBackList').onclick = function () {
            try {
                parent.layui.element.tabDelete('tables', equipId);
            } catch (e) {
                window.history.back();
            }
        };

        laydate.render({
            elem: '#realtime-timeduration',
            range: ['#realtime-startDate', '#realtime-endDate'],
            rangeLinked: true,
            type: 'datetime',

    function renderEquipInfo(d) {
        if (!d) return;
        let onlineText = d.onlineState === 1 ? i18np.prop('equip.online') : i18np.prop('equip.offline');
        let runText = d.runState === 1 ? i18np.prop('equip.run') : i18np.prop('equip.stop');
        let alarmText = d.alarmState === 1 ? i18np.prop('equip.alarm') : i18np.prop('equip.common');

        var statusClass, statusText;
        if (d.alarmState === 1) {
            statusClass = 'alarm';
            statusText = alarmText;
        } else if (d.onlineState !== 1) {
            statusClass = 'offline';
            statusText = onlineText;
        } else {
            statusClass = d.runState === 1 ? 'run' : 'stop';
            statusText = runText;
        }

        $('#equipName').text(d.name || '-');
        $('#equipSn').text(d.selfCode || '-');
        $('#equipWorkshop').text(d.workshop ? d.workshop.name : '-');
        $('#equipStatusTag').text(statusText).removeClass('online offline alarm run stop').addClass(statusClass);
        $('#equipIcon').removeClass('offline alarm run stop online').addClass(statusClass);

        $('#infoName').text(d.name || '-');
        $('#infoSn').text(d.selfCode || '-');
        $('#infoType').text(d.typeDesc || '-');
        $('#infoOnlineState').text(onlineText);
        $('#infoRunState').text(runText);
        $('#infoAlarmState').text(alarmText);
        $('#infoAddress').text(d.address || '-');
        $('#infoLng').text(d.lng != null ? d.lng : '-');
        $('#infoLat').text(d.lat != null ? d.lat : '-');
        $('#infoCreateTime').text(d.createTime ? formatDate(parseDate(d.createTime)) : '-');
        $('#infoOnlineChangeTime').text(d.onlineChangeTime ? formatDate(parseDate(d.onlineChangeTime)) : '-');

        if (d.attrs && d.attrs.length > 0) {
            $('#attrsSection').show();
            let html = '<div class="attrs-cards">';
            d.attrs.forEach(function (a) {
                var val = a.value != null ? (typeof a.value === 'object' ? JSON.stringify(a.value) : String(a.value)) : '-';
                var unitHtml = (a.unit && a.unit.trim()) ? ('<span class="attr-unit">' + a.unit.trim() + '</span>') : '';
                html += '<div class="attr-card"><i class="layui-icon layui-icon-flag attr-pin"></i><div class="attr-label">' + (a.name || '-') + '</div><div class="attr-value-wrap"><span class="attr-value">' + val + '</span>' + unitHtml + '</div></div>';

    function loadControlConfig() {
        if (!equipId) return;
        get(router.equip_config, {equipId: equipId}, function (d) {
            var cfgAttrs = (d && d.config && d.config.attrs) ? d.config.attrs : [];
            if (cfgAttrs.length > 0) {
                if (equipData && equipData.attrs) {
                    var attrValMap = {};
                    equipData.attrs.forEach(function (a) {
                        if (a.name) attrValMap[a.name] = a;
                    });
                    cfgAttrs.forEach(function (a) {
                        var rt = attrValMap[a.name];
                        if (rt) {
                            if (rt.value !== undefined) a.value = rt.value;
                        }
                    });
                }
                $('#attrsSection').show();
                var html = '<div class="attrs-cards">';
                cfgAttrs.forEach(function (a) {
                    var val = a.value != null ? (typeof a.value === 'object' ? JSON.stringify(a.value) : String(a.value)) : '-';
                    var unitHtml = (a.unit && a.unit.trim()) ? ('<span class="attr-unit">' + a.unit.trim() + '</span>') : '';
                    html += '<div class="attr-card"><i class="layui-icon layui-icon-flag attr-pin"></i><div class="attr-label">' + (a.name || '-') + '</div><div class="attr-value-wrap"><span class="attr-value">' + val + '</span>' + unitHtml + '</div></div>';
                });
                html += '</div>';
                $('#attrsContainer').html(html);
            } else {
                $('#attrsSection').hide();
            }

            var controls = (d && d.config && d.config.controls) ? d.config.controls : [];
            if (controls.length > 0) {
                if (equipData && equipData.controls) {
                    var valMap = {};
                    equipData.controls.forEach(function (c) {
                        if (c.map) valMap[c.map] = c.value;
                    });
                    controls.forEach(function (c) {
                        if (c.map && valMap[c.map] !== undefined) c.value = valMap[c.map];
                    });
                }
                $('#controlSection').show();
                renderControls(controls);
            } else {
                $('#controlSection').hide();
            }
        });
    }

    function renderControls(controls) {
        var html = '';
        controls.forEach(function (ctrl, idx) {
            var isDigital = (ctrl.type === 0 || ctrl.type == null);
            var typeTag = isDigital
                ? '<span class="ctrl-type-tag digital">开关量</span>'
                : '<span class="ctrl-type-tag analog">模拟量</span>';
            var curVal = ctrl.value;
            var valHtml;
            if (isDigital) {
                var isOn = curVal == 1 || curVal === '1';
                var cls = curVal != null ? (isOn ? 'v-on' : 'v-off') : '';
                var txt = curVal != null ? (isOn ? 'ON' : 'OFF') : '-';
                valHtml = '<span class="ctrl-current-val ' + cls + '" id="ctrl-val-' + idx + '">' + txt + '</span>';
            } else {
                var display = curVal != null ? curVal : '-';
                var unitStr = ctrl.unit ? ' ' + ctrl.unit : '';
                valHtml = '<span class="ctrl-current-val v-num" id="ctrl-val-' + idx + '">' + display + '</span>' + unitStr;
            }
            html += '<div class="ctrl-card">';
            html += '<div class="ctrl-head"><span class="ctrl-name">' + (ctrl.name || '-') + '</span>' + typeTag + '</div>';
            html += '<div class="ctrl-addr">地址: ' + (ctrl.map || '-') + '</div>';
            html += '<div class="ctrl-current">当前值: ' + valHtml + '</div>';
            html += '<div class="ctrl-body">';
            if (isDigital) {
                var isOn = curVal == 1 || curVal === '1';
                var onActive = (curVal != null && isOn) ? ' active' : '';
                var offActive = (curVal != null && !isOn) ? ' active' : '';
                html += '<div class="ctrl-switch-wrap" id="ctrl-sw-' + idx + '">' +
                    '<button class="ctrl-switch-btn on' + onActive + '" onclick="doWriteControl(\'' + ctrl.map + '\', 1, this, ' + idx + ')">ON</button>' +
                    '<button class="ctrl-switch-btn off' + offActive + '" onclick="doWriteControl(\'' + ctrl.map + '\', 0, this, ' + idx + ')">OFF</button>' +
                    '</div>';
            } else {
                var rangeHtml = '';
                if (ctrl.min != null || ctrl.max != null) {
                    rangeHtml = '<div class="ctrl-range">范围: ' +
                        (ctrl.min != null ? ctrl.min : '-∞') + ' ~ ' +
                        (ctrl.max != null ? ctrl.max : '+∞') +
                        (ctrl.unit ? ' ' + ctrl.unit : '') + '</div>';
                }
                html += '<div class="ctrl-analog-wrap">' +
                    '<input type="number" class="ctrl-analog-input" id="ctrl-input-' + idx + '"' +
                    (ctrl.min != null ? ' min="' + ctrl.min + '"' : '') +
                    (ctrl.max != null ? ' max="' + ctrl.max + '"' : '') +
                    ' placeholder="输入值">' +
                    (ctrl.unit ? '<span class="ctrl-unit">' + ctrl.unit + '</span>' : '') +
                    '<button class="ctrl-send-btn" onclick="doWriteAnalog(\'' + ctrl.map + '\', ' + idx + ', this)">写入</button>' +
                    '</div>' + rangeHtml;
            }
            html += '</div></div>';
        });
        $('#controlContainer').html(html);
    }

    function doWriteControl(address, value, btnEl, idx) {
        if (!equipId) return;
        var $btn = $(btnEl);
        if ($btn.hasClass('active')) return;
        $btn.prop('disabled', true);
        post(router.equip_writeControl, {
            equipId: equipId,
            address: address,
            value: value
        }, function () {
            layer.msg('写入成功', {icon: 1, time: 1500});
            $btn.prop('disabled', false);
            var isOn = value == 1;
            $('#ctrl-val-' + idx).text(isOn ? 'ON' : 'OFF')
                .removeClass('v-on v-off').addClass(isOn ? 'v-on' : 'v-off');
            var $wrap = $('#ctrl-sw-' + idx);
            $wrap.find('.ctrl-switch-btn.on').toggleClass('active', isOn);
            $wrap.find('.ctrl-switch-btn.off').toggleClass('active', !isOn);
            setTimeout(function () {
                loadEquipData(true);
            }, 1500);
        }, function (code, msg) {
            layer.msg(msg || '写入失败', {icon: 2, time: 2000});
            $btn.prop('disabled', false);
        });
    }

    function doWriteAnalog(address, idx, btnEl) {
        if (!equipId) return;
        var $input = $('#ctrl-input-' + idx);
        var val = $input.val();
        if (val === '' || val == null) {
            layer.msg('请输入控制值', {icon: 0, time: 1500});
            $input.focus();
            return;
        }
        var $btn = $(btnEl);
        $btn.prop('disabled', true).text('写入中...');
        post(router.equip_writeControl, {
            equipId: equipId,
            address: address,
            value: parseFloat(val)
        }, function () {
            layer.msg('写入成功', {icon: 1, time: 1500});
            $btn.prop('disabled', false).text('写入');
            $('#ctrl-val-' + idx).text(val);
            setTimeout(function () {
                loadEquipData(true);
            }, 1500);
        }, function (code, msg) {
            layer.msg(msg || '写入失败', {icon: 2, time: 2000});
            $btn.prop('disabled', false).text('写入');
        });
    }

    function initRealtimeRunCharts() {
        let dom = document.getElementById('realtime-run-chart-container');
        if (!dom) return;
        realtime_run_chart = echarts.init(dom);
        realtime_run_chart.setOption({
            title: {text: '设备运行趋势', textStyle: {fontSize: 14, fontWeight: 400, color: '#6b778c'}},
            tooltip: {
                confine: true,
                formatter: function (params) {
                    let type = params.data[0], state = params.data[3];
                    let desc = type === 0 ? (state === 1 ? '在线' : '离线') : (type === 1 ? (state === 1 ? '运行' : '停止') : (state === 1 ? '报警' : '正常'));
                    return desc + '\r\n' + formatDate(params.data[1]) + '~' + formatDate(params.data[2]);
                }
            },
            xAxis: {type: 'time', axisLabel: {fontSize: 6}},
            yAxis: {type: 'category', data: ['在线', '运行', '报警']},
            series: [{
                type: 'custom',
                renderItem: function (params, api) {
                    let yIndex = api.value(0), start = api.coord([api.value(1), yIndex]),
                        end = api.coord([api.value(2), yIndex]);
                    let type = api.value(0), state = api.value(3);
                    let fill = type === 0 ? (state === 1 ? '#1890ff' : '#bfbfbf') : (type === 1 ? (state === 1 ? '#52c41a' : '#FAAD14') : (state === 1 ? '#ff4d4f' : '#bfbfbf'));
                    return {
                        type: 'rect',
                        shape: {x: start[0], y: start[1] - 10, width: end[0] - start[0], height: 20},
                        style: {fill: fill}
                    };
                },
                encode: {x: [1, 2], y: 0}, data: []
            }]
        });
        reloadRealtimeRunCharts();
    }

    function reloadRealtimeRunCharts() {
        if (!realtime_run_chart || !sn) return;
        let startDate = parseDate($('#realtime-startDate').val()), endDate = parseDate($('#realtime-endDate').val());
        let r = [], pending = 3;

        function done() {
            if (--pending > 0) return;
            r = mergeRealtimeRecords(r);
            realtime_run_chart.setOption({xAxis: {min: startDate, max: endDate}, series: [{data: r}]}, false);
        }

        post(router.equip_online_count, {
            sn: sn,
            startDate: formatDate(startDate),
            endDate: formatDate(endDate),
            requirePage: false
        }, function (res) {
            if (res && res.length > 0) res.forEach(function (item) {
                r.push([0, parseDate(item.startTime), parseDate(item.endTime), item.state]);
            });
            done();
        }, done);
        post(router.equip_run_count, {
            sn: sn,
            startDate: formatDate(startDate),
            endDate: formatDate(endDate),
            requirePage: false
        }, function (res) {
            if (res && res.length > 0) res.forEach(function (item) {
                r.push([1, parseDate(item.startTime), parseDate(item.endTime), item.state]);
            });
            done();
        }, done);
        post(router.equip_alarm_count, {
            sn: sn,
            startDate: formatDate(startDate),
            endDate: formatDate(endDate),
            requirePage: false
        }, function (res) {
            if (res && res.length > 0) res.forEach(function (item) {
                r.push([2, parseDate(item.startTime), parseDate(item.endTime), item.state]);
            });
            done();
        }, done);
    }

    function mergeRealtimeRecords(data) {
        data.sort(function (a, b) {
            return a[3] === b[3] ? a[1] - b[1] : a[3] - b[3];
        });
        let merged = [];
        for (let i = 0; i < data.length; i++) {
            let cur = data[i];
            if (merged.length === 0) {
                merged.push([].concat(cur));
                continue;
            }
            let last = merged[merged.length - 1];
            if (last[3] === cur[3] && last[2] >= cur[1]) last[2] = Math.max(last[2], cur[2]);
            else merged.push([].concat(cur));
        }
        return merged;
    }

    function parseRecordTime(v) {
        if (v == null) return null;
        if (Object.prototype.toString.call(v) === '[object Date]' && !isNaN(v.getTime())) return v;
        if (typeof v === 'number') return new Date(v);
        var s = String(v);
        if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/.test(s)) return parseDate(s.substring(0, 19));
        var d = new Date(s);
        return isNaN(d.getTime()) ? null : d;
    }

        return key ? i18np.prop(key) : String(lv);
    }

    function loadStateTimelines() {
        if (!sn) {
            layer.msg('当前设备无编号（selfCode），无法查询三态记录', {time: 2200});
            return;
        }
        var startDate = parseRecordTime($('#state-timeline-start').val());
        var endDate = parseRecordTime($('#state-timeline-end').val());
        if (!startDate || !endDate) {
            layer.msg('请选择起止时间');
            return;
        }
        var span = endDate.getTime() - startDate.getTime();
        if (span <= 0) {
            layer.msg('结束时间须晚于开始时间');
            return;
        }
        if (span > 30 * 24 * 60 * 60 * 1000) {
            layer.msg('时间范围不能超过 30 天');
            return;
        }
        reloadStateReportTables();
    }

    function initRealtimeTread() {
        if (realtime_config_data.length === 0) return;
        let baseSize = 200, size = Math.ceil(realtime_config_data.length / 2) * baseSize;
        $('#realtime-chart-container').css({width: '100%', height: size + 'px'});
        realtime_tread_chart = echarts.init(document.getElementById('realtime-chart-container'));
        reloadRealtimeTread();
    }

    function reloadRealtimeTread() {
        if (!realtime_tread_chart || !sn || realtime_config_data.length === 0) return;
        post(router.equip_collect_page, {
            sn: sn,
            startDate: $('#realtime-startDate').val(),
            endDate: $('#realtime-endDate').val(),
            requirePage: false
        }, function (res) {
            realtime_datalist = (res && Array.isArray(res)) ? res : [];
            realtime_tread_chart.setOption(generateRealtimeOption());
        });
    }

    function generateRealtimeOption() {
        let visualMap = [], xAxis = [], yAxis = [], grid = [], series = [], title = [];
        const COL = 2, GAP_X = 5, GAP_Y = 8, MARGIN_TOP = 8, MARGIN_LEFT = 5, MARGIN_BOTTOM = 6, TITLE_HEIGHT = 6;
        const gridWidth = (100 - MARGIN_LEFT * 2 - GAP_X * (COL - 1)) / COL;
        const gridHeight = (100 - MARGIN_TOP - MARGIN_BOTTOM - GAP_Y * (Math.ceil(realtime_config_data.length / COL) - 1)) / Math.ceil(realtime_config_data.length / COL);
        realtime_config_data.forEach(function (item, index) {
            let row = Math.floor(index / COL), col = index % COL;
            visualMap.push({show: false, type: 'continuous', seriesIndex: index});
            title.push({
                left: (MARGIN_LEFT + col * (gridWidth + GAP_X) + gridWidth / 2 - 5) + '%',
                top: (MARGIN_TOP + row * (gridHeight + GAP_Y + TITLE_HEIGHT)) + '%',
                text: item.name,
                textAlign: 'center',
                textStyle: {fontSize: 12, color: '#6b778c'}
            });
            grid.push({
                left: MARGIN_LEFT + col * (gridWidth + GAP_X) + '%',
                top: (MARGIN_TOP + row * (gridHeight + GAP_Y + TITLE_HEIGHT) + TITLE_HEIGHT) + '%',
                width: gridWidth + '%',
                height: gridHeight + '%'
            });
            xAxis.push({
                gridIndex: index,
                type: 'time',
                axisLabel: {rotate: 45, interval: 'auto'},
                splitLine: {show: false}
            });
            yAxis.push({gridIndex: index, type: 'value', splitLine: {show: false}});
            let vList = [];
            realtime_datalist.forEach(function (d) {
                vList.push([d.time, d.data && d.data[item.name] != null ? d.data[item.name] : null]);
            });
            series.push({
                type: 'line',
                smooth: false,
                showSymbol: false,
                lineStyle: {width: 1.5, color: '#4FA6E8'},
                areaStyle: {opacity: 0.12},
                data: vList,
                xAxisIndex: index,
                yAxisIndex: index
            });
        });
        return {visualMap, title, tooltip: {trigger: 'axis'}, xAxis, yAxis, grid, series};
    }

    function initRealtimeTb() {
        table.render({
            id: 'realtimeTbCommon',
            elem: '#realtime-tb-common',
            method: 'POST',
            headers: getCommonHeader(),
            contentType: 'application/json',
            loading: false,
            cols: [[]],
            data: [],
            request: {pageName: 'page', limitName: 'pageSize'},
            response: {statusName: 'code', statusCode: 200},
            parseData: function (res) {
                return {code: res.code, msg: res.msg, data: res.data};
            },
            limit: 10, limits: [10, 20, 50, 100], page: true, height: 'full'
        });
        realtime_table_inited = true;
        reloadRealtimeTbAll();
    }

    function reloadRealtimeTb() {
        table.reload('realtimeTbCommon', {
            url: initRequestUrl(router.equip_collect_page),
            where: {sn: sn, startDate: $('#realtime-startDate').val(), endDate: $('#realtime-endDate').val()}
        });
    }

    function reloadRealtimeTbAll() {
        let col = [{field: 'time', title: i18np.prop('common.time'), fixed: 'left'}];
        realtime_config_data.forEach(function (e) {
            if (e.needCollect) col.push({
                field: e.name, title: e.name, templet: function (d) {
                    return d.data == null ? null : d.data[e.name];
                }
            });
        });
        let title = $('#realtime-startDate').val() + ' - ' + $('#realtime-endDate').val();
        table.reload('realtimeTbCommon', {
            cols: [col],
            url: initRequestUrl(router.equip_collect_page),
            where: {sn: sn, startDate: $('#realtime-startDate').val(), endDate: $('#realtime-endDate').val()}
        });
    }

    document.querySelectorAll('[data-copy]').forEach(function (btn) {
        if (!btn) return;
        btn.addEventListener('click', function () {
            let id = this.getAttribute('data-copy');
            let text = document.getElementById(id).innerText;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function () {
                    layer.msg('已复制');
                });
            } else {
                let ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                layer.msg('已复制');
            }
        });
    });

    window.onresize = function () {
        if (realtime_run_chart) realtime_run_chart.resize();
        if (realtime_tread_chart) realtime_tread_chart.resize();
    };
</script>
</body>
</html>
