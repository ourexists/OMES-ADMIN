<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
    <style>
        .json-container {
            display: flex;
            gap: 16px;
        }

        .json-box {
            flex: 1;
            padding: 10px;
        }

        .json-box textarea {
            width: 100%;
            height: 400px;
            font-family: monospace;
            font-size: 13px;
            padding: 8px;
            resize: none;
        }

        .json-box .title {
            font-weight: bold;
            margin-bottom: 8px;
        }

        #json-template {
            font-weight: bold;
        }

    </style>
</head>
<body>
<div style="padding: 16px;">
    <form class="layui-form layui-form-pane" action="" id="common-edit-form" lay-filter="common-edit-form">
        <div class="layui-form-item">
            <label class="layui-form-label" lang-i18n="data.collect_type" style="font-weight: bold "></label>
            <div class="layui-input-block">
                <select name="collectType" id="collectType">
                </select>
            </div>
        </div>
        <div class="json-container">
            <!-- 左侧 JSON 输入 -->
            <div class="json-box">
                <div class="title">属性配置(JSON)</div>
                <textarea id="json-input" placeholder='{}'></textarea>
            </div>
            <!-- 右侧 JSON 模板 -->
            <div class="json-box">
                <div class="title">配置模板示例</div>
                <textarea id="json-template" readonly disabled></textarea>
            </div>
        </div>

        <div class="layui-form-item" style="text-align: right;margin-top: 10px">
            <button class="layui-btn" lay-submit lay-filter="common-edit-button"
                    lang-i18n="common.msg.confirm"></button>
        </div>
    </form>
</div>
<script type="text/html" id="tb-tool">
    <div class="layui-clear-space">
        <a class="layui-btn layui-btn-xs layui-btn-primary" lay-event="del">
            <i class="layui-icon layui-icon-subtraction"></i>
        </a>
    </div>
</script>
<script type="text/html" id="tb-tool-2">
    <div class="layui-clear-space">
        <a class="layui-btn layui-btn-xs layui-btn-primary" lay-event="del">
            <i class="layui-icon layui-icon-subtraction"></i>
        </a>
    </div>
</script>
<script th:inline="none">
    var current_data;
    layui.use(function () {
        let form = layui.form,
            layer = layui.layer;
        const jsonTemplate = {
            runMap: {
                value: "run", comment: i18np.prop("equip.runMap")
            },
            alarmMap: {
                value: "run", comment: i18np.prop("equip.alarmMap")
            },
            attrs: {
                comment: "设备属性配置",
                value: [
                    {
                        name: {value: "attributeName", comment: i18np.prop("equipattr.name")},
                        map: {value: "mapField", comment: i18np.prop("equipattr.map")},
                        value: {value: "defaultValue", comment: i18np.prop("equipattr.value")},
                        unit: {value: "ml", comment: i18np.prop("equipattr.unit")},
                        needCollect: {value: true, comment: "是否采集"},

                    }
                ]
            },
            alarms: {
                value: [
                    {
                        map: {value: "alarmMap", comment: i18np.prop("equipattr.map")},
                        val: {value: "triggerValue", comment: i18np.prop("equipattr.alarmVal")},
                        text: {value: "alarmDescription", comment: i18np.prop("equipattr.alarmText")}
                    }
                ],
                comment: "设备报警属性"
            }
        };
        $('#json-template').html(renderJsonWithComment(jsonTemplate));

        let id = layui.url().search.id;

        get(router.equip_collect_type, null, function (result) {
            $.each(result, function (index, item) {
                $('#collectType').append(new Option(item, item));
            })
            form.render();
        })

        get(router.equip_config, {"equipId": id}, function (r) {
            if (r == null) {
                current_data = {};
                attrDetails = [];
                form.val("common-edit-form", {});
            } else {
                current_data = r.config;
                if (current_data != null) {
                    form.val("common-edit-form", Object.assign({}, current_data));
                    // 将 attrs & alarms 转成 JSON 填入 textarea
                    const jsonText = JSON.stringify(
                        current_data,
                        (key, value) => key === "collectType" ? undefined : value,
                        4)
                    $('#json-input').val(jsonText);
                } else {
                    form.val("common-edit-form", {});
                    current_data = {};
                }
            }
        })
        // 提交事件
        form.on('submit(common-edit-button)', function (data) {
            let config = $("#json-input").val();
            let configJSON = JSON.parse(config);
            let field = data.field; // 获取表单字段值
            for (let key in field) {
                configJSON[key] = field[key];
            }
            post(router.equip_setConfig, {
                "equipId": id,
                "config": configJSON
            }, function () {
                let index = parent.layer.getFrameIndex(window.name);
                parent.layer.close(index);
            }, function (code, msg) {
                layer.alert(msg, {
                    title: 'error'
                });
            })
            return false;
        });
    });
</script>
</body>
</html>
