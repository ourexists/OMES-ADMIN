<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>多Agent Assistant UI</title>
    <link rel="stylesheet" th:href="${portalStaticBaseUrl + '/static/layui/css/layui.css'}">
    <link rel="stylesheet" th:href="${portalStaticBaseUrl + '/static/css/common.css'}">
    <script th:src="${portalStaticBaseUrl + '/static/js/jquery.min.js'}"></script>
    <script th:src="${portalStaticBaseUrl + '/static/layui/layui.js'}"></script>
    <script src="/static/js/ai_global.js"></script>
    <style>
        html, body { height: 100%; margin: 0; background: #f4f6fb; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        .aui-layout { height: 100%; display: grid; grid-template-columns: 280px 1fr; gap: 12px; padding: 12px; box-sizing: border-box; }
        .aui-sidebar, .aui-main { background: #fff; border: 1px solid #e8ebf0; border-radius: 12px; overflow: hidden; }
        .aui-sidebar { display: flex; flex-direction: column; }
        .aui-sidebar-header { padding: 12px; border-bottom: 1px solid #eef1f5; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .aui-session-list { flex: 1; overflow-y: auto; padding: 8px; }
        .aui-session-item { border: 1px solid #e8ebf0; border-radius: 8px; padding: 10px; margin-bottom: 8px; cursor: pointer; background: #fafbff; transition: all .2s ease; }
        .aui-session-item.active { border-color: #4f7cff; background: #eef3ff; }
        .aui-main { display: flex; flex-direction: column; }
        .aui-main-header { padding: 12px 14px; border-bottom: 1px solid #eef1f5; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .aui-agent-selector { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .aui-agent-tag { border: 1px solid #dce3f2; background: #f8faff; border-radius: 999px; padding: 4px 10px; font-size: 12px; }
        .aui-chat { flex: 1; overflow-y: auto; padding: 16px; background: linear-gradient(180deg, #f8f9fd 0%, #f5f7fb 100%); }
        .aui-msg { display: flex; margin-bottom: 10px; }
        .aui-msg.user { justify-content: flex-end; }
        .aui-msg.system { justify-content: center; }
        .aui-bubble { max-width: 78%; border-radius: 12px; padding: 10px 12px; white-space: pre-wrap; line-height: 1.5; font-size: 13px; box-shadow: 0 2px 8px rgba(0, 0, 0, .04); }
        .aui-msg.user .aui-bubble { background: #4f7cff; color: #fff; }
        .aui-msg.assistant .aui-bubble { background: #fff; border: 1px solid #e7ebf2; color: #1f2d3d; }
        .aui-msg.system .aui-bubble { background: #fff8e8; border: 1px solid #ffe0a6; color: #8a5a00; }
        .aui-role { font-size: 11px; color: #8a97ad; margin-bottom: 4px; }
        .aui-composer { border-top: 1px solid #eef1f5; padding: 12px; background: #fff; }
        .aui-composer-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; }
        .aui-input { border: 1px solid #dce3f2; border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; width: 100%; box-sizing: border-box; }
        .aui-sub-config { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .aui-empty { color: #9aa6ba; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>
<div class="aui-layout">
    <div class="aui-sidebar">
        <div class="aui-sidebar-header"><span>会话列表</span><button type="button" class="layui-btn layui-btn-xs layui-btn-primary" id="btn-new-session">新建</button></div>
        <div id="session-list" class="aui-session-list"></div>
    </div>
    <div class="aui-main">
        <div class="aui-main-header">
            <div class="aui-agent-selector" id="agent-selector"></div>
            <div><button type="button" class="layui-btn layui-btn-xs layui-btn-primary" id="btn-clear">清空窗口</button></div>
        </div>
        <div id="chat-log" class="aui-chat"><div class="aui-empty">开始和多Agent对话吧</div></div>
        <div class="aui-composer">
            <div class="aui-composer-row">
                <input type="text" id="msg" class="aui-input" placeholder="输入消息，例如：请结合巡检与知识库给出设备异常诊断建议">
                <button type="button" class="layui-btn" id="btn-send">发送</button>
            </div>
            <div class="aui-sub-config">
                <input type="text" id="custom-name" class="aui-input" value="custom-sub-agent" placeholder="自定义子Agent名称">
                <input type="text" id="custom-prompt" class="aui-input" value="你是一个制造业巡检协作子agent，请给出可执行建议。" placeholder="自定义子Agent提示词">
            </div>
        </div>
    </div>
</div>
<script>
layui.use(['layer'], function () {
    var layer = layui.layer, history = [], currentSessionId = '';
    var productConfig = {allowCustomAgent: true, maxHistory: 20, maxMessageLength: 2000, enabledAgents: ['planner-agent', 'inspection-agent', 'knowledge-agent']};
    function escapeHtml(text) { return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function renderAgentSelector() {
        var html = '', agents = productConfig.enabledAgents || [];
        for (var i = 0; i < agents.length; i++) html += '<label class="aui-agent-tag"><input type="checkbox" class="agent-item" value="' + agents[i] + '" checked> ' + agents[i] + '</label>';
        if (productConfig.allowCustomAgent) html += '<label class="aui-agent-tag"><input type="checkbox" class="agent-item" value="custom-sub-agent" checked> custom-sub-agent</label>';
        $('#agent-selector').html(html);
        if (!productConfig.allowCustomAgent) { $('#custom-name').prop('disabled', true); $('#custom-prompt').prop('disabled', true); }
    }
    function appendMsg(role, title, content) {
        var cls = role === 'user' ? 'user' : (role === 'system' ? 'system' : 'assistant');
        var html = '<div class="aui-msg ' + cls + '"><div class="aui-bubble"><div class="aui-role">' + escapeHtml(title || role) + '</div><div>' + escapeHtml(content || '') + '</div></div></div>';
        if ($('#chat-log .aui-empty').length > 0) $('#chat-log').html('');
        $('#chat-log').append(html);
        var dom = $('#chat-log')[0]; dom.scrollTop = dom.scrollHeight;
    }
    function renderSessions(list) {
        var html = '';
        if (!list || list.length === 0) html = '<div class="aui-empty">暂无会话</div>';
        else for (var i = 0; i < list.length; i++) {
            var s = list[i], title = s.title || s.sessionId, active = (currentSessionId && currentSessionId === s.sessionId) ? ' active' : '';
            html += '<div class="aui-session-item' + active + '" data-id="' + s.sessionId + '"><div style="font-weight:600;">' + escapeHtml(title) + '</div><div style="font-size:12px;color:#8a97ad;margin-top:4px;">' + escapeHtml(s.sessionId) + '</div></div>';
        }
        $('#session-list').html(html);
        if (!currentSessionId && list && list.length > 0) currentSessionId = list[0].sessionId;
    }
    function loadSessions(callback) { get(router.inspect_ai_agent_multi_chat_session_list, {}, function (data) { renderSessions(data || []); if (callback) callback(); }); }
    function loadMessages(sessionId) {
        if (!sessionId) { $('#chat-log').html('<div class="aui-empty">暂无会话</div>'); history = []; return; }
        get(router.inspect_ai_agent_multi_chat_session_messages, {sessionId: sessionId}, function (data) {
            $('#chat-log').html(''); history = [];
            var list = data || [];
            if (list.length === 0) $('#chat-log').html('<div class="aui-empty">会话暂无消息</div>');
            for (var i = 0; i < list.length; i++) {
                var m = list[i], role = (m.role || '').toLowerCase() === 'user' ? 'user' : 'assistant';
                appendMsg(role, m.role || '-', m.content || '');
                history.push((m.role || '-') + ': ' + (m.content || ''));
            }
        });
    }
    function loadConfig() {
        get(router.inspect_ai_agent_multi_chat_config, {}, function (data) {
            productConfig = data || productConfig;
            renderAgentSelector();
        }, function () {
            renderAgentSelector();
        });
    }
    $('#btn-send').on('click', function () {
        var msg = ($('#msg').val() || '').trim();
        if (!msg) { layer.msg('请输入消息'); return; }
        if (msg.length > (productConfig.maxMessageLength || 2000)) { layer.msg('消息长度超过系统限制'); return; }
        var selectedAgents = [];
        $('.agent-item:checked').each(function () { selectedAgents.push($(this).val()); });
        if (selectedAgents.length === 0) { layer.msg('请至少选择一个agent'); return; }
        var payload = {message: msg, customAgentName: ($('#custom-name').val() || '').trim(), customAgentPrompt: ($('#custom-prompt').val() || '').trim(), history: history, selectedAgents: selectedAgents, sessionId: currentSessionId || ''};
        appendMsg('user', 'user', msg);
        post(router.inspect_ai_agent_multi_chat, payload, function (data) {
            if (data.sessionId) currentSessionId = data.sessionId;
            var replies = data.nodeReplies || [];
            for (var i = 0; i < replies.length; i++) appendMsg('assistant', (replies[i].agentName || '-') + ' | ' + (replies[i].role || '-'), replies[i].content || '');
            appendMsg('assistant', 'final', data.finalAnswer || '');
            history.push('User: ' + msg); history.push('Assistant: ' + (data.finalAnswer || ''));
            var maxHistory = productConfig.maxHistory || 20;
            if (history.length > maxHistory) history = history.slice(history.length - maxHistory);
            $('#msg').val('');
            loadSessions();
        }, function (code, msgText) { layer.alert('多Agent对话失败: ' + msgText + ' (' + code + ')'); });
    });
    $('#btn-new-session').on('click', function () {
        var title = 'Session-' + new Date().toISOString().slice(0, 19).replace('T', ' ');
        post(router.inspect_ai_agent_multi_chat_session_create, {title: title}, function (data) {
            currentSessionId = data.sessionId;
            history = [];
            $('#chat-log').html('<div class="aui-empty">新会话已创建，开始提问吧</div>');
            loadSessions(function () { loadMessages(currentSessionId); });
        });
    });
    $(document).on('click', '.aui-session-item', function () {
        currentSessionId = $(this).data('id') || '';
        loadMessages(currentSessionId);
        $('.aui-session-item').removeClass('active');
        $(this).addClass('active');
    });
    $('#btn-clear').on('click', function () { history = []; $('#chat-log').html('<div class="aui-empty">窗口已清空（不影响服务端会话）</div>'); $('#msg').val(''); });
    loadConfig();
    loadSessions(function () { loadMessages(currentSessionId); });
});
</script>
</body>
</html>
