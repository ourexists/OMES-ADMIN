<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
</head>
<body>
<div style="padding: 16px;">
    <form class="layui-form layui-form-pane" action="" id="connect-edit-form" lay-filter="connect-edit-form">
        <div class="layui-form-item">
            <label class="layui-form-label"><span style="color:red">*</span> <span
                    lang-i18n="connect.serverName">服务名</span></label>
            <div class="layui-input-block">
                <input type="text" name="serverName" autocomplete="off" lay-verify="required" class="layui-input"
                       lang-i18n="common.placeholder">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label"><span style="color:red">*</span> <span
                    lang-i18n="connect.protocol"></span></label>
            <div class="layui-input-block">
                <select name="protocol" id="protocol" lay-verify="required" lay-filter="protocol-select">
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label"><span style="color:red">*</span><span
                    lang-i18n="connect.host"></span></label>
            <div class="layui-input-block">
                <input type="text" name="host" autocomplete="off" lay-verify="required" class="layui-input"
                       lang-i18n="common.placeholder">
            </div>
        </div>
        <div class="layui-form-item" id="suffix-form-item" style="display: none;">
            <label class="layui-form-label"><span lang-i18n="mqtt.topic">订阅</span></label>
            <div class="layui-input-block">
                <input type="text" name="suffix" autocomplete="off" class="layui-input" placeholder="/mqtt 或 topic 等">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label"><span lang-i18n="common.username">用户名</span></label>
            <div class="layui-input-block">
                <input type="text" name="username" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label"><span lang-i18n="common.password">密码</span></label>
            <div class="layui-input-block">
                <input type="password" name="password" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item" id="collect-cron-form-item">
            <label class="layui-form-label">采集Cron</label>
            <div class="layui-input-block">
                <input type="text" name="collectCron" placeholder="如 0 * * * * ? 每分钟" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item" style="position: fixed; bottom: 5%; right: 5%">
            <button class="layui-btn" lay-submit lay-filter="connect-edit-btn" lang-i18n="common.msg.confirm">确定
            </button>
            <button type="reset" class="layui-btn layui-btn-primary" lang-i18n="common.msg.reset">重置</button>
        </div>
    </form>
</div>
<script>
    var current_row_data = parent.current_row_data;
    layui.use(['form', 'layer'], function () {
        var form = layui.form;
        var layer = layui.layer;

        function toggleByProtocol(protocol) {
            var isMqtt = protocol && String(protocol).toLowerCase() === 'mqtt';
            $('#suffix-form-item').toggle(isMqtt);
            $('#collect-enabled-form-item, #collect-interval-form-item, #collect-cron-form-item').toggle(!isMqtt);
        }

        get(router.connect_protocols, null, function (result) {
            $.each(result, function (index, item) {
                $('#protocol').append(new Option(item.name, item.id));
            });
            form.render();
            form.on('select(protocol-select)', function (data) {
                toggleByProtocol(data.value);
            });
        });

        var id = layui.url().search.id;
        if (id) {
            get(router.connect_id, {id: id}, function (result) {
                current_row_data = result;
                form.val('connect-edit-form', {
                    id: result.id,
                    serverName: result.serverName,
                    protocol: result.protocol,
                    host: result.host,
                    port: result.port,
                    suffix: result.suffix || '',
                    gatewayId: result.gatewayId || '',
                    collectEnabled: result.collectEnabled,
                    collectIntervalSec: result.collectIntervalSec,
                    collectCron: result.collectCron || '',
                    validType: result.validType != null ? String(result.validType) : '0',
                    username: result.username || '',
                    password: result.password || ''
                });
                form.render();
                toggleByProtocol(result.protocol);
            });
        } else {
            current_row_data = {};
            form.val('connect-edit-form', {validType: '0'});
            form.render();
        }

        form.on('submit(connect-edit-btn)', function (data) {
            var field = data.field;
            var dto = {
                serverName: field.serverName,
                protocol: field.protocol,
                host: field.host,
                port: field.port ? parseInt(field.port, 10) : null,
                suffix: field.suffix || null,
                gatewayId: field.gatewayId || null,
                collectEnabled: field.collectEnabled === '1',
                collectIntervalSec: field.collectIntervalSec ? parseInt(field.collectIntervalSec, 10) : null,
                collectCron: field.collectCron || null,
                validType: field.validType ? parseInt(field.validType, 10) : 0,
                username: field.username || null,
                password: field.password || null
            };
            if (current_row_data && current_row_data.id) {
                dto.id = current_row_data.id;
            }
            post(router.connect_edit, dto, function () {
                var index = parent.layer.getFrameIndex(window.name);
                parent.layer.close(index);
                if (parent.reloadTb) parent.reloadTb();
            }, function (code, msg) {
                layer.alert(msg, {title: 'error'});
            });
            return false;
        });
    });
</script>
</body>
</html>
