<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
    <style>
        /* 连接卡片 - 行布局：占满宽度 + 多列网格 */
        .right-panel #card-container.common-data-container {
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
            overflow-y: auto;
            margin-top: 10px;
            padding-right: 10px;
            box-sizing: border-box;
        }

        /* 使用 flex 网格保证卡片始终多列排列，不依赖 layui 栅格 */
        #card-container.connect-card-row {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            margin-left: -7.5px;
            margin-right: -7.5px;
        }

        #card-container.connect-card-row > .connect-col {
            flex: 0 0 25%;
            display: flex;
            width: 25%;
            padding: 7.5px;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        @media screen and (max-width: 1200px) {
            #card-container.connect-card-row > .connect-col {
                flex: 0 0 33.333%;
                max-width: 33.333%;
            }
        }

        @media screen and (max-width: 768px) {
            #card-container.connect-card-row > .connect-col {
                flex: 0 0 50%;
                max-width: 50%;
            }
        }

        .connect-card {
            height: 100%;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            overflow: hidden;
            background: var(--bg-panel);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            box-shadow: var(--shadow-card);
            color: var(--text-main);
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .connect-card:hover {
            box-shadow: var(--shadow-card-hover);
            border-color: var(--border-card-hover);
        }

        .connect-card .device-card-header {
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-card);
            flex-shrink: 0;
        }

        .connect-card .card-header-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .connect-card .card-vendor-tag {
            display: inline-block;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-on-tag);
            border-radius: 999px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .connect-card .card-tag-0 {
            background: var(--tag-0);
        }

        .connect-card .card-tag-1 {
            background: var(--tag-1);
        }

        .connect-card .card-tag-2 {
            background: var(--tag-2);
        }

        .connect-card .card-tag-3 {
            background: var(--tag-3);
        }

        .connect-card .card-tag-4 {
            background: var(--tag-4);
        }

        .connect-card .card-device-name {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .connect-card .card-check {
            flex-shrink: 0;
        }

        .connect-card .device-card-body {
            flex: 1;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            min-height: 60px;
        }

        .connect-card .card-info-list {
            flex: 1;
            min-width: 0;
            font-size: 12px;
            color: var(--text-sub);
        }

        .connect-card .card-info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
            gap: 8px;
        }

        .connect-card .card-info-row:last-child {
            margin-bottom: 0;
        }

        .connect-card .card-info-label {
            color: var(--text-sub);
            flex-shrink: 0;
        }

        .connect-card .card-info-value {
            color: var(--text-value);
            font-weight: 500;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .connect-card .card-device-thumb {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--bg-thumb-start) 0%, var(--bg-thumb-end) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-thumb);
        }

        .connect-card .card-device-thumb .layui-icon {
            font-size: 28px;
            color: var(--text-disabled);
        }

        .connect-card .device-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border-card);
        }

        .connect-card .card-footer-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .connect-card .card-footer-tag {
            display: inline-block;
            padding: 2px 8px;
            font-size: 11px;
            color: var(--text-on-tag);
            border-radius: 4px;
        }

        .connect-card .tag-purple {
            background: var(--tag-purple);
        }

        .connect-card .card-footer-actions {
            display: flex;
            gap: 4px;
        }

        .connect-card .card-action-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            border: none;
            background: transparent;
            color: var(--text-disabled);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, background 0.2s;
        }

        .connect-card .card-action-btn:hover {
            color: var(--color-primary);
            background: var(--bg-hover-soft);
        }

        .connect-card .card-action-btn .layui-icon {
            font-size: 16px;
        }

        .connect-card .card-action-btn.disabled,
        .connect-card .card-action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="layui-tab-content main-panel oemes-container">
    <div class="layui-col-md12 right-panel">
        <form class="layui-form layui-row layui-col-space16">
            <div class="layui-col-md3">
                <div class="layui-input-wrap">
                    <div class="layui-input-prefix"><i class="layui-icon layui-icon-link"></i></div>
                    <select name="protocol" id="protocol">
                        <option value="" lang-i18n="connect.protocol">协议</option>
                    </select>
                </div>
            </div>
            <div class="layui-col-md3">
                <div class="layui-input-wrap">
                    <div class="layui-input-prefix"><i class="layui-icon layui-icon-username"></i></div>
                    <input type="text" name="serverName" id="serverName" placeholder="" class="layui-input"
                           lay-affix="clear" lang-i18n="connect.serverName">
                </div>
            </div>
            <div class="layui-col-md2">
                <button class="layui-btn layui-btn-sm" lay-submit lay-filter="connect-search" lang-i18n="common.search">
                    搜索
                </button>
                <button type="reset" class="layui-btn layui-btn-sm layui-btn-primary" lang-i18n="common.clear">清空
                </button>
            </div>
            <div class="layui-col-md1">
                <div class="layui-btn-container">
                    <button type="button" class="layui-btn layui-btn-sm" id="btn-add"><i
                            class="layui-icon layui-icon-add-1"></i> <span lang-i18n="common.add">新增</span></button>
                    <button type="button" class="layui-btn layui-btn-sm layui-btn-danger" id="btn-batch-del"><i
                            class="layui-icon layui-icon-delete"></i> <span
                            lang-i18n="common.delete.batch">批量删除</span></button>
                </div>
            </div>
        </form>
        <div id="card-container" class="common-data-container connect-card-row"></div>
    </div>
</div>

<script th:inline="none">
    var current_row_data;

    layui.use(['form', 'layer'], function () {
        var form = layui.form;
        var layer = layui.layer;
        var $ = layui.$;

        get(router.connect_protocols, null, function (result) {
            $('#protocol').append($('<option value="">').text(i18np.prop('common.all')));
            $.each(result, function (index, item) {
                $('#protocol').append(new Option(item.name, item.id));
            });
            form.render();
        });

        function renderCards(list) {
            var html = '';
            if (!list || list.length === 0) {
                html = '<div class="connect-col" style="flex: 0 0 100%; max-width: 100%; text-align: center; padding: 48px; color: var(--text-sub);">' + (i18np.prop('common.placeholder') || '暂无数据') + '</div>';
            } else {
                $.each(list, function (i, d) {
                    var addr = (d.host || '') + (d.port != null ? ':' + d.port : '');
                    if (d.suffix) addr += (addr ? ' ' : '') + (d.suffix || '');
                    var tagClass = 'card-tag-' + (i % 5);
                    html += '<div class="connect-col">' +
                        '<div class="connect-card layui-card">' +
                        '<div class="device-card-header">' +
                        '<div class="card-header-row">' +
                        '<span class="card-vendor-tag ' + tagClass + '">' + (d.protocol || '-') + '</span>' +
                        '<span class="card-device-name" title="' + (d.serverName || '') + '">' + (d.serverName || '-') + '</span>' +
                        '<span class="card-check"><input type="checkbox" name="cardCheck" lay-skin="primary" value="' + (d.id || '') + '"></span>' +
                        '</div></div>' +
                        '<div class="device-card-body">' +
                        '<div class="card-info-list">' +
                        '<div class="card-info-row"><span class="card-info-label">' + (i18np.prop('connect.host') || '连接地址') + '</span><span class="card-info-value">' + (addr || '-') + '</span></div>' +
                        '<div class="card-info-row"><span class="card-info-label">' + (i18np.prop('connect.protocol') || '协议类型') + '</span><span class="card-info-value">' + (d.protocol || '-') + '</span></div>' +
                        '</div>' +
                        '<div class="card-device-thumb"><i class="layui-icon layui-icon-link"></i></div>' +
                        '</div>' +
                        '<div class="device-card-footer">' +
                        '<div class="card-footer-tags">' +
                        '<span class="card-footer-tag tag-purple">' + (d.protocol || '-') + '</span>' +
                        '</div>' +
                        '<div class="card-footer-actions">' +
                        '<button type="button" class="card-action-btn lay-event-edit" data-id="' + (d.id || '') + '" title="' + (i18np.prop('common.edit') || '编辑') + '"><i class="layui-icon layui-icon-edit"></i></button>' +
                        '<button type="button" class="card-action-btn lay-event-del" data-id="' + (d.id || '') + '" title="' + (i18np.prop('common.delete') || '删除') + '"><i class="layui-icon layui-icon-delete"></i></button>' +
                        '<button type="button" class="card-action-btn lay-event-binding" data-id="' + (d.id || '') + '" data-name="' + (d.serverName || '') + '" title="设备绑定"><i class="layui-icon layui-icon-component"></i></button>' +
                        '</div></div>' +
                        '</div>' +
                        '</div>';
                });
            }
            $('#card-container').html(html);
            form.render('checkbox');
        }

        function loadData() {
            var where = {
                requirePage: false,
                protocol: $('#protocol').val(),
                serverName: $('#serverName').val(),
            };
            $.ajax({
                url: initRequestUrl(router.connect_page),
                data: JSON.stringify(where),
                type: 'POST',
                dataType: 'json',
                contentType: 'application/json',
                headers: getCommonHeader(),
                success: function (data) {
                    if (data.code === 200) {
                        var list = (data.data != null) ? data.data : [];
                        renderCards(list);
                    } else {
                        if (data.code >= 401 && data.code < 500 && data.code !== 404 && data.code !== 406) {
                            layer.confirm(i18np.prop('common.msg.lock_token'), null, function () {
                                localStorage.removeItem(store.token_header);
                                window.parent.location.href = '/view/login';
                            });
                        } else {
                            layer.msg(data.msg || '请求失败');
                        }
                    }
                },
                error: function (e, msg) {
                    if (e.status >= 401 && e.status < 500) {
                        layer.confirm(i18np.prop('common.msg.lock_token'), null, function () {
                            localStorage.removeItem(store.token_header);
                            window.parent.location.href = '/view/login';
                        });
                    } else {
                        layer.msg('请求异常：' + (msg || e.statusText));
                    }
                }
            });
        }

        $('#btn-add').on('click', function () {
            current_row_data = null;
            openWindow(i18np.prop('common.add'), '/view/connect_form_edit', ['560px', '520px']);
        });

        $('#btn-batch-del').on('click', function () {
            var ids = [];
            $('#card-container input[name="cardCheck"]:checked').each(function () {
                var v = $(this).val();
                if (v) ids.push(v);
            });
            if (ids.length === 0) return layer.msg(i18np.prop('common.msg.least.one'));
            delWindow(router.connect_del, ids, function () {
                loadData();
            });
        });

        $('#card-container').on('click', '.lay-event-edit', function (e) {
            e.stopPropagation();
            var id = $(this).data('id');
            current_row_data = null;
            openWindow(i18np.prop('common.edit'), '/view/connect_form_edit?id=' + id, ['560px', '520px']);
        });
        $('#card-container').on('click', '.lay-event-del', function (e) {
            e.stopPropagation();
            var id = $(this).data('id');
            delWindow(router.connect_del, [id], function () {
                loadData();
            });
        });
        $('#card-container').on('click', '.lay-event-binding', function (e) {
            e.stopPropagation();
            var id = $(this).data('id');
            var name = $(this).data('name');
            if (parent.openIndexTab) parent.openIndexTab('/view/device_collect_binding_tables?connectId=' + id, 'binding_' + id, '设备绑定-' + (name || id));
        });

        form.on('submit(connect-search)', function () {
            loadData();
            return false;
        });

        window.loadConnectCards = loadData;
        loadData();
    });

    function reloadTb() {
        if (window.loadConnectCards) window.loadConnectCards();
    }
</script>
</body>
</html>
