<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>OMES</title>
    <link rel="stylesheet" href="../static/layui/css/layui.css">
    <link rel="stylesheet" href="../static/tree-select/treeSelect.css">
    <link rel="stylesheet" href="../static/fullscreen/fullscreen.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/layui/layui.js"></script>
    <script src="../static/js/i18n.js"></script>
    <script src="../static/js/global.js"></script>
    <script src="../static/js/echarts.min.js"></script>
    <script src="../static/tree-select/treeSelect.js"></script>
    <script src="../static/fullscreen/fullscreen.js"></script>

    <!--    <script src="https://api.map.baidu.com/api?v=1.0&&type=webgl&ak=xqC8Us41v5zZxz5SGXOwslbpxAGakVMs"></script>-->
    <!--    <script src="../static/map/baiduMap.js"></script>-->


    <link rel="stylesheet" href="../static/leaflet/leaflet.css"/>
    <link rel="stylesheet" href="../static/marker/MarkerCluster.css"/>
    <link rel="stylesheet" href="../static/marker/MarkerCluster.Default.css"/>
    <script src="../static/leaflet/leaflet.js"></script>
    <script src="../static/marker/leaflet.markercluster.js"></script>
    <script src="../static/map/leafletMap.js"></script>
    <style>
        html, body {
            overflow: hidden;
            background: radial-gradient(circle at 50% 30%, #122b45 0%, #0b1220 60%),
            linear-gradient(180deg, #0b1220, #040a14);
            color: #e6f1ff;
            font-family: "DIN", "Microsoft YaHei", Arial, sans-serif;
        }

        :root {
            /* 工业蓝主题色 */
            --theme-bg-deep: #0b1220;
            --theme-bg-panel: rgba(16, 42, 68, .4);

            --theme-blue-main: #1677ff;
            --theme-blue-glow: #00e5ff;

            /* 滚动条 */
            --scroll-track: rgba(16, 42, 68, .45);
            --scroll-thumb: rgba(64, 140, 255, .6);
            --scroll-thumb-hover: rgba(64, 140, 255, .95);
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部 */
        .screen-header {
            height: 70px;
            display: flex;
            flex-shrink: 0;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            background: linear-gradient(180deg, #102a44, transparent);
        }


        .screen-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #e6f7ff;
            text-shadow: 0 0 15px rgba(22, 119, 255, 0.6);
        }

        /* 主体 */
        .screen-body {
            height: calc(100% - 120px);
            display: flex;
        }

        /* 左右面板 */
        .side-panel {
            width: 22%;
            margin: 5px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 中间地图 */
        .center-map {
            width: 56%;
            margin: 5px;
            color: #1f1f1f;
        }

        .panel-box {
            display: flex;
            flex-direction: column;
            background: linear-gradient(
                    180deg,
                    rgba(18, 43, 69, 0.9),
                    rgba(11, 18, 32, 0.9)
            );
            border: 1px solid rgba(31, 59, 100, 0.9);
            box-shadow: inset 0 0 20px rgba(22, 119, 255, 0.08),
            0 0 20px rgba(0, 0, 0, 0.6);
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .panel-title {
            display: flex;
            position: relative;
            padding-left: 14px;
            font-size: 16px;
            color: #d6ecff;
        }

        .panel-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 2px;
            width: 4px;
            height: 16px;
            background: linear-gradient(#00e5ff, #1677ff);
            box-shadow: 0 0 10px #00e5ff;
        }

        .kpi {
            display: flex;
            padding: 5px;
            flex-direction: row;
            flex-wrap: wrap;
        }

        .kpi-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-left: 10px;
            width: 25%;
        }

        .kpi-num {
            display: flex;
            font-size: 28px;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.8),
            0 0 20px rgba(22, 119, 255, 0.6);
        }

        .kpi-title {
            color: #8fa3bf;
        }

        /* 底部 */
        .screen-footer {
            height: 50px;
            padding: 0 20px;
            background: rgba(16, 42, 68, .9);

            display: flex;
            align-items: center; /* 上下居中 */
            justify-content: space-between;

            color: #8fa3bf;
            font-size: 13px;

            border-top: 1px solid rgba(64, 120, 180, .35);
            box-shadow: 0 -2px 12px rgba(0, 0, 0, .35);

            flex-shrink: 0; /* ⭐ 防止被压缩 */
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 10px rgba(0, 229, 255, .3);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 229, 255, .6);
            }
            100% {
                box-shadow: 0 0 10px rgba(0, 229, 255, .3);
            }
        }

        .panel-box:hover {
            animation: glow 2s infinite;
        }

        @keyframes blink {
            50% {
                opacity: .4;
            }
        }

        .alarm-panel {
            flex: 1; /* ⭐ 吃掉剩余空间 */
            display: flex;
            min-height: 0; /* ⭐ 防止撑破屏幕 */
            overflow: hidden; /* 自己不滚 */
        }

        .alarm-list {
            font-size: 13px;
            overflow-y: auto;
            padding-right: 6px;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) var(--scroll-track);
        }

        .alarm-item {
            display: flex;
            align-items: flex-start;
            padding: 6px 4px;
            border-bottom: 1px dashed rgba(31, 59, 100, .6);
        }

        .alarm-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin: 6px 8px 0 0;
            background: #ff4d4f;
            box-shadow: 0 0 6px #ff4d4f;
            flex-shrink: 0;
        }

        .alarm-body {
            flex: 1;
            min-width: 0;
        }

        .alarm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alarm-title {
            flex: 1; /* ⭐ 允许占剩余空间 */
            min-width: 0; /* ⭐ 省略号生效关键 */
            color: #e6f1ff;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alarm-time {
            color: #8fa3bf;
            font-size: 12px;
            margin-left: 10px;
            flex-shrink: 0;
        }

        .alarm-content {
            margin-top: 2px;
            color: #8fa3bf;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alarm-read-btn {
            padding: 2px 8px;
            font-size: 12px;
            color: #69b1ff;
            background: rgba(22, 119, 255, 0.08);
            border: 1px solid rgba(22, 119, 255, 0.45);
            border-radius: 4px;
            cursor: pointer;
            transition: all .2s ease;
        }

        .alarm-read-btn:hover {
            background: rgba(22, 119, 255, 0.18);
            border-color: #69b1ff;
            box-shadow: 0 0 6px rgba(22, 119, 255, 0.45);
        }

        /* 已读态 */
        .alarm-item.read {
            opacity: 0.6;
        }

        /* 新告警闪烁 */
        .alarm-item.new .alarm-dot {
            animation: blink 1.2s infinite;
        }

        .alarm-list::-webkit-scrollbar {
            width: 6px;
        }

        .alarm-list::-webkit-scrollbar-track {
            background: var(--scroll-track);
            border-radius: 3px;
        }

        .alarm-list::-webkit-scrollbar-thumb {
            background: linear-gradient(
                    180deg,
                    var(--theme-blue-glow),
                    var(--scroll-thumb)
            );
            border-radius: 3px;
            box-shadow: 0 0 8px rgba(0, 229, 255, .45);
        }

        .alarm-list::-webkit-scrollbar-thumb:hover {
            background: var(--scroll-thumb-hover);
            box-shadow: 0 0 12px rgba(0, 229, 255, .8);
        }
    </style>
</head>

<body>
<div class="container">
    <!-- 顶部 -->
    <div class="screen-header">
        <div class="screen-title"><span>设备监控</span> <span id="workshopName" style="font-size: 15px"></span>
        </div>
        <div id="currentTime"></div>
    </div>

    <!-- 主体 -->
    <div class="screen-body">

        <!-- 左侧 -->
        <div class="side-panel">
            <div class="panel-box">
                <div class="panel-title" lang-i18n="common.overview"></div>
                <div class="kpi">
                    <div class="kpi-item">
                        <div class="kpi-num" id="totalCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.total"></div>
                    </div>
                    <div class="kpi-item">
                        <div class="kpi-num" id="onlineCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.online"></div>
                    </div>
                    <div class="kpi-item">
                        <div class="kpi-num" id="offlineCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.offline"></div>
                    </div>
                    <div class="kpi-item">
                        <div class="kpi-num" id="alarmCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.alarm"></div>
                    </div>
                    <div class="kpi-item">
                        <div class="kpi-num" id="runCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.run"></div>
                    </div>
                    <div class="kpi-item">
                        <div class="kpi-num" id="stopCount">0</div>
                        <div class="kpi-title" lang-i18n="equip.stop"></div>
                    </div>
                </div>
            </div>

            <div class="panel-box" style="height: 45%">
                <div class="panel-title" lang-i18n="title.equip_status"></div>
                <div id="statusChart" style="height:100%; padding: 5px"></div>
            </div>
        </div>

        <!-- 中间地图 -->
        <div class="center-map">
            <div class="panel-box" style="height:100%;">
                <div id="map" style="height:100%;"></div>
            </div>
        </div>

        <!-- 右侧 -->
        <div class="side-panel">
            <div class="panel-box" style="height: 35%">
                <div class="panel-title" lang-i18n="title.equip_trend_7"></div>
                <div id="trendChart" style="height:100%"></div>
            </div>
            <div class="panel-box" style="height: 35%">
                <div class="panel-title" lang-i18n="title.equip_trend"></div>
                <div id="currentTrendChart" style="height:100%"></div>
            </div>

            <div class="panel-box alarm-panel">
                <div class="panel-title">最近告警</div>
                <div class="alarm-list" id="alarmList"></div>
            </div>
        </div>

    </div>

    <!-- 底部 -->
    <div class="screen-footer">
        <marquee id="alarmMarquee"></marquee>
    </div>
</div>

<script th:inline="none">
    let statusChart;
    let trendChart;
    let gisMap;
    let selected_tree_node;
    let currentTrendChart;
    let currentTrendChartLock = false;
    let countLock = false;
    let chartLock = false;
    let messageLock = false;
    let reloading = false;

    layui.use(function () {
        var $ = layui.$;

        const fullscreen = new FullScreen({
            elem: $('.container').get(0),
        });

        get(router.workshop_tree, null, function (result) {
                const sceneTree = new TreeSelect({
                    container: '.container',
                    data: result,
                    needVirtualRoot: true,
                    virtualRootName: i18np.prop('common.all'),
                    customName: {
                        title: 'name',
                        field: 'selfCode'
                    },
                    onSelect: function (obj) {
                        //获取当前点击的节点数据
                        selected_tree_node = obj;
                        reloadCount();
                        reloadTrendChart();
                        reloadMap(true)
                        if (obj.selfCode == null) {
                            $('#workshopName').text('');
                        } else {
                            $('#workshopName').text(obj.name);
                        }
                    }
                })
            }
        )

        reloadMessage();

        setTimeout(() => {
            initMap();
        }, 100)

        setTimeout(() => {
            initCountEChart();
            initTrendChart();
            initCurrentTrendChart();
        }, 400)

        setInterval(() => {
            $('#currentTime').text(new Date().toLocaleString());
        }, 1000);

        setInterval(async () => {
            reloadCount();
            reloadCurrentTrendChart();
            reloadMessage();
            reloadMap(false);
        }, 30000);
    })

    function initMap() {
        gisMap = new GISMap({
            createPopupHtml: function (d) {
                return createPopupHtml(d);
            },
            createIconUri: function (d) {
                // 设备类型兜底
                let type = d.type;
                if (type !== 1 && type !== 2) {
                    type = 0;
                }
                const status = calcStatus(d);
                return `/static/img/map/map_${status}_${type}.svg`;
            }
        })
        gisMap.init();
        reloadMap(true);
    }

    function initCountEChart() {
        statusChart = echarts.init($('#statusChart')[0]);
        statusChart.setOption({
            tooltip: {
                trigger: 'item',
            },
            legend: {
                orient: 'vertical',
                right: '5%',
                top: 'middle',
                textStyle: {
                    color: '#fff',
                    fontSize: 12
                }
            },
            series: [
                {
                    name: '设备状态',
                    type: 'pie',
                    radius: ['35%', '50%'],
                    center: ['35%', '50%'],
                    avoidLabelOverlap: false,
                    label: {
                        show: true,
                        color: '#fff',      // 深色背景下建议白色
                        fontSize: 10,
                        formatter: '{d}%'   // ⭐ 只显示百分比
                    },
                    data: []
                },
                {
                    name: '运行状态',
                    type: 'pie',
                    radius: ['15%', '25%'],
                    center: ['35%', '50%'],
                    avoidLabelOverlap: false,
                    label: {
                        show: true,
                        color: '#fff',
                        fontSize: 10,
                        formatter: '{d}%'
                    },
                    data: []
                }
            ]
        });
        reloadCount();
    }


    function initCurrentTrendChart() {
        currentTrendChart = echarts.init($('#currentTrendChart')[0]);
        const TREND_COLORS = {
            axis: '#2b3648',
            text: '#c9d1d9',
            split: 'rgba(255,255,255,.12)'
        };
        currentTrendChart.setOption({
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                axisPointer: {
                    type: 'line',
                    lineStyle: {
                        color: TREND_COLORS.line,
                        type: 'dashed'
                    }
                }
            },
            legend: {
                top: 10,
                left: 'center',
                textStyle: {
                    color: TREND_COLORS.text
                }
            },
            grid: {
                left: 10,
                right: 10,
                top: 30,
                bottom: 0,
                containLabel: true
            },
            xAxis: {
                type: 'time',
                axisLine: {
                    lineStyle: {
                        color: TREND_COLORS.axis
                    }
                },
                axisLabel: {
                    color: TREND_COLORS.text,
                    rotate: 20,
                },
                splitLine: {
                    show: false
                }
            },
            yAxis: {
                type: 'value',
                min: 0,
                minInterval: 1,   // ⭐ 核心：最小间隔为 1
                splitNumber: 4,   // 可选，控制刻度数量
                axisLine: {
                    lineStyle: {
                        color: TREND_COLORS.axis
                    }
                },
                axisLabel: {
                    color: TREND_COLORS.text
                },
                splitLine: {
                    lineStyle: {
                        color: TREND_COLORS.split
                    }
                }
            },
            series: [
                {
                    name: '在线',
                    type: 'line',
                    smooth: true,
                    showSymbol: false,
                    symbol: 'none',
                    lineStyle: {
                        width: 3,
                        color: COLORS.online
                    },
                    itemStyle: {
                        color: COLORS.online
                    },
                    areaStyle: {
                        color: COLORS.onlineArea
                    },
                    data: []
                },
                {
                    name: '运行',
                    type: 'line',
                    smooth: true,
                    showSymbol: false,
                    symbol: 'none',
                    lineStyle: {
                        width: 3,
                        color: COLORS.running
                    },
                    itemStyle: {
                        color: COLORS.running
                    },
                    areaStyle: {
                        color: COLORS.runningArea
                    },
                    data: []
                },
                {
                    name: '报警',
                    type: 'line',
                    showSymbol: false,
                    symbol: 'none',
                    symbolSize: 7,
                    lineStyle: {
                        width: 3,
                        color: COLORS.alarm,
                        shadowColor: 'rgba(255,77,79,.6)',
                        shadowBlur: 10
                    },
                    itemStyle: {
                        color: COLORS.alarm
                    },
                    areaStyle: {
                        color: COLORS.alarmArea
                    },
                    emphasis: {
                        focus: 'series'
                    },
                    data: []
                }
            ]
        });
        reloadCurrentTrendChart();
    }


    function initTrendChart() {
        trendChart = echarts.init($('#trendChart')[0]);
        const TREND_COLORS = {
            area: 'rgba(31,111,235,.18)', // 面积渐变
            axis: '#3b4a63',        // 坐标轴
            text: '#9fb1c8',        // 文字
            split: 'rgba(80,100,130,.25)' // 网格线
        };
        trendChart.setOption({
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                axisPointer: {
                    type: 'line',
                    lineStyle: {
                        color: TREND_COLORS.line,
                        type: 'dashed'
                    }
                }
            },
            grid: {
                left: 10,
                right: 10,
                top: 10,
                bottom: 10,
                containLabel: true
            },
            xAxis: {
                type: 'time',
                axisLine: {
                    lineStyle: {
                        color: TREND_COLORS.axis
                    }
                },
                axisLabel: {
                    color: TREND_COLORS.text
                },
                splitLine: {
                    show: false
                }
            },
            yAxis: {
                type: 'value',
                min: 0,
                minInterval: 1,   // ⭐ 核心：最小间隔为 1
                splitNumber: 4,   // 可选，控制刻度数量
                axisLine: {
                    lineStyle: {
                        color: TREND_COLORS.axis
                    }
                },
                axisLabel: {
                    color: TREND_COLORS.text
                },
                splitLine: {
                    lineStyle: {
                        color: TREND_COLORS.split
                    }
                }
            },
            series: [{
                type: 'line',
                smooth: true,
                symbol: 'circle',
                symbolSize: 6,
                lineStyle: {
                    width: 3,
                    color: COLORS.online
                },
                itemStyle: {
                    color: COLORS.online
                },
                areaStyle: {
                    color: COLORS.onlineArea
                },
                emphasis: {
                    focus: 'series'
                },
                data: []
            }]
        });
        reloadTrendChart();
    }


    function reloadMessage() {
        if (messageLock) return;
        messageLock = true;
        try {
            post(router.message_page, {
                page: 1,
                pageSize: 10,
                platform: client.platform,
                limitCurrentUser: true,
                type: 1   // 告警
            }, function (res) {

                const list = res || [];
                let html = '';

                list.forEach(item => {
                    html += `
                        <div class="alarm-item ${item.readStatus == 0 ? 'new' : 'read'}">
                            <div class="alarm-dot"></div>
                            <div class="alarm-body">
                                <div class="alarm-header">
                                    <span class="alarm-title">${item.title}</span>

                                    <div class="alarm-header-right">
                                        <span class="alarm-time">${item.createdTime}</span>
                                        ${item.readStatus == 0 ?
                        `<button class="alarm-read-btn" onclick="markAlarmRead('${item.id}', this)">
                                                       <icon class="layui-icon layui-icon-success"> </icon>
                                                   </button>`
                        : ''
                    }
                                    </div>
                                </div>

                                <div class="alarm-content" title="${item.context}">
                                    ${item.context}
                                </div>
                            </div>
                        </div>
                    `;
                });

                $('#alarmList').html(html);
            })
        } finally {
            messageLock = false;
        }
    }

    function reloadCount() {
        if (countLock) {
            return
        }
        countLock = true;
        try {
            post(router.equip_count, {
                needWorkshopCascade: true,
                workshopCode: selected_tree_node == null ? null : selected_tree_node.selfCode,
            }, function (result) {
                $("#totalCount").text(result.total);
                $("#onlineCount").text(result.online);
                $("#offlineCount").text(result.offline);
                $("#alarmCount").text(result.alarm);
                $("#runCount").text(result.run);
                $("#stopCount").text(result.stopped);
                statusChart.setOption({
                    series: [
                        {
                            data: [
                                {value: result.online, name: '在线', itemStyle: {color: COLORS.online}},
                                {value: result.offline, name: '离线', itemStyle: {color: COLORS.offline}},
                            ]
                        },
                        {
                            data: [
                                {value: result.run, name: '运行', itemStyle: {color: COLORS.running}},
                                {value: result.stopped, name: '停止', itemStyle: {color: COLORS.stopped}},
                                {value: result.alarm, name: '告警', itemStyle: {color: COLORS.alarm}}
                            ]
                        }
                    ]
                }, false);
                updateAlarmMarquee(result.alarm);
            })
        } finally {
            countLock = false;
        }
    }

    function updateAlarmMarquee(unreadCount) {
        const el = document.getElementById('alarmMarquee');

        if (unreadCount > 0) {
            el.innerText = `⚠ 当前场景存在 ${unreadCount} 台设备告警，请及时处理`;
        } else {
            el.innerText = '';
        }
    }

    async function reloadTrendChart() {
        if (chartLock) {
            return
        }
        chartLock = true;
        try {
            const now = new Date();
            const end = new Date(now);
            const start = new Date(now);
            end.setDate(now.getDate() - 1);
            start.setDate(now.getDate() - 8);
            post(router.equip_state_snapshot_count, {
                startDate: formatDate(start),
                endDate: formatDate(end),
                onlineState: 1,
                countType: 1,
                needWorkshopCascade: true,
                workshopCode: selected_tree_node == null ? null : selected_tree_node.selfCode,
            }, function (result) {
                const data = [];
                result.forEach(item => {
                    data.push([item.time, item.num]);
                })

                trendChart.setOption({
                    xAxis: {
                        min: start,
                        max: end,
                    },
                    series: [{
                        data: data
                    }]
                }, false);
            })
        } finally {
            chartLock = false;
        }
    }

    async function reloadCurrentTrendChart() {
        if (currentTrendChartLock) {
            return
        }
        currentTrendChartLock = true;
        try {
            const end = new Date();
            const start = new Date();
            start.setHours(0, 0, 0, 0);
            let onlineData = {};
            let alarmData = {};
            let runData = {}
            post(router.equip_state_snapshot_count, {
                startDate: formatDate(start),
                endDate: formatDate(end),
                onlineState: 1,
                needWorkshopCascade: true,
                workshopCode: selected_tree_node == null ? null : selected_tree_node.selfCode,
            }, function (result) {
                const data = [];
                result.forEach(item => {
                    data.push([item.time, item.num]);
                })
                onlineData = data;
            })
            post(router.equip_state_snapshot_count, {
                startDate: formatDate(start),
                endDate: formatDate(end),
                alarmState: 1,
                needWorkshopCascade: true,
                workshopCode: selected_tree_node == null ? null : selected_tree_node.selfCode,
            }, function (result) {
                const data = [];
                result.forEach(item => {
                    data.push([item.time, item.num]);
                })
                alarmData = data;
            })
            post(router.equip_state_snapshot_count, {
                startDate: formatDate(start),
                endDate: formatDate(end),
                runState: 1,
                needWorkshopCascade: true,
                workshopCode: selected_tree_node == null ? null : selected_tree_node.selfCode,
            }, function (result) {
                const data = [];
                result.forEach(item => {
                    data.push([item.time, item.num]);
                })
                runData = data;
            })
            currentTrendChart.setOption({
                xAxis: {
                    min: start,
                    max: end,
                },
                series: [{data: onlineData}, {data: runData}, {data: alarmData}]
            }, false);
        } finally {
            currentTrendChartLock = false;
        }
    }

    async function reloadMap(needViewReset, data) {
        if (reloading) return;
        reloading = true;

        try {
            let params = {
                workshopCode: selected_tree_node == null ? null : selected_tree_node.selfCode,
                name: $('#name').val(),
                selfCode: $('#selfCode').val(),
                type: $('#type').val(),
                needRealtime: true,
                requirePage: false,
                needWorkshopCascade: true,
                queryWorkshop: true,
                queryAttrs: true,
            };
            if (data != null) {
                for (let key in data) {
                    params[key] = data[key];
                }
            }
            post(router.equip_page, params, function (e) {
                if (e == null) {
                    return;
                }
                let r = [];
                e.forEach(function (item) {
                    if (item.lng != null && item.lat != null) {
                        r.push(item);
                    }
                })
                if (needViewReset) {
                    gisMap.adjustMapView(r)
                }
                gisMap.refreshMarkers(r)
            })
        } finally {
            reloading = false;
        }
    }

    function markAlarmRead(messageId, btn) {
        get(router.message_read, {messageId}, function (e) {
            const item = btn.closest('.alarm-item');
            item.classList.remove('new');
            item.classList.add('read');
            // 移除按钮
            btn.remove();
        });
    }

    function calcStatus(d) {
        if (d.onlineState === 0) {
            return 'offline';
        }
        if (d.alarmState >= 1) {
            return 'alarm';
        }
        if (d.runState === 1) {
            return 'running';
        }
        if (d.runState === 0) {
            return 'stop';
        }
        if (d.onlineState === 1) {
            return 'online';
        }
        return 'offline';
    }

    function createPopupHtml(d) {
        let runSpan = '<span class="status-dot-map status-offline"></span>';
        if (d.onlineState === 1) {
            if (d.runState === 1) {
                runSpan = '<span class="status-dot-map status-running"></span>';
            } else {
                runSpan = '<span class="status-dot-map status-stopped"></span>';
            }
        }
        let html =
            i18np.prop("workshop.name") + `：${d.workshop === null ? '' : d.workshop.name}<br/>` +
            i18np.prop("equip.code") + `：${d.selfCode}<br/>` +
            i18np.prop("equip.onlineState") + `：${d.onlineState === 1 ? '<span class="status-dot-map status-online"></span>' : '<span class="status-dot-map status-offline"></span>'}<br/>` +
            i18np.prop("equip.runState") + `：` + runSpan + "<br/>" +
            i18np.prop("equip.alarmState") + `：${d.alarmState === 1 ? '<span class="status-dot-map status-alarm"></span>' : '<span class="status-dot-map status-offline"></span>'}`;

        if (d.attrs != null) {
            d.attrs.forEach(function (t) {
                html += `<br/>${t.name}：${t.value == null ? 'unknow' : t.value}`;
            })
        }
        return {
            title: `<b>${d.name}</b>`,
            body: html
        };
    }

    window.onresize = () => {
        statusChart.resize();
        trendChart.resize();
        currentTrendChart.resize();
    };
</script>
